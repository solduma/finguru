<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-asset-allocation" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-indicator-asset-allocation)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="60" x2="400" y2="60" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- focal: divided circle, center ~ (180,120), r=78 -->
  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- wedge 1: STOCKS (largest) from -100deg to 140deg (240deg arc) -->
    <path d="M180 120 L166.5 43.2 A78 78 0 0 1 240.1 169.7 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.42"
          stroke="hsl(160,75%,66%)" stroke-width="2"/>

    <!-- wedge 2: BONDS (medium) from 140deg to 215deg -->
    <path d="M180 120 L240.1 169.7 A78 78 0 0 1 116.1 164.7 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.26"
          stroke="hsl(160,75%,66%)" stroke-width="2"/>

    <!-- wedge 3: CASH (small) from 215deg to 260deg -->
    <path d="M180 120 L116.1 164.7 A78 78 0 0 1 166.5 43.2 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.13"
          stroke="hsl(160,75%,66%)" stroke-width="2"/>

    <!-- outer ring emphasis -->
    <circle cx="180" cy="120" r="78" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="180" cy="120" r="4" fill="hsl(160,88%,82%)"/>

    <!-- faint dashed radial: next cut could move (inside bonds wedge) -->
    <line x1="180" y1="120" x2="129" y2="178" stroke="hsl(160,88%,82%)" stroke-width="1"
          stroke-opacity="0.55" stroke-dasharray="3 4"/>

    <!-- ICON: stocks - upward arrow (in large wedge, upper-right area) -->
    <g stroke="hsl(160,88%,82%)" stroke-width="2" fill="none">
      <line x1="222" y1="103" x2="240" y2="78"/>
      <polyline points="231 79 240 78 240 89"/>
    </g>

    <!-- ICON: bonds - flat horizontal bar / certificate ribbon (in bonds wedge, lower) -->
    <g stroke="hsl(160,88%,82%)" stroke-width="2" fill="none">
      <line x1="160" y1="158" x2="190" y2="158"/>
      <path d="M170 158 l-5 9 5 -3 5 3 -5 -9" fill="hsl(160,68%,55%)" fill-opacity="0.6" stroke-width="1.5"/>
    </g>

    <!-- ICON: cash - single coin (in small wedge, left) -->
    <g>
      <ellipse cx="152" cy="92" rx="11" ry="11" fill="hsl(160,68%,55%)" fill-opacity="0.5"
               stroke="hsl(160,88%,82%)" stroke-width="2"/>
      <ellipse cx="152" cy="92" rx="5" ry="5" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1"/>
    </g>

    <!-- slicing hand + wedge blade entering upper-right, angled toward center -->
    <g>
      <!-- blade: wedge shape poised over center -->
      <path d="M250 64 L300 24 L312 40 L268 80 Z"
            fill="hsl(160,22%,46%)" fill-opacity="0.55"
            stroke="hsl(160,75%,66%)" stroke-width="2"/>
      <line x1="256" y1="68" x2="296" y2="36" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.7"/>

      <!-- handle -->
      <rect x="298" y="18" width="34" height="14" rx="6"
            transform="rotate(-39 315 25)"
            fill="hsl(160,68%,55%)" fill-opacity="0.45"
            stroke="hsl(160,75%,66%)" stroke-width="2"/>

      <!-- hand gripping handle (stylized fingers) -->
      <g fill="none" stroke="hsl(160,75%,66%)" stroke-width="2">
        <path d="M318 44 q10 6 19 -4"/>
        <path d="M323 50 q9 6 18 -4"/>
        <path d="M328 56 q8 5 16 -4"/>
      </g>
    </g>

  </g>
</svg>
