<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-macd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-indicator-macd-burst" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="hsl(160,88%,82%)" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="hsl(160,68%,55%)" stop-opacity="0.45"/>
      <stop offset="1" stop-color="hsl(160,68%,55%)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-indicator-macd-bg)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="260" y1="40" x2="260" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="150" x2="360" y2="150" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- zero baseline beneath the bars -->
  <line x1="48" y1="160" x2="320" y2="160" stroke="hsl(160,22%,46%)" stroke-width="2" stroke-linecap="round"/>

  <!-- the two curved lanes sweeping lower-left to upper-right -->
  <!-- slow runner lane (open / lower) -->
  <path d="M50 196 C 150 178, 250 150, 322 96" fill="none" stroke="hsl(160,22%,46%)" stroke-width="2" stroke-linecap="round"/>
  <!-- fast runner lane (bright / upper) -->
  <path d="M50 168 C 150 150, 240 116, 322 76" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- histogram bars made physical, in the wedge between lanes, on baseline y=160 -->
  <g stroke="none">
    <rect x="76" y="128" width="9" height="32" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.30"/>
    <rect x="100" y="120" width="9" height="40" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.40"/>
    <rect x="124" y="124" width="9" height="36" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.45"/>
    <rect x="148" y="136" width="9" height="24" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.55"/>
    <rect x="172" y="146" width="9" height="14" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.65"/>
    <!-- bars dropping below baseline as gap narrows toward crossover -->
    <rect x="196" y="160" width="9" height="12" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.55"/>
    <rect x="220" y="160" width="9" height="6" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.40"/>
  </g>

  <!-- crossover burst (focal accent, upper-right third) -->
  <circle cx="290" cy="92" r="44" fill="url(#cv-indicator-macd-burst)"/>
  <g stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="290" y1="64" x2="290" y2="120"/>
    <line x1="262" y1="92" x2="318" y2="92"/>
    <line x1="271" y1="73" x2="309" y2="111"/>
    <line x1="309" y1="73" x2="271" y2="111"/>
  </g>
  <circle cx="290" cy="92" r="5" fill="hsl(160,88%,82%)"/>

  <!-- slow runner (open outline figure) on lower lane -->
  <g stroke="hsl(160,22%,46%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- motion streaks -->
    <line x1="206" y1="138" x2="222" y2="135" stroke-opacity="0.5"/>
    <line x1="208" y1="146" x2="226" y2="143" stroke-opacity="0.5"/>
    <circle cx="252" cy="118" r="6"/>
    <path d="M252 124 L249 138"/>
    <path d="M249 130 L240 126 M249 130 L260 132"/>
    <path d="M249 138 L242 150 M249 138 L257 148"/>
  </g>

  <!-- fast runner (filled, leaning forward) leading at crossover -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- speed streaks behind -->
    <line x1="250" y1="96" x2="272" y2="92" stroke="hsl(160,75%,66%)" stroke-opacity="0.6"/>
    <line x1="252" y1="104" x2="276" y2="100" stroke="hsl(160,75%,66%)" stroke-opacity="0.6"/>
    <circle cx="300" cy="74" r="6.5" fill="hsl(160,68%,55%)"/>
    <path d="M301 80 L297 94" fill="none"/>
    <path d="M299 85 L309 80 M299 85 L290 90" fill="none"/>
    <path d="M297 94 L304 105 M297 94 L289 102" fill="none"/>
  </g>
</svg>
