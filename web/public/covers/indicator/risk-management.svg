<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-risk-management" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-indicator-risk-management-chasm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(160,68%,55%)" stop-opacity="0.22"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cv-indicator-risk-management-netclip">
      <path d="M70 138 C 160 230, 240 230, 330 138 L 330 200 L 70 200 Z"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-indicator-risk-management)"/>

  <!-- shared frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- dark V chasm wedge -->
  <path d="M70 138 L 200 200 L 330 138 L 330 200 L 70 200 Z" fill="hsl(160,38%,7%)" fill-opacity="0.7"/>
  <path d="M70 138 L 200 200 L 330 138" fill="url(#cv-indicator-risk-management-chasm)" stroke="none"/>

  <!-- safety net: U-curve with cross-hatch grid -->
  <g clip-path="url(#cv-indicator-risk-management-netclip)" stroke="hsl(160,68%,55%)" stroke-opacity="0.45" stroke-width="1">
    <line x1="80" y1="120" x2="120" y2="210"/>
    <line x1="110" y1="120" x2="150" y2="210"/>
    <line x1="140" y1="120" x2="180" y2="210"/>
    <line x1="170" y1="120" x2="210" y2="210"/>
    <line x1="200" y1="120" x2="240" y2="210"/>
    <line x1="230" y1="120" x2="270" y2="210"/>
    <line x1="260" y1="120" x2="300" y2="210"/>
    <line x1="290" y1="120" x2="330" y2="210"/>
    <line x1="320" y1="120" x2="280" y2="210"/>
    <line x1="290" y1="120" x2="250" y2="210"/>
    <line x1="260" y1="120" x2="220" y2="210"/>
    <line x1="230" y1="120" x2="190" y2="210"/>
    <line x1="200" y1="120" x2="160" y2="210"/>
    <line x1="170" y1="120" x2="130" y2="210"/>
    <line x1="140" y1="120" x2="100" y2="210"/>
    <line x1="110" y1="120" x2="70" y2="210"/>
    <line x1="74" y1="148" x2="326" y2="148"/>
    <line x1="80" y1="160" x2="320" y2="160"/>
    <line x1="90" y1="172" x2="310" y2="172"/>
    <line x1="105" y1="183" x2="295" y2="183"/>
    <line x1="125" y1="192" x2="275" y2="192"/>
  </g>
  <!-- net rim -->
  <path d="M70 138 C 160 230, 240 230, 330 138" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- cliff platforms -->
  <path d="M30 105 L 70 105 L 70 200 L 30 200 Z" fill="hsl(160,22%,46%)" fill-opacity="0.55"/>
  <path d="M330 105 L 370 105 L 370 200 L 330 200 Z" fill="hsl(160,22%,46%)" fill-opacity="0.55"/>
  <line x1="30" y1="105" x2="70" y2="105" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="330" y1="105" x2="370" y2="105" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- tightrope -->
  <line x1="70" y1="105" x2="330" y2="105" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>

  <!-- dotted footprint missteps on rope -->
  <g fill="hsl(160,88%,82%)" fill-opacity="0.7">
    <circle cx="150" cy="101" r="2"/>
    <circle cx="180" cy="108" r="2"/>
    <circle cx="245" cy="101" r="2"/>
  </g>

  <!-- balance pole (asymmetric: small left, large right) -->
  <line x1="155" y1="78" x2="270" y2="78" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="155" cy="78" r="6" fill="hsl(160,68%,55%)" fill-opacity="0.55" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <circle cx="270" cy="78" r="13" fill="hsl(160,68%,55%)" fill-opacity="0.85" stroke="hsl(160,75%,66%)" stroke-width="2"/>

  <!-- stick-figure walker, centered, arms out -->
  <g stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="200" cy="62" r="7" fill="hsl(160,38%,7%)"/>
    <line x1="200" y1="69" x2="200" y2="90"/>
    <line x1="200" y1="78" x2="160" y2="78"/>
    <line x1="200" y1="78" x2="265" y2="78"/>
    <line x1="200" y1="90" x2="190" y2="105"/>
    <line x1="200" y1="90" x2="210" y2="105"/>
  </g>
</svg>
