<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-central-banks-monetary-policy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-indicator-central-banks-monetary-policy-dial" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="hsl(160,68%,55%)" stop-opacity="0.35"/>
      <stop offset="1" stop-color="hsl(160,68%,55%)" stop-opacity="0.05"/>
    </radialGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-indicator-central-banks-monetary-policy)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- force field arcs emanating from the dial -->
  <g stroke="hsl(160,68%,55%)" fill="none" stroke-linecap="round">
    <path d="M 60 150 A 110 110 0 0 1 230 150" stroke-opacity="0.12" stroke-width="1.5"/>
    <path d="M 80 175 A 150 150 0 0 1 270 165" stroke-opacity="0.09" stroke-width="1.5"/>
    <path d="M 100 198 A 195 195 0 0 1 320 185" stroke-opacity="0.06" stroke-width="1.5"/>
  </g>

  <!-- radial pull lines connecting dial to scattered currency -->
  <g stroke="hsl(160,88%,82%)" stroke-opacity="0.16" stroke-width="1" stroke-linecap="round">
    <line x1="128" y1="92" x2="200" y2="160"/>
    <line x1="128" y1="92" x2="250" y2="148"/>
    <line x1="128" y1="92" x2="290" y2="178"/>
    <line x1="128" y1="92" x2="160" y2="185"/>
    <line x1="128" y1="92" x2="225" y2="190"/>
    <line x1="128" y1="92" x2="320" y2="155"/>
  </g>

  <!-- glow behind dial -->
  <circle cx="128" cy="92" r="74" fill="url(#cv-indicator-central-banks-monetary-policy-dial)"/>

  <!-- DIAL: the focal control knob, upper-left -->
  <g>
    <!-- outer rim -->
    <circle cx="128" cy="92" r="58" fill="hsl(160,68%,55%)" fill-opacity="0.12" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- tick marks around rim -->
    <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round">
      <line x1="128" y1="40" x2="128" y2="50"/>
      <line x1="165" y1="55" x2="158" y2="62"/>
      <line x1="180" y1="92" x2="170" y2="92"/>
      <line x1="165" y1="129" x2="158" y2="122"/>
      <line x1="91" y1="129" x2="98" y2="122"/>
      <line x1="76" y1="92" x2="86" y2="92"/>
      <line x1="91" y1="55" x2="98" y2="62"/>
    </g>
    <!-- inner knob -->
    <circle cx="128" cy="92" r="36" fill="hsl(160,45%,13%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="128" cy="92" r="36" fill="none" stroke="hsl(160,88%,82%)" stroke-opacity="0.25" stroke-width="1"/>
    <!-- pointer notch indicating current regime setting -->
    <line x1="128" y1="92" x2="152" y2="68" stroke="hsl(160,88%,82%)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="128" cy="92" r="5" fill="hsl(160,88%,82%)"/>
  </g>

  <!-- current-regime indicator arrow on the rim -->
  <path d="M 162 60 l 8 -3 l -2 8 z" fill="hsl(160,88%,82%)"/>

  <!-- HAND / lever grip turning the dial -->
  <g fill="hsl(160,68%,55%)" fill-opacity="0.85" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round">
    <path d="M 96 118
             q -14 8 -22 24
             q -3 7 4 9
             q 8 1 14 -6
             q 5 -6 12 -10
             l 14 -8
             q 6 -4 4 -11
             q -3 -8 -12 -6
             z"/>
  </g>
  <!-- finger detail lines -->
  <g stroke="hsl(160,45%,13%)" stroke-width="1.5" stroke-linecap="round" fill="none">
    <line x1="86" y1="132" x2="96" y2="138"/>
    <line x1="80" y1="142" x2="91" y2="146"/>
  </g>

  <!-- scattered coins and bond notes, all tilted toward the dial -->
  <!-- coin 1 -->
  <g transform="translate(200,160) rotate(-32)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="hsl(160,68%,55%)" fill-opacity="0.30" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="none" stroke="hsl(160,88%,82%)" stroke-opacity="0.4" stroke-width="1"/>
  </g>
  <!-- bond note 1 -->
  <g transform="translate(252,150) rotate(-26)">
    <rect x="-22" y="-13" width="44" height="26" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.22" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="hsl(160,88%,82%)" stroke-opacity="0.4" stroke-width="1"/>
    <line x1="-16" y1="-7" x2="-8" y2="-7" stroke="hsl(160,88%,82%)" stroke-opacity="0.4" stroke-width="1" stroke-linecap="round"/>
    <line x1="-16" y1="7" x2="-8" y2="7" stroke="hsl(160,88%,82%)" stroke-opacity="0.4" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- coin 2 -->
  <g transform="translate(292,180) rotate(-22)">
    <ellipse cx="0" cy="0" rx="16" ry="11" fill="hsl(160,68%,55%)" fill-opacity="0.26" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="9" ry="5" fill="none" stroke="hsl(160,88%,82%)" stroke-opacity="0.4" stroke-width="1"/>
  </g>
  <!-- coin 3 -->
  <g transform="translate(162,186) rotate(-42)">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="hsl(160,68%,55%)" fill-opacity="0.24" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="7" ry="4" fill="none" stroke="hsl(160,88%,82%)" stroke-opacity="0.4" stroke-width="1"/>
  </g>
  <!-- bond note 2 -->
  <g transform="translate(226,192) rotate(-30)">
    <rect x="-19" y="-11" width="38" height="22" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.18" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="hsl(160,88%,82%)" stroke-opacity="0.35" stroke-width="1"/>
  </g>
  <!-- bond note 3 (far right, smaller) -->
  <g transform="translate(322,156) rotate(-18)">
    <rect x="-16" y="-10" width="32" height="20" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.16" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <line x1="-9" y1="-3" x2="9" y2="-3" stroke="hsl(160,88%,82%)" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round"/>
    <line x1="-9" y1="3" x2="3" y2="3" stroke="hsl(160,88%,82%)" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- coin 4 small -->
  <g transform="translate(345,188) rotate(-15)">
    <ellipse cx="0" cy="0" rx="11" ry="7" fill="hsl(160,68%,55%)" fill-opacity="0.20" stroke="hsl(160,75%,66%)" stroke-width="2"/>
  </g>
</svg>
