<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-smart-beta-and-factor-etfs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-indicator-smart-beta-and-factor-etfs)"/>

  <!-- shared unifying frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ===== Vending machine body ===== -->
  <rect x="138" y="46" width="124" height="158" rx="14"
        fill="hsl(160,68%,55%)" fill-opacity="0.10"
        stroke="hsl(160,75%,66%)" stroke-width="2"
        stroke-linejoin="round"/>

  <!-- glass front panel (upper two-thirds) -->
  <rect x="150" y="58" width="100" height="98" rx="6"
        fill="hsl(160,88%,82%)" fill-opacity="0.08"
        stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <!-- glass shine -->
  <line x1="160" y1="64" x2="160" y2="150" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" stroke-linecap="round"/>

  <!-- shelf lines behind glass -->
  <line x1="150" y1="108" x2="250" y2="108" stroke="hsl(160,75%,66%)" stroke-opacity="0.35" stroke-width="1"/>

  <!-- ===== Four bottles behind glass ===== -->
  <!-- Bottle 1: Value (coin) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <rect x="159" y="76" width="16" height="26" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.25"/>
    <line x1="164" y1="72" x2="170" y2="72" stroke-width="2"/>
    <rect x="165" y="72" width="4" height="4"/>
  </g>
  <circle cx="167" cy="89" r="4.5" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1.3"/>
  <line x1="167" y1="86" x2="167" y2="92" stroke="hsl(160,88%,82%)" stroke-width="1"/>

  <!-- Bottle 2: Momentum (upward arrow) — partly-empty drought bottle -->
  <g stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <rect x="181" y="76" width="16" height="26" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.10"/>
    <line x1="186" y1="72" x2="192" y2="72" stroke-width="2"/>
    <rect x="187" y="72" width="4" height="4"/>
    <!-- low fill level -->
    <rect x="181" y="92" width="16" height="10" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.28" stroke="none"/>
  </g>
  <!-- dashed drought crack through contents -->
  <line x1="183" y1="86" x2="195" y2="96" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-dasharray="2 2" stroke-opacity="0.8"/>
  <!-- momentum arrow icon -->
  <path d="M183 93 L189 87 L195 91" stroke="hsl(160,88%,82%)" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M195 91 L195 88 M195 91 L192 91" stroke="hsl(160,88%,82%)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Bottle 3: Quality (gem/diamond) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <rect x="203" y="76" width="16" height="26" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.25"/>
    <line x1="208" y1="72" x2="214" y2="72" stroke-width="2"/>
    <rect x="209" y="72" width="4" height="4"/>
  </g>
  <path d="M211 85 L215 88 L211 94 L207 88 Z" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Bottle 4: Low-Vol (flat line) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <rect x="225" y="76" width="16" height="26" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.25"/>
    <line x1="230" y1="72" x2="236" y2="72" stroke-width="2"/>
    <rect x="231" y="72" width="4" height="4"/>
  </g>
  <line x1="227" y1="89" x2="239" y2="89" stroke="hsl(160,88%,82%)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- second shelf row decorative bottle silhouettes (muted, depth) -->
  <g stroke="hsl(160,22%,46%)" stroke-width="1.2" fill="none" stroke-linejoin="round">
    <rect x="159" y="118" width="14" height="22" rx="3"/>
    <rect x="181" y="118" width="14" height="22" rx="3"/>
    <rect x="203" y="118" width="14" height="22" rx="3"/>
    <rect x="225" y="118" width="14" height="22" rx="3"/>
  </g>

  <!-- ===== Coin slot + dispensing tray ===== -->
  <!-- coin slot -->
  <rect x="244" y="166" width="10" height="3" rx="1.5" fill="hsl(160,88%,82%)" fill-opacity="0.6"/>
  <!-- dispensing tray (lower-left foreground) -->
  <rect x="148" y="172" width="60" height="24" rx="4"
        fill="hsl(160,38%,7%)" fill-opacity="0.6"
        stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <line x1="148" y1="172" x2="208" y2="172" stroke="hsl(160,88%,82%)" stroke-opacity="0.3" stroke-width="1"/>

  <!-- dropped bottle in tray -->
  <g stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="160" y="178" width="26" height="14" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.4" transform="rotate(-12 173 185)"/>
    <line x1="184" y1="174" x2="188" y2="180" stroke-width="2"/>
  </g>

  <!-- ===== Price tag (upper-right corner) ===== -->
  <!-- string -->
  <line x1="262" y1="56" x2="290" y2="74" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- tag body -->
  <g transform="rotate(18 308 86)">
    <path d="M288 70 L334 70 L334 102 L288 102 L280 86 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.18"
          stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="290" cy="86" r="3.2" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1.3"/>
    <!-- old high price crossed out (small ticks, no numerals) -->
    <line x1="300" y1="80" x2="318" y2="80" stroke="hsl(160,22%,46%)" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="299" y1="78" x2="319" y2="82" stroke="hsl(160,22%,46%)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- new low price + down arrow -->
    <line x1="300" y1="92" x2="314" y2="92" stroke="hsl(160,88%,82%)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M322 86 L322 96 M318 92 L322 96 L326 92"
          stroke="hsl(160,88%,82%)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- machine base feet -->
  <line x1="150" y1="204" x2="158" y2="204" stroke="hsl(160,75%,66%)" stroke-width="3" stroke-linecap="round"/>
  <line x1="242" y1="204" x2="250" y2="204" stroke="hsl(160,75%,66%)" stroke-width="3" stroke-linecap="round"/>
</svg>
