<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-dollar-cost-averaging-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-indicator-dollar-cost-averaging-stream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(160,88%,82%)" stop-opacity="0.9"/>
      <stop offset="1" stop-color="hsl(160,75%,66%)" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#cv-indicator-dollar-cost-averaging-bg)"/>

  <!-- Shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="40" y1="40" x2="40" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="360" y1="40" x2="360" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ===== Hand + pot, upper-left focal ===== -->
  <!-- Pot body (tilted) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M70 58 L118 50 Q128 49 130 59 L136 90 Q137 100 127 102 L84 110 Q74 112 71 102 L62 70 Q60 60 70 58 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.35"/>
    <!-- Spout -->
    <path d="M130 60 L150 56 L152 70 L132 78 Z" fill="hsl(160,68%,55%)" fill-opacity="0.5"/>
    <!-- Lid knob -->
    <circle cx="100" cy="50" r="4" fill="hsl(160,88%,82%)" stroke="none"/>
    <!-- Handle -->
    <path d="M64 72 Q40 78 44 100 Q46 112 60 108" fill="none"/>
  </g>

  <!-- Calm simplified hand gripping handle -->
  <g stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="hsl(160,68%,55%)" fill-opacity="0.25">
    <path d="M44 88 q-14 2 -16 14 q-1 9 8 11 l20 3 q9 1 10 -7 l1 -16 q1 -8 -7 -9 Z"/>
  </g>

  <!-- ===== Single clean vertical stream ===== -->
  <line x1="150" y1="72" x2="150" y2="150" stroke="url(#cv-indicator-dollar-cost-averaging-stream)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="150" cy="153" r="2.4" fill="hsl(160,88%,82%)" stroke="none"/>

  <!-- Shelf line for cups -->
  <line x1="60" y1="190" x2="360" y2="190" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- ===== Row of 5 identical-width cups, varying heights, SAME volume ===== -->
  <!-- Each cup: width ~34. Liquid area (volume) kept constant ~ same filled area. -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <!-- Cup 1: short -> full to brim -->
    <path d="M70 162 L104 162 L101 190 L73 190 Z" fill="none"/>
    <path d="M71 167 L103 167 L101 190 L73 190 Z" fill="hsl(160,68%,55%)" fill-opacity="0.55" stroke="none"/>
    <line x1="71" y1="167" x2="103" y2="167" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>

    <!-- Cup 2: medium-tall -> mid level -->
    <path d="M125 150 L159 150 L156 190 L128 190 Z" fill="none"/>
    <path d="M129 168 L155 168 L156 190 L128 190 Z" fill="hsl(160,68%,55%)" fill-opacity="0.55" stroke="none"/>
    <line x1="129" y1="168" x2="155" y2="168" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>

    <!-- Cup 3: tall -> shallow -->
    <path d="M180 138 L214 138 L211 190 L183 190 Z" fill="none"/>
    <path d="M184 173 L210 173 L211 190 L183 190 Z" fill="hsl(160,68%,55%)" fill-opacity="0.55" stroke="none"/>
    <line x1="184" y1="173" x2="210" y2="173" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>

    <!-- Cup 4: medium -> a bit higher -->
    <path d="M235 156 L269 156 L266 190 L238 190 Z" fill="none"/>
    <path d="M239 170 L265 170 L266 190 L238 190 Z" fill="hsl(160,68%,55%)" fill-opacity="0.55" stroke="none"/>
    <line x1="239" y1="170" x2="265" y2="170" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>

    <!-- Cup 5: short-medium -> nearly full -->
    <path d="M290 158 L324 158 L321 190 L293 190 Z" fill="none"/>
    <path d="M291 165 L323 165 L321 190 L293 190 Z" fill="hsl(160,68%,55%)" fill-opacity="0.55" stroke="none"/>
    <line x1="291" y1="165" x2="323" y2="165" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>
  </g>

  <!-- Evenly spaced tick marks along base = fixed schedule -->
  <g stroke="hsl(160,22%,46%)" stroke-width="2" stroke-linecap="round">
    <line x1="87" y1="196" x2="87" y2="203"/>
    <line x1="142" y1="196" x2="142" y2="203"/>
    <line x1="197" y1="196" x2="197" y2="203"/>
    <line x1="252" y1="196" x2="252" y2="203"/>
    <line x1="307" y1="196" x2="307" y2="203"/>
  </g>

  <!-- Small clock marking the schedule, lower-right -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="338" cy="160" r="14" fill="hsl(160,68%,55%)" fill-opacity="0.15"/>
    <line x1="338" y1="160" x2="338" y2="151"/>
    <line x1="338" y1="160" x2="345" y2="163"/>
  </g>
</svg>
