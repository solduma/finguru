<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-day-trading-reality-check-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-indicator-day-trading-reality-check-rim" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.7" stop-color="hsl(160,68%,55%)" stop-opacity="0"/>
      <stop offset="1" stop-color="hsl(160,68%,55%)" stop-opacity="0.25"/>
    </radialGradient>
    <clipPath id="cv-indicator-day-trading-reality-check-wheel">
      <circle cx="205" cy="118" r="78"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-indicator-day-trading-reality-check-bg)"/>

  <!-- shared frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="250" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="290" y1="0" x2="290" y2="250" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="60" x2="400" y2="60" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- tilt wedge under wheel: slightly off-balance, tipping toward loss (left) -->
  <line x1="150" y1="208" x2="262" y2="200" stroke="hsl(160,22%,46%)" stroke-width="2" stroke-linecap="round"/>
  <path d="M205 196 L196 208 L214 208 Z" fill="hsl(160,22%,46%)" fill-opacity="0.55"/>

  <!-- ROULETTE WHEEL -->
  <g>
    <!-- outer rim glow -->
    <circle cx="205" cy="118" r="84" fill="url(#cv-indicator-day-trading-reality-check-rim)"/>

    <!-- loss segments: nearly all dark, drawn as radial spokes filling the disc -->
    <g clip-path="url(#cv-indicator-day-trading-reality-check-wheel)">
      <circle cx="205" cy="118" r="78" fill="hsl(160,38%,9%)"/>
      <!-- pie wedges (loss), many thin segments -->
      <g fill="hsl(160,30%,16%)" stroke="hsl(160,38%,7%)" stroke-width="1">
        <path d="M205 118 L283 118 L280.0 133.2 Z"/>
        <path d="M205 118 L280.0 133.2 L271.4 146.9 Z"/>
        <path d="M205 118 L271.4 146.9 L257.9 156.9 Z"/>
        <path d="M205 118 L257.9 156.9 L241.3 161.8 Z"/>
        <path d="M205 118 L241.3 161.8 L223.9 161.0 Z"/>
        <path d="M205 118 L223.9 161.0 L208.1 154.6 Z"/>
        <path d="M205 118 L208.1 154.6 L195.4 143.4 Z"/>
        <path d="M205 118 L195.4 143.4 L188.5 128.9 Z"/>
        <path d="M205 118 L188.5 128.9 L188.5 113.0 Z"/>
        <path d="M205 118 L188.5 113.0 L195.4 98.6 Z"/>
        <path d="M205 118 L195.4 98.6 L208.1 87.4 Z"/>
        <path d="M205 118 L208.1 87.4 L223.9 81.0 Z"/>
        <path d="M205 118 L223.9 81.0 L241.3 80.2 Z"/>
        <path d="M205 118 L241.3 80.2 L257.9 85.1 Z"/>
        <path d="M205 118 L257.9 85.1 L271.4 95.1 Z"/>
        <path d="M205 118 L271.4 95.1 L280.0 108.8 Z"/>
      </g>
      <!-- the lone WIN segment (bright) — thin wedge at upper right -->
      <path d="M205 118 L283 118 L280.0 108.8 Z" fill="hsl(160,68%,55%)" fill-opacity="0.95"/>
      <path d="M205 118 L280.0 108.8 L271.4 95.1 Z" fill="hsl(160,88%,82%)" fill-opacity="0.85"/>
      <!-- ~10% odds marker = a tiny tick on the bright wedge (geometric, no text) -->
      <circle cx="266" cy="106" r="3" fill="hsl(160,38%,7%)"/>
    </g>

    <!-- spokes lines for wheel detail -->
    <g stroke="hsl(160,75%,66%)" stroke-width="1" stroke-opacity="0.35" stroke-linecap="round">
      <line x1="205" y1="118" x2="283" y2="118"/>
      <line x1="205" y1="118" x2="127" y2="118"/>
      <line x1="205" y1="118" x2="205" y2="40"/>
      <line x1="205" y1="118" x2="205" y2="196"/>
    </g>

    <!-- inner hub -->
    <circle cx="205" cy="118" r="14" fill="hsl(160,38%,11%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="205" cy="118" r="4" fill="hsl(160,68%,55%)"/>

    <!-- outer rim ring -->
    <circle cx="205" cy="118" r="78" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="205" cy="118" r="70" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1" stroke-opacity="0.5"/>
  </g>

  <!-- the ball: mid-bounce, upper-right rim, heading toward a dark losing pocket -->
  <g>
    <path d="M278 70 Q272 80 264 88" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="2 4" stroke-linecap="round"/>
    <circle cx="264" cy="90" r="6" fill="hsl(160,88%,82%)"/>
    <circle cx="262" cy="88" r="2" fill="#ffffff" fill-opacity="0.8"/>
  </g>

  <!-- CHIP STACK lower-left, diminishing, costs/fees skimmed off the top -->
  <g>
    <!-- remaining stack -->
    <ellipse cx="72" cy="190" rx="26" ry="8" fill="hsl(160,30%,16%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <ellipse cx="72" cy="182" rx="26" ry="8" fill="hsl(160,38%,11%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <ellipse cx="72" cy="174" rx="26" ry="8" fill="hsl(160,30%,16%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <ellipse cx="72" cy="166" rx="26" ry="8" fill="hsl(160,38%,11%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>

    <!-- sliced-off chips drifting away (fees skimmed) -->
    <ellipse cx="98" cy="148" rx="18" ry="5" fill="hsl(160,68%,55%)" fill-opacity="0.45" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
    <ellipse cx="116" cy="132" rx="14" ry="4" fill="hsl(160,68%,55%)" fill-opacity="0.35" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
    <ellipse cx="130" cy="120" rx="10" ry="3" fill="hsl(160,68%,55%)" fill-opacity="0.25" stroke="hsl(160,75%,66%)" stroke-width="1"/>

    <!-- downward arrow beside the stack -->
    <line x1="40" y1="150" x2="40" y2="186" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>
    <path d="M34 180 L40 188 L46 180" fill="none" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
