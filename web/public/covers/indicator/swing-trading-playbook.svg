<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-swing-trading-playbook" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-indicator-swing-trading-playbook)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="130" y1="40" x2="130" y2="212" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="40" x2="300" y2="212" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="110" x2="360" y2="110" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- directional wind pennant / regime cone (upper background) -->
  <g stroke="hsl(160,22%,46%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M70 62 L150 58 L132 70 L150 82 L70 78 Z" fill="hsl(160,68%,55%)" fill-opacity="0.15" stroke="hsl(160,22%,46%)"/>
    <line x1="160" y1="56" x2="250" y2="50" stroke="hsl(160,22%,46%)" stroke-dasharray="4 6" opacity="0.7"/>
  </g>

  <!-- concentric ring target (right) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="312" cy="130" r="46" fill="hsl(160,68%,55%)" fill-opacity="0.10" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="312" cy="130" r="30" fill="hsl(160,68%,55%)" fill-opacity="0.16" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="312" cy="130" r="15" fill="hsl(160,68%,55%)" fill-opacity="0.50" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <circle cx="312" cy="130" r="4" fill="hsl(160,88%,82%)" stroke="none"/>
    <!-- reward band ticks (1R / 2R / 3R) - geometric notches, no text -->
    <line x1="312" y1="84" x2="312" y2="76" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <line x1="312" y1="100" x2="312" y2="93" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <line x1="312" y1="115" x2="312" y2="109" stroke="hsl(160,88%,82%)" stroke-width="2"/>
  </g>

  <!-- hairline crack in outermost ring (far right) -->
  <path d="M356 122 L351 126 L356 130 L350 135 L354 140" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- arrow flight line leading eye rightward -->
  <line x1="118" y1="158" x2="296" y2="132" stroke="hsl(160,75%,66%)" stroke-width="1" stroke-dasharray="2 7" opacity="0.7"/>

  <!-- the bow + nocked arrow (lower-left focal point) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- bow limb -->
    <path d="M70 110 Q108 158 70 206" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- bowstring drawn back to entry notch -->
    <path d="M70 110 L120 158 L70 206" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <!-- arrow nocked at single notch point -->
    <line x1="118" y1="158" x2="296" y2="132" stroke="hsl(160,68%,55%)" stroke-width="2"/>
    <path d="M296 132 L286 130 M296 132 L288 138" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <!-- fletching -->
    <path d="M118 158 L110 152 M118 158 L110 165" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- entry notch marker -->
    <circle cx="120" cy="158" r="5" fill="hsl(160,38%,7%)" stroke="hsl(160,88%,82%)" stroke-width="2"/>
  </g>

  <!-- ground stake + fixed stop line (bottom-left, beneath grip) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <line x1="56" y1="200" x2="120" y2="200" stroke="hsl(160,22%,46%)" stroke-width="2"/>
    <line x1="84" y1="196" x2="84" y2="216" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <path d="M84 216 L80 210 M84 216 L88 210" stroke="hsl(160,75%,66%)" stroke-width="2" fill="none"/>
  </g>
</svg>
