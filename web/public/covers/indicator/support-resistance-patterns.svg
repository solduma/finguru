<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-support-resistance-patterns" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-indicator-support-resistance-patterns)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="100" y1="40" x2="100" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="40" x2="300" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="125" x2="360" y2="125" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- resistance ceiling beam -->
    <rect x="48" y="62" width="304" height="14" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.18" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <line x1="60" y1="69" x2="120" y2="69" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.6"/>
    <line x1="250" y1="69" x2="320" y2="69" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.5"/>

    <!-- support stone ledge -->
    <rect x="44" y="168" width="312" height="20" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.30" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <line x1="44" y1="174" x2="356" y2="174" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.45"/>

    <!-- notches / memory marks etched along ledge -->
    <line x1="90" y1="182" x2="90" y2="186" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="132" y1="182" x2="132" y2="186" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.7"/>
    <circle cx="90" cy="167" r="1.4" fill="hsl(160,88%,82%)" fill-opacity="0.8"/>
    <circle cx="132" cy="167" r="1.4" fill="hsl(160,88%,82%)" fill-opacity="0.8"/>

    <!-- bounce arc trails (two faint arcs) -->
    <path d="M90 167 Q111 108 132 167" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-opacity="0.30" stroke-dasharray="3 4"/>
    <path d="M132 167 Q150 120 168 156" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-opacity="0.40" stroke-dasharray="3 4"/>

    <!-- bouncing ball, current position -->
    <circle cx="168" cy="156" r="8" fill="hsl(160,68%,55%)" fill-opacity="0.9" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <circle cx="165" cy="153" r="2.2" fill="hsl(160,88%,82%)" fill-opacity="0.9"/>

    <!-- triangle wedge brick (second pattern) -->
    <path d="M214 168 L256 168 L235 132 Z" fill="hsl(160,68%,55%)" fill-opacity="0.22" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <line x1="222" y1="160" x2="248" y2="160" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.4"/>

    <!-- head and shoulders block figure on the ledge -->
    <!-- left shoulder -->
    <rect x="270" y="148" width="20" height="20" rx="6" fill="hsl(160,68%,55%)" fill-opacity="0.35" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- head (tall central) -->
    <rect x="294" y="120" width="22" height="48" rx="8" fill="hsl(160,68%,55%)" fill-opacity="0.45" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- right shoulder -->
    <rect x="320" y="148" width="20" height="20" rx="6" fill="hsl(160,68%,55%)" fill-opacity="0.35" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- head highlight -->
    <circle cx="305" cy="132" r="2.4" fill="hsl(160,88%,82%)" fill-opacity="0.9"/>

  </g>
</svg>
