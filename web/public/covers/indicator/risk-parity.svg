<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-risk-parity-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-indicator-risk-parity-bag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(160,68%,55%)" stop-opacity="0.55"/>
      <stop offset="1" stop-color="hsl(160,68%,55%)" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-indicator-risk-parity-bg)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="212" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="120" x2="360" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="212" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- dashed level horizon: where the balanced beam should rest -->
  <line x1="70" y1="88" x2="330" y2="88" stroke="hsl(160,88%,82%)" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="6 6" stroke-linecap="round"/>

  <!-- central post / fulcrum stem -->
  <line x1="200" y1="78" x2="200" y2="190" stroke="hsl(160,22%,46%)" stroke-width="2" stroke-linecap="round"/>

  <!-- triangular fulcrum -->
  <path d="M200 78 L184 116 L216 116 Z" fill="hsl(160,68%,55%)" fill-opacity="0.2" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>

  <!-- tilted beam group (tips left toward the spiky stock bag) -->
  <g transform="rotate(-11 200 78)">
    <!-- beam -->
    <line x1="80" y1="78" x2="320" y2="78" stroke="hsl(160,75%,66%)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="78" r="4" fill="hsl(160,88%,82%)"/>

    <!-- left hangers -->
    <line x1="90" y1="78" x2="74" y2="116" stroke="hsl(160,22%,46%)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="90" y1="78" x2="106" y2="116" stroke="hsl(160,22%,46%)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- left pan -->
    <path d="M62 116 Q90 138 118 116" fill="hsl(160,68%,55%)" fill-opacity="0.15" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>

    <!-- right hangers -->
    <line x1="310" y1="78" x2="294" y2="116" stroke="hsl(160,22%,46%)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="310" y1="78" x2="326" y2="116" stroke="hsl(160,22%,46%)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- right pan -->
    <path d="M282 116 Q310 138 338 116" fill="hsl(160,68%,55%)" fill-opacity="0.15" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- LEFT money bag (high-vol stock) with jagged spiky aura -->
  <g>
    <!-- jagged shockwave aura -->
    <path d="M58 86 L48 78 L60 74 L52 64 L66 64 L62 52 L76 60 L80 48 L88 60 L100 50 L100 64 L114 60 L106 72 L118 76 L106 84"
          fill="none" stroke="hsl(160,88%,82%)" stroke-width="1.5" stroke-opacity="0.8" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M50 96 L40 90 L52 100 L42 108 L56 106 L52 120 L66 112 L72 124 L82 112 L96 122 L94 108 L110 112 L102 100 L116 96"
          fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-opacity="0.6" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- bag body -->
    <path d="M70 96 Q58 110 64 128 Q70 144 84 144 Q98 144 104 128 Q110 110 98 96 Z"
          fill="url(#cv-indicator-risk-parity-bag)" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
    <!-- tied neck -->
    <path d="M72 96 Q84 88 96 96" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
    <path d="M76 96 L80 90 L88 90 L92 96" fill="hsl(160,68%,55%)" fill-opacity="0.5" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- RIGHT money bag (low-vol bonds) with calm smooth rings -->
  <g>
    <ellipse cx="290" cy="118" rx="44" ry="30" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-opacity="0.35"/>
    <ellipse cx="290" cy="118" rx="32" ry="22" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- bag body -->
    <path d="M276 96 Q264 110 270 128 Q276 144 290 144 Q304 144 310 128 Q316 110 304 96 Z"
          fill="url(#cv-indicator-risk-parity-bag)" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M278 96 Q290 88 302 96" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
    <path d="M282 96 L286 90 L294 90 L298 96" fill="hsl(160,68%,55%)" fill-opacity="0.5" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- base block / sliding counterweight track -->
  <rect x="160" y="186" width="80" height="14" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.18" stroke="hsl(160,75%,66%)" stroke-width="2"/>
  <!-- sliding counterweight being nudged -->
  <rect x="208" y="180" width="20" height="20" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.6" stroke="hsl(160,88%,82%)" stroke-width="2"/>
  <!-- nudge direction marks -->
  <path d="M232 190 L240 190 M236 186 L240 190 L236 194" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- small hand adjusting the counterweight -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="hsl(160,68%,55%)" fill-opacity="0.25">
    <path d="M252 188 L268 182 Q276 180 276 188 L276 200 Q276 206 268 206 L254 206 Z"/>
    <line x1="258" y1="206" x2="258" y2="214"/>
    <line x1="266" y1="206" x2="266" y2="214"/>
  </g>

  <!-- upward arrow: leverage applied to the leveled result -->
  <g stroke="hsl(160,88%,82%)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="200" y1="178" x2="200" y2="150"/>
    <path d="M191 159 L200 148 L209 159"/>
  </g>
</svg>
