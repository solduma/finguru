<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-value-traps-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-indicator-value-traps-tag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(160,88%,82%)"/>
      <stop offset="1" stop-color="hsl(160,68%,55%)"/>
    </linearGradient>
    <radialGradient id="cv-indicator-value-traps-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="hsl(160,88%,82%)" stop-opacity="0.55"/>
      <stop offset="1" stop-color="hsl(160,88%,82%)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-indicator-value-traps-bg)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="110" y1="40" x2="110" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="290" y1="40" x2="290" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- focal glow behind the bait -->
  <ellipse cx="200" cy="150" rx="95" ry="70" fill="url(#cv-indicator-value-traps-glow)"/>

  <!-- wilting leaf peeking from back-left -->
  <g stroke="hsl(160,22%,46%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 168 C112 140 118 118 130 104"/>
    <path d="M130 104 C118 108 110 122 112 134 C124 132 132 122 130 104 Z" fill="hsl(160,22%,46%)" fill-opacity="0.30"/>
    <path d="M122 138 C112 138 106 146 106 156 C118 156 124 148 122 138 Z" fill="hsl(160,22%,46%)" fill-opacity="0.22"/>
  </g>

  <!-- mousetrap wooden base (low-angle rounded rect) -->
  <g stroke="hsl(160,75%,66%)" stroke-linecap="round" stroke-linejoin="round">
    <rect x="92" y="158" width="216" height="46" rx="14" fill="hsl(160,68%,55%)" fill-opacity="0.18" stroke-width="2"/>
    <!-- front edge for low-angle depth -->
    <path d="M92 190 L92 198 Q92 204 98 204 L302 204 Q308 204 308 198 L308 190" fill="hsl(160,38%,7%)" fill-opacity="0.45" stroke-width="2"/>

    <!-- coiled spring (left) -->
    <g stroke-width="2" fill="none">
      <circle cx="138" cy="178" r="13" stroke-opacity="0.9"/>
      <circle cx="138" cy="178" r="8"/>
      <circle cx="138" cy="178" r="3.5" fill="hsl(160,75%,66%)" stroke="none"/>
    </g>
    <!-- coiled spring (right) -->
    <g stroke-width="2" fill="none">
      <circle cx="262" cy="178" r="13" stroke-opacity="0.9"/>
      <circle cx="262" cy="178" r="8"/>
      <circle cx="262" cy="178" r="3.5" fill="hsl(160,75%,66%)" stroke="none"/>
    </g>

    <!-- trigger plate under the bait -->
    <rect x="178" y="168" width="44" height="26" rx="5" fill="hsl(160,68%,55%)" fill-opacity="0.30" stroke-width="2"/>
  </g>

  <!-- cocked snapping bar arcing over the top (question-mark curve), held back at tense angle -->
  <g stroke="hsl(160,75%,66%)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M138 178 C150 96 210 70 246 96 C272 116 256 150 226 152"/>
  </g>
  <!-- question-mark dot completing the glint hint -->
  <circle cx="222" cy="166" r="3" fill="hsl(160,88%,82%)"/>

  <!-- tension hold latch -->
  <line x1="262" y1="178" x2="232" y2="150" stroke="hsl(160,22%,46%)" stroke-width="2" stroke-linecap="round"/>

  <!-- price tag bait on the trigger plate (bright focal point) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- string -->
    <path d="M200 132 C198 142 200 150 200 156" fill="none" stroke="hsl(160,88%,82%)" stroke-opacity="0.8"/>
    <!-- tag body -->
    <path d="M200 130 L228 142 L218 178 L182 178 L172 142 Z" fill="url(#cv-indicator-value-traps-tag)" fill-opacity="0.92"/>
    <!-- tag eyelet -->
    <circle cx="200" cy="138" r="3.5" fill="hsl(160,38%,7%)" fill-opacity="0.55"/>
  </g>

  <!-- downward arrow on the tag (low number hint, no text) -->
  <g stroke="hsl(160,38%,7%)" stroke-opacity="0.7" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="200" y1="152" x2="200" y2="170"/>
    <path d="M192 162 L200 172 L208 162"/>
  </g>
</svg>
