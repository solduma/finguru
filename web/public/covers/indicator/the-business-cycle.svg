<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-the-business-cycle-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-indicator-the-business-cycle-bob" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="hsl(160,68%,55%)" stop-opacity="0.95"/>
      <stop offset="1" stop-color="hsl(160,68%,55%)" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-indicator-the-business-cycle-bg)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="120" x2="360" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- pivot bracket at top -->
  <rect x="186" y="44" width="28" height="12" rx="3" fill="hsl(160,22%,46%)" fill-opacity="0.6" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="200" cy="56" r="4" fill="hsl(160,88%,82%)"/>

  <!-- faint motion arc -->
  <path d="M 132 150 A 100 100 0 0 1 268 150" fill="none" stroke="hsl(160,75%,66%)" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="3 5" stroke-linecap="round"/>
  <path d="M 124 138 A 112 112 0 0 1 276 138" fill="none" stroke="hsl(160,75%,66%)" stroke-opacity="0.13" stroke-width="1" stroke-dasharray="3 5" stroke-linecap="round"/>

  <!-- four uneven phase markers along arc (outer larger, inner smaller) -->
  <circle cx="134" cy="148" r="4.5" fill="hsl(160,88%,82%)" fill-opacity="0.85"/>
  <circle cx="176" cy="118" r="2.6" fill="hsl(160,75%,66%)" fill-opacity="0.7"/>
  <circle cx="224" cy="118" r="2.6" fill="hsl(160,75%,66%)" fill-opacity="0.7"/>
  <circle cx="266" cy="148" r="4.5" fill="hsl(160,88%,82%)" fill-opacity="0.85"/>

  <!-- pendulum rod, swung to the right -->
  <line x1="200" y1="56" x2="252" y2="156" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- credit throttle bob -->
  <circle cx="258" cy="168" r="26" fill="url(#cv-indicator-the-business-cycle-bob)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
  <circle cx="258" cy="168" r="18" fill="none" stroke="hsl(160,88%,82%)" stroke-opacity="0.7" stroke-width="1"/>
  <!-- notch marks around dial -->
  <line x1="258" y1="146" x2="258" y2="151" stroke="hsl(160,88%,82%)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="240" y1="158" x2="244" y2="161" stroke="hsl(160,88%,82%)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="276" y1="158" x2="272" y2="161" stroke="hsl(160,88%,82%)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="238" y1="178" x2="242" y2="176" stroke="hsl(160,88%,82%)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="278" y1="178" x2="274" y2="176" stroke="hsl(160,88%,82%)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- throttle needle -->
  <line x1="258" y1="168" x2="272" y2="156" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="258" cy="168" r="3" fill="hsl(160,88%,82%)"/>

  <!-- curved rocker / cradle base, tipped high on the right (boom), low on left (bust) -->
  <path d="M 96 198 Q 200 224 308 188" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 96 198 Q 200 224 308 188 L 308 188 Q 200 246 96 198 Z" fill="hsl(160,68%,55%)" fill-opacity="0.15"/>
  <!-- platform deck riding on the rocker, tilted -->
  <line x1="104" y1="200" x2="300" y2="184" stroke="hsl(160,88%,82%)" stroke-opacity="0.8" stroke-width="2" stroke-linecap="round"/>
  <!-- side posts of platform -->
  <line x1="108" y1="200" x2="110" y2="190" stroke="hsl(160,22%,46%)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="296" y1="184" x2="294" y2="173" stroke="hsl(160,22%,46%)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- low side (bust) and high side (boom) accent dots -->
  <circle cx="108" cy="200" r="3" fill="hsl(160,22%,46%)"/>
  <circle cx="296" cy="184" r="3.4" fill="hsl(160,88%,82%)"/>

  <!-- crossed-out clock annotation, bottom-left corner, subordinate -->
  <g opacity="0.5">
    <circle cx="58" cy="186" r="15" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.4" stroke-dasharray="2 3"/>
    <line x1="58" y1="186" x2="58" y2="178" stroke="hsl(160,75%,66%)" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="58" y1="186" x2="64" y2="189" stroke="hsl(160,75%,66%)" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="46" y1="174" x2="70" y2="198" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>
