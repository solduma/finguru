<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-merger-arbitrage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-indicator-merger-arbitrage)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="80" y1="40" x2="80" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- dotted offer-price line at top -->
  <line x1="60" y1="56" x2="340" y2="56" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-dasharray="2 6" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- single thin thread holding the weight -->
  <line x1="200" y1="56" x2="200" y2="108" stroke="hsl(160,22%,46%)" stroke-width="1" stroke-linecap="round"/>

  <!-- suspended anvil-shaped weight (lopsided downside) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M186 108 h28 l-3 8 h-22 z" fill="hsl(160,68%,55%)" fill-opacity="0.30"/>
    <path d="M181 117 q-7 2 -7 7 q14 8 26 0 v-7 z" fill="hsl(160,68%,55%)" fill-opacity="0.55"/>
    <path d="M174 124 q13 9 26 0 l4 12 q-17 9 -34 0 z" fill="hsl(160,68%,55%)" fill-opacity="0.55"/>
  </g>

  <!-- left contract half (acquirer) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M96 96 h94 l-4 6 l4 6 l-4 6 l4 6 l-4 6 l4 6 l-4 6 l4 6 l-4 6 l4 6 l-4 6 l4 6 v6 h-94 z"
          fill="hsl(160,68%,55%)" fill-opacity="0.16"/>
    <line x1="110" y1="118" x2="168" y2="118" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="110" y1="132" x2="172" y2="132" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="110" y1="146" x2="160" y2="146" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="110" y1="160" x2="170" y2="160" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="110" y1="174" x2="156" y2="174" stroke-width="1" stroke-opacity="0.7"/>
  </g>

  <!-- right contract half (target) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M304 96 h-94 l4 6 l-4 6 l4 6 l-4 6 l4 6 l-4 6 l4 6 l-4 6 l4 6 l-4 6 l4 6 l-4 6 v6 h94 z"
          fill="hsl(160,68%,55%)" fill-opacity="0.16"/>
    <line x1="290" y1="118" x2="232" y2="118" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="290" y1="132" x2="228" y2="132" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="290" y1="146" x2="240" y2="146" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="290" y1="160" x2="230" y2="160" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="290" y1="174" x2="244" y2="174" stroke-width="1" stroke-opacity="0.7"/>
  </g>

  <!-- thin sliver of daylight in the seam -->
  <line x1="200" y1="98" x2="200" y2="194" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- single coin wedged on edge in the gap, eye-level -->
  <g stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linejoin="round">
    <ellipse cx="200" cy="146" rx="7" ry="14" fill="hsl(160,68%,55%)" fill-opacity="0.85"/>
    <ellipse cx="200" cy="146" rx="3" ry="9" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.8"/>
  </g>

  <!-- large binder clip clamping across the seam (focal) -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <!-- clip body / jaws, not fully closed -->
    <path d="M178 130 l22 -8 l22 8 v40 l-22 8 l-22 -8 z"
          fill="hsl(160,45%,13%)" fill-opacity="0.85"
          stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- narrow vertical gap in the jaws -->
    <line x1="200" y1="124" x2="200" y2="176" stroke="hsl(160,88%,82%)" stroke-width="1.5" stroke-opacity="0.55"/>
    <!-- clip levers / loops -->
    <path d="M186 130 q-26 -16 -8 -34" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="178" cy="96" r="3" fill="hsl(160,68%,55%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <path d="M214 130 q26 -16 8 -34" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="222" cy="96" r="3" fill="hsl(160,68%,55%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
  </g>

  <!-- small gap marker: seam climbs toward the offer line but stops just below -->
  <line x1="200" y1="64" x2="200" y2="94" stroke="hsl(160,22%,46%)" stroke-width="1.5" stroke-dasharray="3 4" stroke-linecap="round"/>
  <line x1="194" y1="94" x2="206" y2="94" stroke="hsl(160,88%,82%)" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round"/>
</svg>
