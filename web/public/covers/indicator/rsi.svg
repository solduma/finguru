<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-rsi-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-indicator-rsi-arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="hsl(160,68%,55%)"/>
      <stop offset="1" stop-color="hsl(160,88%,82%)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#cv-indicator-rsi-bg)"/>

  <!-- Shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="110" y1="20" x2="110" y2="230" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="20" x2="300" y2="230" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ===== GAUGE: semicircular dial, focal upper region ===== -->
  <!-- center at (210,128), radius 92, semicircle from 180deg(left) to 0deg(right) -->

  <!-- base track arc -->
  <path d="M 118 128 A 92 92 0 0 1 302 128"
        fill="none" stroke="hsl(160,22%,46%)" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- normal band (30..70) cool accent -->
  <path d="M 145.4 62.9 A 92 92 0 0 1 274.6 62.9"
        fill="none" stroke="url(#cv-indicator-rsi-arc)" stroke-width="10" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- bottom oversold band (0..30) muted -->
  <path d="M 118 128 A 92 92 0 0 1 145.4 62.9"
        fill="none" stroke="hsl(160,68%,55%)" stroke-width="10" stroke-linecap="round" stroke-opacity="0.30"/>

  <!-- top-right overbought band (70..100) hot/highlight -->
  <path d="M 274.6 62.9 A 92 92 0 0 1 302 128"
        fill="none" stroke="hsl(160,88%,82%)" stroke-width="10" stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- tick marks at the four band edges -->
  <line x1="118" y1="128" x2="106" y2="128" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="302" y1="128" x2="314" y2="128" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="145.4" y1="62.9" x2="138" y2="53" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="274.6" y1="62.9" x2="282" y2="53" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- needle pivot -->
  <circle cx="210" cy="128" r="7" fill="hsl(160,68%,55%)" stroke="hsl(160,88%,82%)" stroke-width="2"/>

  <!-- needle PEGGED into upper-right red/overbought zone (~85 on dial) -->
  <line x1="210" y1="128" x2="285.6" y2="71.8" stroke="hsl(160,88%,82%)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ===== TAUT FISHING LINE from needle tip down to lower-left hook, bowed by strain ===== -->
  <path d="M 285.6 71.8 Q 150 150 78 196"
        fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- ===== HAND + ROD in foreground, lower-left, wrist cocked for premature yank ===== -->
  <!-- rod -->
  <line x1="62" y1="208" x2="120" y2="150" stroke="hsl(160,68%,55%)" stroke-width="3" stroke-linecap="round"/>
  <!-- rod tip guide where line attaches -->
  <circle cx="120" cy="150" r="3" fill="hsl(160,88%,82%)"/>
  <!-- line from rod tip continues to hook -->
  <path d="M 120 150 Q 100 175 78 196" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- hand grip (simplified geometric fist on rod) -->
  <rect x="48" y="198" width="26" height="18" rx="8" transform="rotate(-40 61 207)" fill="hsl(160,68%,55%)" stroke="hsl(160,88%,82%)" stroke-width="2"/>
  <!-- knuckle lines -->
  <line x1="55" y1="201" x2="62" y2="195" stroke="hsl(160,45%,13%)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="60" y1="206" x2="67" y2="200" stroke="hsl(160,45%,13%)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- motion arc behind the cocked wrist (the premature yank) -->
  <path d="M 40 184 A 30 30 0 0 1 70 178" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M 36 192 A 38 38 0 0 1 70 184" fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.35"/>

  <!-- ===== FISH / WEIGHT still pulling toward bottom-right, move not exhausted ===== -->
  <!-- hook -->
  <path d="M 78 196 q -3 8 4 9 q 6 1 5 -6" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- the resisting fish positioned lower-right, body angled pulling outward -->
  <g transform="translate(312 200) rotate(18)">
    <!-- body -->
    <path d="M -30 0 Q -12 -16 18 -10 Q 34 -4 34 0 Q 34 4 18 10 Q -12 16 -30 0 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.85" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linejoin="round"/>
    <!-- tail flicking outward (toward corner) -->
    <path d="M -30 0 L -50 -12 L -44 0 L -50 12 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.7" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linejoin="round"/>
    <!-- eye -->
    <circle cx="22" cy="-2" r="2.5" fill="hsl(160,45%,13%)"/>
    <!-- gill line -->
    <path d="M 8 -8 Q 4 0 8 8" fill="none" stroke="hsl(160,45%,13%)" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>
  <!-- pull motion streaks behind fish toward corner -->
  <line x1="350" y1="205" x2="372" y2="212" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="348" y1="216" x2="368" y2="224" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.3"/>

  <!-- ===== WARNING TRIANGLE near the cocked hand (rookie mistake) ===== -->
  <g transform="translate(96 196)">
    <path d="M 0 -12 L 11 8 L -11 8 Z"
          fill="hsl(160,88%,82%)" fill-opacity="0.18" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linejoin="round"/>
    <line x1="0" y1="-3" x2="0" y2="2" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="5" r="1.2" fill="hsl(160,88%,82%)"/>
  </g>
</svg>
