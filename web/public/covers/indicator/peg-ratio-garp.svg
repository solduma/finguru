<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-peg-ratio-garp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-indicator-peg-ratio-garp)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-width="1" opacity="0.10"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="white" stroke-width="1" opacity="0.05"/>
  <line x1="90" y1="40" x2="90" y2="200" stroke="white" stroke-width="1" opacity="0.05"/>
  <line x1="310" y1="40" x2="310" y2="200" stroke="white" stroke-width="1" opacity="0.05"/>

  <!-- dashed 'fair value' reference line (balanced = PEG 1) -->
  <line x1="55" y1="92" x2="345" y2="92" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-dasharray="5 6" opacity="0.45"/>

  <!-- central post / fulcrum -->
  <line x1="200" y1="100" x2="200" y2="195" stroke="hsl(160,22%,46%)" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="200" cy="197" rx="34" ry="7" fill="hsl(160,68%,55%)" opacity="0.18"/>
  <path d="M180 197 L200 173 L220 197 Z" fill="hsl(160,68%,55%)" opacity="0.35" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>

  <!-- pivot + pointer at fulcrum (tilting toward overpriced/left) -->
  <circle cx="200" cy="100" r="6" fill="hsl(160,88%,82%)"/>
  <line x1="200" y1="100" x2="186" y2="78" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>

  <!-- beam, tilted: left (coins) dips, right (seedling) lifts -->
  <line x1="78" y1="118" x2="322" y2="82" stroke="hsl(160,75%,66%)" stroke-width="3" stroke-linecap="round"/>

  <!-- LEFT hanger + pan (dipped, heavy with coins) -->
  <line x1="78" y1="118" x2="62" y2="150" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="78" y1="118" x2="94" y2="150" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M48 150 Q78 168 108 150" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- tall stack of coins on left pan -->
  <ellipse cx="78" cy="148" rx="20" ry="5" fill="hsl(160,68%,55%)" opacity="0.55" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <ellipse cx="78" cy="140" rx="20" ry="5" fill="hsl(160,68%,55%)" opacity="0.55" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <ellipse cx="78" cy="132" rx="20" ry="5" fill="hsl(160,68%,55%)" opacity="0.65" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <ellipse cx="78" cy="124" rx="20" ry="5" fill="hsl(160,68%,55%)" opacity="0.65" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <ellipse cx="78" cy="116" rx="20" ry="5" fill="hsl(160,68%,55%)" opacity="0.75" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <ellipse cx="78" cy="108" rx="20" ry="5" fill="hsl(160,68%,55%)" opacity="0.85" stroke="hsl(160,75%,66%)" stroke-width="2"/>

  <!-- RIGHT hanger + pan (lifted) -->
  <line x1="322" y1="82" x2="306" y2="114" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="322" y1="82" x2="338" y2="114" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M292 114 Q322 132 352 114" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- potted seedling on right pan -->
  <path d="M310 114 L334 114 L330 128 L314 128 Z" fill="hsl(160,68%,55%)" opacity="0.45" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- stem -->
  <path d="M322 113 Q322 96 322 84" fill="none" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>
  <!-- leaves -->
  <path d="M322 96 Q306 92 304 78 Q319 80 322 96 Z" fill="hsl(160,68%,55%)" opacity="0.85" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M322 90 Q338 84 342 70 Q326 73 322 90 Z" fill="hsl(160,88%,82%)" opacity="0.9" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- sprout tip -->
  <circle cx="322" cy="82" r="2.5" fill="hsl(160,88%,82%)"/>
</svg>
