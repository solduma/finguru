<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-volume-obv-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-indicator-volume-obv-cord" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="hsl(160,68%,55%)" stop-opacity="0.35"/>
      <stop offset="1" stop-color="hsl(160,88%,82%)" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-indicator-volume-obv-bg)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="90" y1="40" x2="90" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="310" y1="40" x2="310" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ===== central pillar ===== -->
  <rect x="195" y="78" width="10" height="118" rx="3" fill="hsl(160,68%,55%)" fill-opacity="0.18" stroke="hsl(160,75%,66%)" stroke-width="2"/>
  <!-- base -->
  <path d="M178 196 L222 196 L214 188 L186 188 Z" fill="hsl(160,68%,55%)" fill-opacity="0.30" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  <ellipse cx="200" cy="196" rx="30" ry="6" fill="none" stroke="hsl(160,22%,46%)" stroke-width="1"/>

  <!-- ===== cumulative cord wound around pillar, thicker/higher on left (heavy) side ===== -->
  <path d="M200 190
           C188 182 188 176 200 170
           C214 164 214 158 200 152
           C186 146 186 140 200 134
           C216 128 214 121 200 116
           C188 111 189 104 200 100"
        fill="none" stroke="url(#cv-indicator-volume-obv-cord)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- accumulation lean indicator: small ticks bulging left -->
  <circle cx="186" cy="146" r="2.4" fill="hsl(160,88%,82%)" fill-opacity="0.8"/>
  <circle cx="187" cy="124" r="2.2" fill="hsl(160,88%,82%)" fill-opacity="0.7"/>

  <!-- ===== beam (slightly tilted, lagging) pivoting at top of pillar ===== -->
  <g transform="rotate(-4 200 84)">
    <rect x="92" y="80" width="216" height="8" rx="4" fill="hsl(160,68%,55%)" fill-opacity="0.55" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- pivot fulcrum -->
    <circle cx="200" cy="84" r="6" fill="hsl(160,38%,9%)" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <!-- suspension lines -->
    <line x1="104" y1="86" x2="104" y2="120" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
    <line x1="296" y1="86" x2="296" y2="120" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
    <!-- tip arrow on beam, lagging behind the coin imbalance -->
    <path d="M188 70 L212 70" fill="none" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>
    <path d="M188 70 L194 66 M188 70 L194 74" fill="none" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ===== left pan (heavier, lower) ===== -->
  <line x1="80" y1="122" x2="128" y2="122" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <path d="M82 122 Q104 150 126 122" fill="hsl(160,68%,55%)" fill-opacity="0.22" stroke="hsl(160,75%,66%)" stroke-width="2"/>

  <!-- left tall coin stack flowing in from upper-left into pan -->
  <g stroke="hsl(160,75%,66%)" stroke-width="1.5">
    <ellipse cx="104" cy="118" rx="15" ry="4.5" fill="hsl(160,68%,55%)" fill-opacity="0.75"/>
    <ellipse cx="104" cy="110" rx="15" ry="4.5" fill="hsl(160,68%,55%)" fill-opacity="0.65"/>
    <ellipse cx="104" cy="102" rx="15" ry="4.5" fill="hsl(160,68%,55%)" fill-opacity="0.55"/>
    <ellipse cx="104" cy="94" rx="15" ry="4.5" fill="hsl(160,68%,55%)" fill-opacity="0.45"/>
  </g>
  <!-- incoming coin stream upper-left -->
  <g stroke="hsl(160,88%,82%)" stroke-opacity="0.7" stroke-width="1.5" fill="none">
    <ellipse cx="62" cy="58" rx="9" ry="3" fill="hsl(160,68%,55%)" fill-opacity="0.45"/>
    <ellipse cx="74" cy="68" rx="9" ry="3" fill="hsl(160,68%,55%)" fill-opacity="0.45"/>
    <ellipse cx="88" cy="78" rx="10" ry="3" fill="hsl(160,68%,55%)" fill-opacity="0.5"/>
  </g>
  <!-- up chevrons (inflow) above left stack -->
  <g stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M98 86 L104 80 L110 86"/>
    <path d="M99 79 L104 74 L109 79" stroke-opacity="0.55"/>
  </g>

  <!-- ===== right pan (lighter, higher) ===== -->
  <line x1="272" y1="116" x2="320" y2="116" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  <path d="M274 116 Q296 144 318 116" fill="hsl(160,68%,55%)" fill-opacity="0.15" stroke="hsl(160,75%,66%)" stroke-width="2"/>

  <!-- right short coin stack -->
  <g stroke="hsl(160,75%,66%)" stroke-width="1.5">
    <ellipse cx="296" cy="112" rx="14" ry="4.2" fill="hsl(160,68%,55%)" fill-opacity="0.6"/>
    <ellipse cx="296" cy="104.5" rx="14" ry="4.2" fill="hsl(160,68%,55%)" fill-opacity="0.45"/>
  </g>
  <!-- incoming coin stream upper-right -->
  <g stroke="hsl(160,88%,82%)" stroke-opacity="0.6" stroke-width="1.5" fill="none">
    <ellipse cx="338" cy="62" rx="9" ry="3" fill="hsl(160,68%,55%)" fill-opacity="0.4"/>
    <ellipse cx="324" cy="72" rx="9" ry="3" fill="hsl(160,68%,55%)" fill-opacity="0.4"/>
    <ellipse cx="310" cy="82" rx="10" ry="3" fill="hsl(160,68%,55%)" fill-opacity="0.45"/>
  </g>
  <!-- down chevrons (outflow) above right stack -->
  <g stroke="hsl(160,22%,46%)" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M290 92 L296 98 L302 92"/>
    <path d="M291 85 L296 91 L301 85" stroke-opacity="0.6"/>
  </g>
</svg>
