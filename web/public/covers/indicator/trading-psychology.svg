<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-indicator-trading-psychology" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-indicator-trading-psychology)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="120" x2="360" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- HEAD PROFILE, facing right, open at top like a vessel -->
  <path d="M70 195
           C 56 168, 50 150, 52 124
           C 55 84, 86 56, 130 53
           C 168 51, 196 64, 210 84
           L 218 96
           C 226 108, 232 116, 240 120
           C 247 124, 248 132, 242 137
           C 236 142, 233 150, 234 160
           C 235 170, 230 176, 220 176
           L 208 176
           C 204 186, 202 192, 202 200"
        fill="hsl(160,68%,55%)" fill-opacity="0.13"
        stroke="hsl(160,75%,66%)" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- open vessel rim at top of skull -->
  <path d="M70 70 C 92 56, 134 50, 178 60"
        fill="none" stroke="hsl(160,88%,82%)" stroke-width="2"
        stroke-linecap="round" stroke-opacity="0.85" stroke-dasharray="1 8"/>

  <!-- ear -->
  <path d="M118 128 C 106 124, 104 142, 116 146 C 122 148, 124 138, 120 134"
        fill="none" stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- turmoil sparks above the animals (fear & greed) -->
  <path d="M108 64 q 5 -8 10 0 q 5 8 10 0" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.7" stroke-linecap="round"/>
  <path d="M150 60 q 5 -8 10 0 q 5 8 10 0" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.7" stroke-linecap="round"/>
  <path d="M132 50 l 3 -8 l 3 8" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TUG-OF-WAR ROPE through the cranial cavity, exits lower-right -->
  <path d="M112 110 L 165 118 L 230 160 L 300 200"
        fill="none" stroke="hsl(160,22%,46%)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M112 110 L 165 118 L 230 160 L 300 200"
        fill="none" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 6" stroke-opacity="0.8"/>

  <!-- BULL (charging, leaning left) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M112 110 C 100 104, 92 108, 92 118 C 92 128, 100 132, 110 128 L 124 124 C 132 122, 134 114, 128 110 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.45"/>
    <path d="M92 110 q -6 -6 -2 -12" fill="none" stroke-width="1.5"/>
    <path d="M100 110 q -4 -6 0 -11" fill="none" stroke-width="1.5"/>
    <line x1="100" y1="130" x2="98" y2="142"/>
    <line x1="118" y1="126" x2="120" y2="138"/>
  </g>

  <!-- BEAR (rearing, leaning right) -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M165 118 C 178 112, 188 116, 188 128 C 188 140, 180 146, 170 142 L 158 134 C 152 130, 154 122, 160 120 Z"
          fill="hsl(160,68%,55%)" fill-opacity="0.30"/>
    <path d="M186 118 q 6 -5 4 -11" fill="none" stroke-width="1.5"/>
    <path d="M178 114 q 3 -6 0 -11" fill="none" stroke-width="1.5"/>
    <line x1="172" y1="144" x2="172" y2="156"/>
    <line x1="158" y1="136" x2="156" y2="148"/>
  </g>

  <!-- bridle / anchor motif at the grip point -->
  <circle cx="300" cy="200" r="9" fill="none" stroke="hsl(160,88%,82%)" stroke-width="2"/>
  <path d="M300 191 v -10 M291 188 h 18" fill="none" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>
  <path d="M291 204 q 9 12 18 0" fill="none" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round"/>

  <!-- DISCIPLINED HAND entering from lower-right, gripping the rope -->
  <g stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="hsl(160,68%,55%)" fill-opacity="0.22">
    <path d="M360 205 C 344 196, 326 196, 314 200 C 308 202, 305 208, 312 212 C 322 218, 344 218, 360 214 Z"/>
    <path d="M316 200 q 4 -8 12 -7" fill="none"/>
    <path d="M324 199 q 5 -8 13 -6" fill="none"/>
    <path d="M333 200 q 6 -7 14 -4" fill="none"/>
  </g>
</svg>
