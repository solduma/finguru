<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-strategy-factor-quant" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(107,45%,13%)"/>
      <stop offset="1" stop-color="hsl(107,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-strategy-factor-quant)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- HOPPER at top releasing tokens -->
    <path d="M150 48 L250 48 L222 78 L178 78 Z"
          fill="hsl(107,68%,55%)" fill-opacity="0.18"
          stroke="hsl(107,75%,66%)" stroke-width="2"/>

    <!-- scattered identical tokens spilling down -->
    <g fill="hsl(107,88%,82%)" fill-opacity="0.85">
      <circle cx="190" cy="86" r="3.2"/>
      <circle cx="205" cy="92" r="3.2"/>
      <circle cx="218" cy="84" r="3.2"/>
      <circle cx="183" cy="98" r="3.2"/>
      <circle cx="210" cy="100" r="3.2"/>
      <circle cx="197" cy="100" r="3.2"/>
      <circle cx="225" cy="96" r="3.2"/>
      <circle cx="172" cy="90" r="3.2"/>
    </g>

    <!-- FOUR filter funnels (focal midband) -->
    <!-- funnel 1: value (price-tag) -->
    <path d="M58 108 L108 108 L92 134 L74 134 Z"
          fill="hsl(107,68%,55%)" fill-opacity="0.12"
          stroke="hsl(107,75%,66%)" stroke-width="2"/>
    <g stroke="hsl(107,88%,82%)" stroke-width="1.6" fill="none">
      <path d="M75 116 L86 116 L90 121 L82 126 L75 121 Z"/>
      <circle cx="79" cy="120" r="1.4" fill="hsl(107,88%,82%)" stroke="none"/>
    </g>

    <!-- funnel 2: size (small/large dots) -->
    <path d="M128 108 L178 108 L162 134 L144 134 Z"
          fill="hsl(107,68%,55%)" fill-opacity="0.12"
          stroke="hsl(107,75%,66%)" stroke-width="2"/>
    <g fill="hsl(107,88%,82%)">
      <circle cx="148" cy="120" r="2"/>
      <circle cx="160" cy="119" r="4"/>
    </g>

    <!-- funnel 3: momentum (up arrow) -->
    <path d="M222 108 L272 108 L256 134 L238 134 Z"
          fill="hsl(107,68%,55%)" fill-opacity="0.12"
          stroke="hsl(107,75%,66%)" stroke-width="2"/>
    <g stroke="hsl(107,88%,82%)" stroke-width="2" fill="none">
      <path d="M247 126 L247 114"/>
      <path d="M241 119 L247 113 L253 119"/>
    </g>

    <!-- funnel 4: quality (shield) -->
    <path d="M292 108 L342 108 L326 134 L308 134 Z"
          fill="hsl(107,68%,55%)" fill-opacity="0.12"
          stroke="hsl(107,75%,66%)" stroke-width="2"/>
    <path d="M317 113 L324 116 L324 121 Q324 126 317 128 Q310 126 310 121 L310 116 Z"
          fill="none" stroke="hsl(107,88%,82%)" stroke-width="1.6"/>

    <!-- tokens dropping out of funnel mouths into the tray -->
    <g fill="hsl(107,68%,55%)" fill-opacity="0.9">
      <circle cx="83" cy="146" r="3"/>
      <circle cx="153" cy="146" r="3"/>
      <circle cx="247" cy="146" r="3"/>
      <circle cx="317" cy="146" r="3"/>
    </g>

    <!-- GEAR / lever at left = automated rule -->
    <g stroke="hsl(107,75%,66%)" stroke-width="2" fill="hsl(107,68%,55%)" fill-opacity="0.15">
      <circle cx="40" cy="120" r="13"/>
    </g>
    <g stroke="hsl(107,75%,66%)" stroke-width="2">
      <path d="M40 104 L40 99 M40 141 L40 136 M24 120 L19 120 M61 120 L56 120 M29 109 L26 106 M51 131 L54 134 M51 109 L54 106 M29 131 L26 134"/>
    </g>
    <circle cx="40" cy="120" r="4" fill="hsl(107,88%,82%)"/>

    <!-- COLLECTING TRAY at bottom -->
    <rect x="68" y="160" width="264" height="44"
          fill="hsl(107,68%,55%)" fill-opacity="0.10"
          stroke="hsl(107,75%,66%)" stroke-width="2"/>

    <!-- four neat equal-width columns of sorted tokens -->
    <g fill="hsl(107,68%,55%)" fill-opacity="0.85" stroke="hsl(107,75%,66%)" stroke-width="1">
      <rect x="92" y="170" width="32" height="32" rx="2"/>
      <rect x="156" y="170" width="32" height="32" rx="2"/>
      <rect x="220" y="170" width="32" height="32" rx="2"/>
      <rect x="284" y="170" width="32" height="32" rx="2"/>
    </g>
    <!-- stacked token rows inside columns -->
    <g fill="hsl(107,88%,82%)" fill-opacity="0.55">
      <rect x="92" y="170" width="32" height="9" rx="2"/>
      <rect x="156" y="170" width="32" height="9" rx="2"/>
      <rect x="220" y="170" width="32" height="9" rx="2"/>
      <rect x="284" y="170" width="32" height="9" rx="2"/>
    </g>
    <g stroke="hsl(107,75%,66%)" stroke-width="1" stroke-opacity="0.5">
      <line x1="92" y1="190" x2="124" y2="190"/>
      <line x1="156" y1="190" x2="188" y2="190"/>
      <line x1="220" y1="190" x2="252" y2="190"/>
      <line x1="284" y1="190" x2="316" y2="190"/>
    </g>

    <!-- ghosted human hand crossed out, lower-right margin -->
    <g stroke="hsl(107,22%,46%)" stroke-width="1.6" fill="none" opacity="0.7">
      <path d="M352 196 L352 184 Q352 181 354 181 Q356 181 356 184 L356 192 M356 186 Q356 183 358 183 Q360 183 360 186 L360 192 M360 187 Q360 184 362 184 Q364 184 364 187 L364 195 Q364 204 356 205 Q349 205 348 198 L347 193 Q346 190 349 190 Q351 190 352 193"/>
    </g>
    <g stroke="hsl(107,75%,66%)" stroke-width="2">
      <line x1="344" y1="180" x2="370" y2="208"/>
    </g>

  </g>
</svg>
