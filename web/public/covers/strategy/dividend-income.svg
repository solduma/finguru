<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-strategy-dividend-income" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(142,45%,13%)"/>
      <stop offset="1" stop-color="hsl(142,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-strategy-dividend-income)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="212" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="212" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- rounded balanced canopy -->
  <circle cx="200" cy="92" r="58" fill="hsl(142,68%,55%)" fill-opacity="0.16"/>
  <circle cx="200" cy="92" r="58" fill="none" stroke="hsl(142,75%,66%)" stroke-width="2"/>
  <circle cx="158" cy="108" r="34" fill="hsl(142,68%,55%)" fill-opacity="0.16"/>
  <circle cx="158" cy="108" r="34" fill="none" stroke="hsl(142,75%,66%)" stroke-width="2"/>
  <circle cx="244" cy="108" r="34" fill="hsl(142,68%,55%)" fill-opacity="0.16"/>
  <circle cx="244" cy="108" r="34" fill="none" stroke="hsl(142,75%,66%)" stroke-width="2"/>

  <!-- trunk rising from the seed-coin -->
  <path d="M200 192 L200 118" fill="none" stroke="hsl(142,75%,66%)" stroke-width="6" stroke-linecap="round"/>
  <!-- branches -->
  <path d="M200 130 L168 104" fill="none" stroke="hsl(142,75%,66%)" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 124 L234 100" fill="none" stroke="hsl(142,75%,66%)" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 142 L222 122" fill="none" stroke="hsl(142,75%,66%)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M200 148 L178 128" fill="none" stroke="hsl(142,75%,66%)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- coin-fruit hanging in the canopy -->
  <circle cx="168" cy="100" r="11" fill="hsl(142,68%,55%)" fill-opacity="0.85"/>
  <circle cx="168" cy="100" r="11" fill="none" stroke="hsl(142,88%,82%)" stroke-width="1.5"/>
  <circle cx="168" cy="100" r="6" fill="none" stroke="hsl(142,45%,13%)" stroke-opacity="0.45" stroke-width="1"/>

  <circle cx="234" cy="96" r="11" fill="hsl(142,68%,55%)" fill-opacity="0.85"/>
  <circle cx="234" cy="96" r="11" fill="none" stroke="hsl(142,88%,82%)" stroke-width="1.5"/>
  <circle cx="234" cy="96" r="6" fill="none" stroke="hsl(142,45%,13%)" stroke-opacity="0.45" stroke-width="1"/>

  <circle cx="208" cy="72" r="11" fill="hsl(142,68%,55%)" fill-opacity="0.85"/>
  <circle cx="208" cy="72" r="11" fill="none" stroke="hsl(142,88%,82%)" stroke-width="1.5"/>
  <circle cx="208" cy="72" r="6" fill="none" stroke="hsl(142,45%,13%)" stroke-opacity="0.45" stroke-width="1"/>

  <circle cx="224" cy="124" r="9" fill="hsl(142,68%,55%)" fill-opacity="0.85"/>
  <circle cx="224" cy="124" r="9" fill="none" stroke="hsl(142,88%,82%)" stroke-width="1.5"/>

  <circle cx="180" cy="128" r="9" fill="hsl(142,68%,55%)" fill-opacity="0.85"/>
  <circle cx="180" cy="128" r="9" fill="none" stroke="hsl(142,88%,82%)" stroke-width="1.5"/>

  <!-- large seed-coin at the base, trunk rooted into it -->
  <ellipse cx="200" cy="196" rx="30" ry="14" fill="hsl(142,68%,55%)" fill-opacity="0.30"/>
  <ellipse cx="200" cy="196" rx="30" ry="14" fill="none" stroke="hsl(142,75%,66%)" stroke-width="2"/>
  <ellipse cx="200" cy="196" rx="18" ry="8" fill="none" stroke="hsl(142,88%,82%)" stroke-opacity="0.6" stroke-width="1"/>

  <!-- fallen coin sprouting sapling (left) -->
  <ellipse cx="118" cy="204" rx="15" ry="7" fill="hsl(142,68%,55%)" fill-opacity="0.55"/>
  <ellipse cx="118" cy="204" rx="15" ry="7" fill="none" stroke="hsl(142,75%,66%)" stroke-width="1.5"/>
  <path d="M118 198 L118 184" fill="none" stroke="hsl(142,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <path d="M118 188 q-9 -3 -12 -11 q9 0 12 6 Z" fill="hsl(142,68%,55%)" fill-opacity="0.5" stroke="hsl(142,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M118 190 q9 -2 12 -10 q-9 0 -12 5 Z" fill="hsl(142,68%,55%)" fill-opacity="0.5" stroke="hsl(142,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- fallen coin sprouting sapling (right) -->
  <ellipse cx="288" cy="206" rx="15" ry="7" fill="hsl(142,68%,55%)" fill-opacity="0.55"/>
  <ellipse cx="288" cy="206" rx="15" ry="7" fill="none" stroke="hsl(142,75%,66%)" stroke-width="1.5"/>
  <path d="M288 200 L288 186" fill="none" stroke="hsl(142,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <path d="M288 190 q-9 -3 -12 -11 q9 0 12 6 Z" fill="hsl(142,68%,55%)" fill-opacity="0.5" stroke="hsl(142,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M288 192 q9 -2 12 -10 q-9 0 -12 5 Z" fill="hsl(142,68%,55%)" fill-opacity="0.5" stroke="hsl(142,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- reinvestment loop: dotted arc from right fallen sapling back up to the trunk -->
  <path d="M300 198 q70 -34 50 -86 q-14 -38 -54 -42" fill="none" stroke="hsl(142,88%,82%)" stroke-width="1.5" stroke-opacity="0.75" stroke-linecap="round" stroke-dasharray="2 6"/>
  <path d="M302 150 l-6 -16 l16 5" fill="none" stroke="hsl(142,88%,82%)" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
