<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-strategy-event-driven" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(71,45%,13%)"/>
      <stop offset="1" stop-color="hsl(71,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-strategy-event-driven)"/>

  <!-- shared frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="212" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="212" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="90" x2="400" y2="90" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- coin / gem burst erupting upper-right -->
  <g stroke="hsl(71,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="216" cy="120" r="9" fill="hsl(71,68%,55%)" fill-opacity="0.85"/>
    <circle cx="248" cy="88" r="11" fill="hsl(71,68%,55%)" fill-opacity="0.75"/>
    <circle cx="282" cy="118" r="8" fill="hsl(71,68%,55%)" fill-opacity="0.6"/>
    <circle cx="232" cy="58" r="7" fill="hsl(71,68%,55%)" fill-opacity="0.5"/>
    <circle cx="296" cy="72" r="6" fill="hsl(71,68%,55%)" fill-opacity="0.45"/>

    <!-- gems -->
    <path d="M270 96 L280 86 L290 96 L280 110 Z" fill="hsl(71,88%,82%)" fill-opacity="0.85"/>
    <path d="M198 78 L206 70 L214 78 L206 90 Z" fill="hsl(71,88%,82%)" fill-opacity="0.7"/>
    <path d="M308 102 L315 95 L322 102 L315 113 Z" fill="hsl(71,88%,82%)" fill-opacity="0.55"/>
  </g>

  <!-- chest body -->
  <g stroke="hsl(71,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="150" y="150" width="130" height="55" rx="8" fill="hsl(71,68%,55%)" fill-opacity="0.20"/>

    <!-- opened lid tilted up to the right (half-pill dome) -->
    <path d="M158 148 a72 36 0 0 1 130 -18 L266 138 a48 26 0 0 0 -88 14 Z"
          transform="rotate(-14 215 138)" fill="hsl(71,68%,55%)" fill-opacity="0.35"/>

    <!-- thin gap line where latch just released -->
    <line x1="150" y1="150" x2="280" y2="150" stroke="hsl(71,88%,82%)" stroke-width="1" stroke-opacity="0.7"/>

    <!-- banded hasp across the front -->
    <line x1="215" y1="150" x2="215" y2="205" stroke-width="3" stroke-opacity="0.8"/>

    <!-- circular keyhole at center -->
    <circle cx="215" cy="172" r="9" fill="hsl(71,45%,13%)" stroke="hsl(71,88%,82%)"/>
    <path d="M215 178 L211 188 L219 188 Z" fill="hsl(71,45%,13%)" stroke="hsl(71,88%,82%)" stroke-width="1"/>

    <!-- radiating spark lines around keyhole -->
    <line x1="215" y1="152" x2="215" y2="144"/>
    <line x1="233" y1="172" x2="241" y2="172"/>
    <line x1="228" y1="158" x2="234" y2="152"/>
    <line x1="228" y1="186" x2="234" y2="192"/>
  </g>

  <!-- large angular key entering from the left into the keyhole -->
  <g stroke="hsl(71,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
     transform="rotate(-10 215 172)">
    <!-- bow handle -->
    <circle cx="70" cy="172" r="16" fill="none"/>
    <circle cx="70" cy="172" r="7" fill="hsl(71,68%,55%)" fill-opacity="0.4"/>
    <!-- shaft -->
    <line x1="86" y1="172" x2="206" y2="172" stroke-width="3"/>
    <!-- notched bit -->
    <path d="M196 172 L196 184 L186 184 L186 178 L178 178 L178 184 L172 184 L172 172"
          fill="hsl(71,68%,55%)" fill-opacity="0.5"/>
  </g>

  <!-- muted ground shadow under chest -->
  <ellipse cx="215" cy="208" rx="78" ry="5" fill="hsl(71,22%,46%)" fill-opacity="0.3"/>
</svg>
