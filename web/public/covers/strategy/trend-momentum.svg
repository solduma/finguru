<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-strategy-trend-momentum-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(18,45%,13%)"/>
      <stop offset="1" stop-color="hsl(18,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-strategy-trend-momentum-face" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="hsl(18,68%,55%)" stop-opacity="0.55"/>
      <stop offset="1" stop-color="hsl(18,68%,55%)" stop-opacity="0.12"/>
    </linearGradient>
    <clipPath id="cv-strategy-trend-momentum-clip">
      <path d="M70 52 C150 40 250 70 300 130 C328 162 348 188 360 210 L70 210 Z"/>
    </clipPath>
  </defs>

  <rect width="400" height="250" fill="url(#cv-strategy-trend-momentum-bg)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="212" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="212" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- faint collapsed wave behind: the reversal / exit cue -->
  <path d="M300 178 q14 -22 30 -8 q10 9 22 4" fill="none" stroke="hsl(18,22%,46%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <circle cx="318" cy="172" r="1.4" fill="hsl(18,22%,46%)" opacity="0.7"/>
  <circle cx="332" cy="176" r="1.2" fill="hsl(18,22%,46%)" opacity="0.6"/>
  <circle cx="346" cy="174" r="1.3" fill="hsl(18,22%,46%)" opacity="0.55"/>

  <!-- the big wave face -->
  <path d="M70 52 C150 40 250 70 300 130 C328 162 348 188 360 210 L70 210 Z"
        fill="url(#cv-strategy-trend-momentum-face)"/>

  <!-- steep face contour line -->
  <path d="M84 64 C158 54 246 80 296 138 C322 168 340 190 352 208"
        fill="none" stroke="hsl(18,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- inner face flow lines (momentum down-and-forward) -->
  <g clip-path="url(#cv-strategy-trend-momentum-clip)" stroke="hsl(18,75%,66%)" stroke-width="1" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M120 92 C190 86 250 110 300 158"/>
    <path d="M150 116 C210 112 262 134 308 178"/>
    <path d="M186 142 C236 140 282 160 322 196"/>
  </g>

  <!-- curling lip overhead -->
  <path d="M70 52 C150 40 250 70 300 130 C268 92 188 70 118 86 C156 74 232 86 274 132"
        fill="hsl(18,88%,82%)" opacity="0.25"/>
  <path d="M70 52 C150 40 250 70 300 130"
        fill="none" stroke="hsl(18,88%,82%)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- breaking foam at top-rear -->
  <g fill="hsl(18,88%,82%)">
    <circle cx="92" cy="54" r="5" opacity="0.85"/>
    <circle cx="106" cy="49" r="4" opacity="0.7"/>
    <circle cx="120" cy="53" r="3.5" opacity="0.6"/>
    <circle cx="134" cy="48" r="3" opacity="0.5"/>
    <circle cx="80" cy="60" r="3.5" opacity="0.7"/>
    <circle cx="150" cy="52" r="2.4" opacity="0.4"/>
  </g>

  <!-- surfboard wake / spray line down the face -->
  <path d="M232 168 C200 152 170 144 138 142"
        fill="none" stroke="hsl(18,88%,82%)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <g fill="hsl(18,88%,82%)" opacity="0.6">
    <circle cx="150" cy="140" r="1.6"/>
    <circle cx="170" cy="146" r="1.4"/>
    <circle cx="192" cy="152" r="1.3"/>
  </g>

  <!-- surfer at focal point, low crouch leaning forward -->
  <g stroke="hsl(18,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- surfboard -->
    <path d="M214 176 L250 162" fill="none" stroke="hsl(18,88%,82%)" stroke-width="3"/>
    <!-- back leg -->
    <path d="M226 170 L221 159" fill="none"/>
    <!-- front leg -->
    <path d="M242 165 L238 154" fill="none"/>
    <!-- torso leaning forward (down-slope, toward lower-right) -->
    <path d="M226 159 L242 152" fill="none"/>
    <!-- trailing arm -->
    <path d="M232 156 L221 150" fill="none"/>
    <!-- leading arm -->
    <path d="M238 154 L252 150" fill="none"/>
    <!-- head -->
    <circle cx="246" cy="147" r="4" fill="hsl(18,68%,55%)"/>
  </g>

  <!-- directional momentum arrow toward open trough (lower-right) -->
  <g stroke="hsl(18,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M286 184 L334 198"/>
    <path d="M322 188 L334 198 L320 204"/>
  </g>
</svg>
