<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-strategy-value-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(124,45%,13%)"/>
      <stop offset="1" stop-color="hsl(124,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-strategy-value-ingot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(124,88%,82%)"/>
      <stop offset="1" stop-color="hsl(124,68%,55%)"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-strategy-value-bg)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#fff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="130" y1="40" x2="130" y2="212" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="270" y1="40" x2="270" y2="212" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- central pillar -->
  <line x1="200" y1="70" x2="200" y2="200" stroke="hsl(124,22%,46%)" stroke-width="3" stroke-linecap="round"/>
  <!-- base -->
  <path d="M174 200 L226 200 L218 208 L182 208 Z" fill="hsl(124,68%,55%)" fill-opacity="0.25" stroke="hsl(124,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  <!-- pivot -->
  <circle cx="200" cy="78" r="5" fill="hsl(124,68%,55%)" stroke="hsl(124,75%,66%)" stroke-width="2"/>

  <!-- beam tilted down to the right -->
  <line x1="118" y1="62" x2="282" y2="94" stroke="hsl(124,75%,66%)" stroke-width="3" stroke-linecap="round"/>

  <!-- left hangers (high, light) -->
  <line x1="118" y1="62" x2="100" y2="100" stroke="hsl(124,22%,46%)" stroke-width="1.5"/>
  <line x1="118" y1="62" x2="136" y2="100" stroke="hsl(124,22%,46%)" stroke-width="1.5"/>
  <!-- left pan -->
  <path d="M92 100 Q118 122 144 100" fill="hsl(124,68%,55%)" fill-opacity="0.15" stroke="hsl(124,75%,66%)" stroke-width="2" stroke-linejoin="round"/>

  <!-- right hangers (low, heavy) -->
  <line x1="282" y1="94" x2="264" y2="140" stroke="hsl(124,22%,46%)" stroke-width="1.5"/>
  <line x1="282" y1="94" x2="300" y2="140" stroke="hsl(124,22%,46%)" stroke-width="1.5"/>
  <!-- right pan -->
  <path d="M256 140 Q282 164 308 140" fill="hsl(124,68%,55%)" fill-opacity="0.15" stroke="hsl(124,75%,66%)" stroke-width="2" stroke-linejoin="round"/>

  <!-- small price tag on high left pan (cut corner + string) -->
  <line x1="118" y1="100" x2="124" y2="92" stroke="hsl(124,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M124 84 L142 84 L150 92 L150 104 L124 104 Z" fill="hsl(124,68%,55%)" fill-opacity="0.35" stroke="hsl(124,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="129" cy="89" r="2" fill="hsl(124,88%,82%)"/>

  <!-- large gold ingot (trapezoid) on low right pan -->
  <path d="M256 116 L308 116 L318 138 L246 138 Z" fill="url(#cv-strategy-value-ingot)" stroke="hsl(124,88%,82%)" stroke-width="2" stroke-linejoin="round"/>
  <line x1="262" y1="123" x2="302" y2="123" stroke="#000" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- margin-of-safety dashed bracket between pan levels -->
  <line x1="200" y1="111" x2="200" y2="151" stroke="hsl(124,88%,82%)" stroke-width="1.5" stroke-dasharray="4 4" stroke-opacity="0.85"/>
  <line x1="195" y1="111" x2="205" y2="111" stroke="hsl(124,88%,82%)" stroke-width="1.5" stroke-opacity="0.85"/>
  <line x1="195" y1="151" x2="205" y2="151" stroke="hsl(124,88%,82%)" stroke-width="1.5" stroke-opacity="0.85"/>

  <!-- hourglass at base of pillar -->
  <path d="M186 178 L214 178 L201 192 L214 206 L186 206 L199 192 Z" fill="hsl(124,68%,55%)" fill-opacity="0.20" stroke="hsl(124,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  <path d="M192 182 L208 182 L200 191 Z" fill="hsl(124,88%,82%)" fill-opacity="0.7"/>
  <line x1="184" y1="178" x2="216" y2="178" stroke="hsl(124,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="184" y1="206" x2="216" y2="206" stroke="hsl(124,75%,66%)" stroke-width="2" stroke-linecap="round"/>
</svg>
