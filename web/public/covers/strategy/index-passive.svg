<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-strategy-index-passive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <clipPath id="cv-strategy-index-passive-sail">
      <path d="M150 64 L150 168 L98 168 Z"/>
    </clipPath>
  </defs>

  <rect width="400" height="250" fill="url(#cv-strategy-index-passive)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="80" y1="40" x2="80" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- distant low sun, long-run goal, far right on horizon -->
  <circle cx="332" cy="158" r="22" fill="hsl(160,68%,55%)" fill-opacity="0.18"/>
  <circle cx="332" cy="158" r="13" fill="hsl(160,88%,82%)" fill-opacity="0.30"/>

  <!-- flat horizon line in lower third -->
  <line x1="40" y1="158" x2="360" y2="158" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- calm sea: parallel horizontal lines beneath horizon -->
  <line x1="48" y1="170" x2="352" y2="170" stroke="hsl(160,22%,46%)" stroke-width="1" stroke-linecap="round"/>
  <line x1="60" y1="180" x2="340" y2="180" stroke="hsl(160,22%,46%)" stroke-width="1" stroke-linecap="round" stroke-opacity="0.85"/>
  <line x1="72" y1="190" x2="328" y2="190" stroke="hsl(160,22%,46%)" stroke-width="1" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="88" y1="200" x2="312" y2="200" stroke="hsl(160,22%,46%)" stroke-width="1" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- wind lines entering from left, pushing in one direction -->
  <path d="M28 78 q22 -5 44 0" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M34 96 q22 -5 44 0" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
  <path d="M30 114 q22 -5 44 0" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.3"/>

  <!-- one large triangular sail, full and taut -->
  <path d="M150 64 L150 168 L98 168 Z" fill="hsl(160,68%,55%)" fill-opacity="0.22"/>
  <!-- woven vertical strips suggesting the whole market -->
  <g clip-path="url(#cv-strategy-index-passive-sail)" stroke="hsl(160,88%,82%)" stroke-width="1" stroke-opacity="0.45">
    <line x1="106" y1="60" x2="106" y2="172"/>
    <line x1="114" y1="60" x2="114" y2="172"/>
    <line x1="122" y1="60" x2="122" y2="172"/>
    <line x1="130" y1="60" x2="130" y2="172"/>
    <line x1="138" y1="60" x2="138" y2="172"/>
    <line x1="146" y1="60" x2="146" y2="172"/>
  </g>
  <path d="M150 64 L150 168 L98 168 Z" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- mast -->
  <line x1="150" y1="60" x2="150" y2="172" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- broad, stable flat-bottomed hull, low in frame -->
  <path d="M104 168 L196 168 L182 184 L118 184 Z" fill="hsl(160,68%,55%)" fill-opacity="0.55"/>
  <path d="M104 168 L196 168 L182 184 L118 184 Z" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
