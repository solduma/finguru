    <g clip-path="url(#cv-school-technical-foot)">
      <g fill="hsl(160,88%,82%)" fill-opacity="0.85" stroke="none" transform="rotate(9 220 134)">
        <!-- each figure: head dot + leaning body line, all facing same direction -->
        <g>
          <!-- row generation done by explicit placements for crisp control -->
          <g transform="translate(170,96)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(186,90)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(202,88)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(218,90)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(234,96)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>

          <g transform="translate(176,112)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(192,110)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(208,108)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(224,110)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(240,114)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>

          <g transform="translate(180,130)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(196,128)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(212,127)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(228,129)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(244,133)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>

          <g transform="translate(190,148)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(206,146)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(222,147)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(238,150)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>

          <g transform="translate(204,164)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(220,164)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(236,166)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>

          <g transform="translate(216,180)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
          <g transform="translate(232,182)"><circle cx="0" cy="0" r="2.1"/><path d="M-1.5 3 l4 9" stroke="hsl(160,88%,82%)" stroke-width="1.6" stroke-linecap="round" fill="none"/></g>
        </g>
      </g>
    </g>

    <!-- re-stroke outline above crowd for a crisp edge -->
    <path d="M236 70 C264 70 280 92 280 118 C280 138 270 152 264 166 C258 180 256 192 244 198 C232 204 214 202 204 192 C196 184 196 172 190 162 C182 148 168 144 160 134 C150 122 152 104 164 92 C178 78 212 70 236 70 Z"
          fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- directional motion arrow / wind-streak along the toe direction (the trend) -->
  <g stroke="hsl(160,88%,82%)" stroke-linecap="round" fill="none">
    <path d="M286 60 L334 50" stroke-width="2" opacity="0.9"/>
    <path d="M322 42 L338 49 L324 60" stroke-width="2" opacity="0.9"/>
    <path d="M280 78 L320 70" stroke-width="1.4" opacity="0.5"/>
    <path d="M284 94 L314 88" stroke-width="1.4" opacity="0.35"/>
  </g>

  <!-- subtle terrain dimple beneath the print -->
  <ellipse cx="216" cy="206" rx="74" ry="9" fill="hsl(160,22%,46%)" opacity="0.18"/>
</svg>
