<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-school-technical" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <clipPath id="cv-school-technical-foot">
      <path d="M236 70 C264 70 280 92 280 118 C280 138 270 152 264 166 C258 180 256 192 244 198 C232 204 214 202 204 192 C196 184 196 172 190 162 C182 148 168 144 160 134 C150 122 152 104 164 92 C178 78 212 70 236 70 Z"/>
    </clipPath>
  </defs>

  <rect width="400" height="250" fill="url(#cv-school-technical)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="212" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="40" x2="300" y2="212" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- faint trailing footprints receding upper-left (path of past steps) -->
  <g fill="hsl(160,68%,55%)" stroke="hsl(160,75%,66%)" stroke-width="1" stroke-linejoin="round">
    <g opacity="0.10" transform="translate(60,72) rotate(-18) scale(0.30)">
      <path d="M236 70 C264 70 280 92 280 118 C280 138 270 152 264 166 C258 180 256 192 244 198 C232 204 214 202 204 192 C196 184 196 172 190 162 C182 148 168 144 160 134 C150 122 152 104 164 92 C178 78 212 70 236 70 Z"/>
    </g>
    <g opacity="0.16" transform="translate(98,98) rotate(-15) scale(0.42)">
      <path d="M236 70 C264 70 280 92 280 118 C280 138 270 152 264 166 C258 180 256 192 244 198 C232 204 214 202 204 192 C196 184 196 172 190 162 C182 148 168 144 160 134 C150 122 152 104 164 92 C178 78 212 70 236 70 Z"/>
    </g>
    <g opacity="0.24" transform="translate(132,128) rotate(-12) scale(0.55)">
      <path d="M236 70 C264 70 280 92 280 118 C280 138 270 152 264 166 C258 180 256 192 244 198 C232 204 214 202 204 192 C196 184 196 172 190 162 C182 148 168 144 160 134 C150 122 152 104 164 92 C178 78 212 70 236 70 Z"/>
    </g>
  </g>

  <!-- MAIN FOOTPRINT, tilted slightly along the forward diagonal -->
  <g transform="rotate(-9 220 134)">
    <!-- footprint pressed into terrain: filled silhouette + outline -->
    <path d="M236 70 C264 70 280 92 280 118 C280 138 270 152 264 166 C258 180 256 192 244 198 C232 204 214 202 204 192 C196 184 196 172 190 162 C182 148 168 144 160 134 C150 122 152 104 164 92 C178 78 212 70 236 70 Z"
