<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-school-fundamental" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-school-fundamental-cube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(35,68%,55%)" stop-opacity="0.9"/>
      <stop offset="1" stop-color="hsl(35,68%,55%)" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-school-fundamental)"/>

  <!-- shared frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="80" y1="40" x2="80" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- margin-of-safety cushion band across lower third -->
    <rect x="50" y="182" width="300" height="22" rx="3" fill="hsl(35,68%,55%)" fill-opacity="0.12" stroke="hsl(35,75%,66%)" stroke-opacity="0.4" stroke-width="1"/>
    <!-- notch marks in the buffer band -->
    <g stroke="hsl(35,75%,66%)" stroke-opacity="0.5" stroke-width="1">
      <line x1="80" y1="186" x2="80" y2="200"/>
      <line x1="110" y1="186" x2="110" y2="200"/>
      <line x1="140" y1="186" x2="140" y2="200"/>
      <line x1="170" y1="186" x2="170" y2="200"/>
      <line x1="200" y1="186" x2="200" y2="200"/>
      <line x1="230" y1="186" x2="230" y2="200"/>
      <line x1="260" y1="186" x2="260" y2="200"/>
      <line x1="290" y1="186" x2="290" y2="200"/>
      <line x1="320" y1="186" x2="320" y2="200"/>
    </g>

    <!-- classical column / pediment stand -->
    <!-- pediment triangle = fulcrum top -->
    <path d="M200 96 L186 116 L214 116 Z" fill="hsl(35,68%,55%)" fill-opacity="0.85" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <!-- column shaft -->
    <rect x="190" y="116" width="20" height="52" fill="hsl(35,68%,55%)" fill-opacity="0.3" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <!-- column flutes -->
    <line x1="196" y1="120" x2="196" y2="164" stroke="hsl(35,75%,66%)" stroke-opacity="0.45" stroke-width="1"/>
    <line x1="200" y1="120" x2="200" y2="164" stroke="hsl(35,75%,66%)" stroke-opacity="0.45" stroke-width="1"/>
    <line x1="204" y1="120" x2="204" y2="164" stroke="hsl(35,75%,66%)" stroke-opacity="0.45" stroke-width="1"/>
    <!-- column base -->
    <rect x="180" y="168" width="40" height="10" rx="2" fill="hsl(35,68%,55%)" fill-opacity="0.5" stroke="hsl(35,75%,66%)" stroke-width="2"/>

    <!-- balance beam tilting (value pan low-left, price pan high-right) -->
    <line x1="200" y1="96" x2="92" y2="118" stroke="hsl(35,75%,66%)" stroke-width="3"/>
    <line x1="200" y1="96" x2="308" y2="74" stroke="hsl(35,75%,66%)" stroke-width="3"/>
    <circle cx="200" cy="96" r="4" fill="hsl(35,88%,82%)"/>

    <!-- LEFT (low) suspension lines -->
    <line x1="92" y1="118" x2="74" y2="148" stroke="hsl(35,75%,66%)" stroke-width="1.5"/>
    <line x1="92" y1="118" x2="110" y2="148" stroke="hsl(35,75%,66%)" stroke-width="1.5"/>
    <!-- left pan (heavy, low) -->
    <path d="M62 148 L122 148 L112 162 L72 162 Z" fill="hsl(35,68%,55%)" fill-opacity="0.25" stroke="hsl(35,75%,66%)" stroke-width="2"/>

    <!-- solid faceted stone cube in low pan (intrinsic value) -->
    <g>
      <!-- top face -->
      <path d="M76 120 L100 112 L118 122 L94 130 Z" fill="hsl(35,88%,82%)" fill-opacity="0.85" stroke="hsl(35,75%,66%)" stroke-width="2"/>
      <!-- left face -->
      <path d="M76 120 L94 130 L94 150 L76 140 Z" fill="url(#cv-school-fundamental-cube)" stroke="hsl(35,75%,66%)" stroke-width="2"/>
      <!-- right face -->
      <path d="M94 130 L118 122 L118 142 L94 150 Z" fill="hsl(35,68%,55%)" fill-opacity="0.5" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    </g>

    <!-- RIGHT (high) suspension lines -->
    <line x1="308" y1="74" x2="290" y2="104" stroke="hsl(35,75%,66%)" stroke-width="1.5"/>
    <line x1="308" y1="74" x2="326" y2="104" stroke="hsl(35,75%,66%)" stroke-width="1.5"/>
    <!-- right pan (light, high) -->
    <path d="M278 104 L338 104 L328 118 L288 118 Z" fill="hsl(35,68%,55%)" fill-opacity="0.18" stroke="hsl(35,75%,66%)" stroke-width="2"/>

    <!-- small light price tag on a string in high pan -->
    <line x1="308" y1="90" x2="308" y2="100" stroke="hsl(35,75%,66%)" stroke-width="1.5"/>
    <path d="M300 82 L314 82 L322 92 L314 102 L300 102 Z" fill="hsl(35,68%,55%)" fill-opacity="0.4" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <circle cx="318" cy="92" r="2" fill="none" stroke="hsl(35,88%,82%)" stroke-width="1.5"/>

  </g>
</svg>
