<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-school-quant" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(270,45%,13%)"/>
      <stop offset="1" stop-color="hsl(270,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-school-quant)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="100" y1="40" x2="100" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="40" x2="300" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- faint matrix grid backdrop behind the lens -->
  <g stroke="hsl(270,22%,46%)" stroke-opacity="0.30" stroke-width="1">
    <rect x="158" y="78" width="20" height="20" fill="none"/>
    <rect x="178" y="78" width="20" height="20" fill="none"/>
    <rect x="198" y="78" width="20" height="20" fill="none"/>
    <rect x="218" y="78" width="20" height="20" fill="none"/>
    <rect x="158" y="98" width="20" height="20" fill="none"/>
    <rect x="178" y="98" width="20" height="20" fill="none"/>
    <rect x="198" y="98" width="20" height="20" fill="none"/>
    <rect x="218" y="98" width="20" height="20" fill="none"/>
    <rect x="158" y="118" width="20" height="20" fill="none"/>
    <rect x="178" y="118" width="20" height="20" fill="none"/>
    <rect x="198" y="118" width="20" height="20" fill="none"/>
    <rect x="218" y="118" width="20" height="20" fill="none"/>
    <rect x="158" y="138" width="20" height="20" fill="none"/>
    <rect x="178" y="138" width="20" height="20" fill="none"/>
    <rect x="198" y="138" width="20" height="20" fill="none"/>
    <rect x="218" y="138" width="20" height="20" fill="none"/>
  </g>

  <!-- converging guide vectors through the lens -->
  <g stroke="hsl(270,75%,66%)" stroke-opacity="0.30" stroke-width="1" stroke-linecap="round">
    <line x1="55" y1="70" x2="198" y2="118"/>
    <line x1="48" y1="118" x2="198" y2="118"/>
    <line x1="60" y1="170" x2="198" y2="118"/>
    <line x1="198" y1="118" x2="345" y2="78"/>
    <line x1="198" y1="118" x2="345" y2="118"/>
    <line x1="198" y1="118" x2="345" y2="158"/>
  </g>

  <!-- chaotic raw data dot-cloud (left) -->
  <g fill="hsl(270,22%,46%)" fill-opacity="0.85">
    <circle cx="46" cy="62" r="3"/>
    <circle cx="68" cy="78" r="3"/>
    <circle cx="40" cy="92" r="3"/>
    <circle cx="58" cy="104" r="3"/>
    <circle cx="76" cy="118" r="3"/>
    <circle cx="44" cy="130" r="3"/>
    <circle cx="64" cy="146" r="3"/>
    <circle cx="50" cy="160" r="3"/>
    <circle cx="72" cy="172" r="3"/>
    <circle cx="38" cy="116" r="3"/>
    <circle cx="60" cy="62" r="3"/>
    <circle cx="84" cy="98" r="3"/>
    <circle cx="82" cy="148" r="3"/>
    <circle cx="54" cy="84" r="3"/>
  </g>

  <!-- central triangular prism / lens (focal, slightly above center) -->
  <g>
    <polygon points="198,62 248,148 148,148" fill="hsl(270,68%,55%)" fill-opacity="0.18"
             stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
    <!-- inner facets -->
    <line x1="198" y1="62" x2="198" y2="148" stroke="hsl(270,88%,82%)" stroke-opacity="0.55" stroke-width="1"/>
    <line x1="175" y1="105" x2="221" y2="105" stroke="hsl(270,88%,82%)" stroke-opacity="0.45" stroke-width="1"/>
    <!-- circular lens core -->
    <circle cx="198" cy="118" r="14" fill="hsl(270,68%,55%)" fill-opacity="0.30"
            stroke="hsl(270,88%,82%)" stroke-width="2"/>
    <circle cx="198" cy="118" r="5" fill="hsl(270,88%,82%)" fill-opacity="0.85"/>
  </g>

  <!-- ordered sorted streams (right) -->
  <g fill="hsl(270,68%,55%)">
    <!-- row 1 -->
    <circle cx="276" cy="80" r="3.2" fill-opacity="0.9"/>
    <circle cx="296" cy="80" r="3.2" fill-opacity="0.9"/>
    <circle cx="316" cy="80" r="3.2" fill-opacity="0.9"/>
    <circle cx="336" cy="80" r="3.2" fill-opacity="0.9"/>
    <!-- row 2 -->
    <circle cx="276" cy="106" r="3.2" fill-opacity="0.75"/>
    <circle cx="296" cy="106" r="3.2" fill-opacity="0.75"/>
    <circle cx="316" cy="106" r="3.2" fill-opacity="0.75"/>
    <circle cx="336" cy="106" r="3.2" fill-opacity="0.75"/>
    <!-- row 3 -->
    <circle cx="276" cy="132" r="3.2" fill-opacity="0.9"/>
    <circle cx="296" cy="132" r="3.2" fill-opacity="0.9"/>
    <circle cx="316" cy="132" r="3.2" fill-opacity="0.9"/>
    <circle cx="336" cy="132" r="3.2" fill-opacity="0.9"/>
    <!-- row 4 -->
    <circle cx="276" cy="158" r="3.2" fill-opacity="0.75"/>
    <circle cx="296" cy="158" r="3.2" fill-opacity="0.75"/>
    <circle cx="316" cy="158" r="3.2" fill-opacity="0.75"/>
    <circle cx="336" cy="158" r="3.2" fill-opacity="0.75"/>
  </g>

  <!-- highlight stream lines guiding sorted rows -->
  <g stroke="hsl(270,75%,66%)" stroke-opacity="0.40" stroke-width="1" stroke-linecap="round">
    <line x1="266" y1="80" x2="346" y2="80"/>
    <line x1="266" y1="106" x2="346" y2="106"/>
    <line x1="266" y1="132" x2="346" y2="132"/>
    <line x1="266" y1="158" x2="346" y2="158"/>
  </g>
</svg>
