<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-alan-farley" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-alan-farley-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="hsl(160,88%,82%)" stop-opacity="0.9"/>
      <stop offset="1" stop-color="hsl(160,88%,82%)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-alan-farley)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#fff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="250" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="0" x2="280" y2="250" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- convergence point (lower-right arc of ring) approx (252,150) -->

  <!-- dashed alignment lines from each hub through to shared point -->
  <g stroke="hsl(160,22%,46%)" stroke-width="1" stroke-dasharray="3 5" stroke-opacity="0.6">
    <line x1="58" y1="62" x2="252" y2="150"/>
    <line x1="356" y1="120" x2="252" y2="150"/>
    <line x1="70" y1="196" x2="252" y2="150"/>
  </g>

  <!-- cycle ring: divided into four arcs with small gaps -->
  <g fill="none" stroke-linecap="round">
    <!-- base faint ring -->
    <circle cx="200" cy="125" r="72" stroke="hsl(160,22%,46%)" stroke-width="1" stroke-opacity="0.4"/>
    <!-- four arc segments (radius 72, centered 200,125) -->
    <!-- arc top: 225deg->315deg -->
    <path d="M 149.1 74.1 A 72 72 0 0 1 250.9 74.1" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- arc right: 315deg->45deg (lower-right contains convergence) -->
    <path d="M 250.9 74.1 A 72 72 0 0 1 250.9 175.9" stroke="hsl(160,68%,55%)" stroke-width="3"/>
    <!-- arc bottom: 45deg->135deg -->
    <path d="M 250.9 175.9 A 72 72 0 0 1 149.1 175.9" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- arc left: 135deg->225deg -->
    <path d="M 149.1 175.9 A 72 72 0 0 1 149.1 74.1" stroke="hsl(160,75%,66%)" stroke-width="2"/>
  </g>

  <!-- tick marks around edge -->
  <g stroke="hsl(160,75%,66%)" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round">
    <line x1="200" y1="47" x2="200" y2="54"/>
    <line x1="278" y1="125" x2="271" y2="125"/>
    <line x1="200" y1="203" x2="200" y2="196"/>
    <line x1="122" y1="125" x2="129" y2="125"/>
    <line x1="255.1" y1="70.9" x2="250.1" y2="75.9"/>
    <line x1="255.1" y1="179.1" x2="250.1" y2="174.1"/>
    <line x1="144.9" y1="179.1" x2="149.9" y2="174.1"/>
    <line x1="144.9" y1="70.9" x2="149.9" y2="75.9"/>
  </g>

  <!-- highlighted notch/wedge on lower-right arc where needles meet -->
  <g>
    <path d="M 200 125 L 240 162 A 72 72 0 0 1 265 132 Z" fill="hsl(160,68%,55%)" fill-opacity="0.18"/>
    <line x1="252" y1="150" x2="232" y2="131" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  </g>

  <!-- three needle hubs -->
  <g>
    <circle cx="58" cy="62" r="6" fill="hsl(160,38%,7%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="58" cy="62" r="2" fill="hsl(160,75%,66%)"/>
    <circle cx="356" cy="120" r="6" fill="hsl(160,38%,7%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="356" cy="120" r="2" fill="hsl(160,75%,66%)"/>
    <circle cx="70" cy="196" r="6" fill="hsl(160,38%,7%)" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="70" cy="196" r="2" fill="hsl(160,75%,66%)"/>
  </g>

  <!-- three slim needles converging on (252,150) -->
  <g stroke-linecap="round">
    <!-- upper-left needle -->
    <line x1="58" y1="62" x2="252" y2="150" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <!-- right needle -->
    <line x1="356" y1="120" x2="252" y2="150" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <!-- lower-left needle -->
    <line x1="70" y1="196" x2="252" y2="150" stroke="hsl(160,88%,82%)" stroke-width="2"/>
  </g>

  <!-- convergence glow + starburst + filled dot -->
  <circle cx="252" cy="150" r="26" fill="url(#cv-guru-alan-farley-glow)"/>
  <g stroke="hsl(160,88%,82%)" stroke-width="1.5" stroke-linecap="round">
    <line x1="252" y1="135" x2="252" y2="142"/>
    <line x1="252" y1="158" x2="252" y2="165"/>
    <line x1="237" y1="150" x2="244" y2="150"/>
    <line x1="260" y1="150" x2="267" y2="150"/>
    <line x1="241.4" y1="139.4" x2="246.3" y2="144.3"/>
    <line x1="257.7" y1="155.7" x2="262.6" y2="160.6"/>
    <line x1="262.6" y1="139.4" x2="257.7" y2="144.3"/>
    <line x1="246.3" y1="155.7" x2="241.4" y2="160.6"/>
  </g>
  <circle cx="252" cy="150" r="5" fill="hsl(160,88%,82%)"/>
  <circle cx="252" cy="150" r="2.2" fill="hsl(160,38%,7%)"/>
</svg>
