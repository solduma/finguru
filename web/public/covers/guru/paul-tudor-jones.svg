<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-paul-tudor-jones-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(200,45%,13%)"/>
      <stop offset="1" stop-color="hsl(200,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-paul-tudor-jones-boulder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(200,68%,55%)"/>
      <stop offset="1" stop-color="hsl(200,68%,40%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-paul-tudor-jones-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(200,68%,55%)" stop-opacity="0.30"/>
      <stop offset="1" stop-color="hsl(200,68%,55%)" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-paul-tudor-jones-bg)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="140" y1="40" x2="140" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="260" y1="40" x2="260" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="120" x2="360" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- central post / column up to fulcrum -->
  <line x1="150" y1="100" x2="150" y2="200" stroke="hsl(200,22%,46%)" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="150" cy="200" rx="34" ry="7" fill="hsl(200,22%,46%)" fill-opacity="0.35"/>

  <!-- off-center triangular fulcrum -->
  <path d="M150 60 L168 100 L132 100 Z" fill="hsl(200,68%,55%)" fill-opacity="0.85" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linejoin="round"/>

  <!-- tilted balance beam: short low-left, long high-right; pivots at (150,60) -->
  <g stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- beam -->
    <line x1="96" y1="98" x2="330" y2="20"/>
    <!-- pivot cap -->
    <circle cx="150" cy="60" r="4.5" fill="hsl(200,88%,82%)" stroke="none"/>
  </g>

  <!-- 5-to-1 ratio etched on beam: five small markers (near short arm) vs one large block (near long arm) -->
  <g stroke="hsl(200,88%,82%)" stroke-width="2" stroke-linecap="round">
    <line x1="106" y1="91" x2="108" y2="98"/>
    <line x1="114" y1="89" x2="116" y2="96"/>
    <line x1="122" y1="86" x2="124" y2="93"/>
    <line x1="130" y1="84" x2="132" y2="91"/>
    <line x1="138" y1="81" x2="140" y2="88"/>
  </g>
  <rect x="270" y="22" width="20" height="14" rx="2" transform="rotate(-18 280 29)" fill="hsl(200,88%,82%)" fill-opacity="0.85"/>

  <!-- SHORT LEFT ARM: hanger + low pan with shield + pebble -->
  <line x1="100" y1="97" x2="92" y2="150" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="97" x2="124" y2="150" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- protective shield behind the small pan (defense first) -->
  <path d="M93 138 L123 138 L123 156 Q123 176 108 186 Q93 176 93 156 Z"
        fill="url(#cv-guru-paul-tudor-jones-shield)" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  <line x1="108" y1="140" x2="108" y2="182" stroke="hsl(200,75%,66%)" stroke-width="1" stroke-opacity="0.6"/>

  <!-- low pan (short arm) -->
  <path d="M86 152 Q108 168 130 152" fill="none" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="152" x2="130" y2="152" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- small pebble (controlled loss) on the pan -->
  <ellipse cx="108" cy="148" rx="11" ry="8" fill="hsl(200,68%,55%)" stroke="hsl(200,88%,82%)" stroke-width="1.5"/>
  <ellipse cx="104" cy="145" rx="3" ry="2" fill="hsl(200,88%,82%)" fill-opacity="0.7"/>

  <!-- LONG RIGHT ARM: hanger + elevated pan with boulder (focal high point) -->
  <line x1="320" y1="23" x2="304" y2="74" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="320" y1="23" x2="346" y2="74" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- elevated pan (long arm) -->
  <path d="M296 76 Q325 96 354 76" fill="none" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="296" y1="76" x2="354" y2="76" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- large boulder (the outsized win) lifted high -->
  <path d="M306 70 L312 50 L330 44 L346 54 L348 70 Z"
        fill="url(#cv-guru-paul-tudor-jones-boulder)" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  <path d="M312 50 L322 60 L330 44" fill="none" stroke="hsl(200,88%,82%)" stroke-width="1" stroke-opacity="0.7" stroke-linejoin="round"/>
  <path d="M322 60 L348 70" fill="none" stroke="hsl(200,38%,7%)" stroke-width="1" stroke-opacity="0.4"/>

  <!-- subtle lift sparkle above boulder -->
  <g stroke="hsl(200,88%,82%)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.8">
    <line x1="330" y1="34" x2="330" y2="40"/>
    <line x1="324" y1="37" x2="336" y2="37"/>
  </g>
</svg>
