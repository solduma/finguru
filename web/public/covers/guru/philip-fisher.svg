<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-philip-fisher" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-philip-fisher-canopy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(35,68%,55%)" stop-opacity="0.55"/>
      <stop offset="1" stop-color="hsl(35,68%,55%)" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="cv-guru-philip-fisher-lens" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="hsl(35,88%,82%)" stop-opacity="0.22"/>
      <stop offset="0.7" stop-color="hsl(35,88%,82%)" stop-opacity="0.10"/>
      <stop offset="1" stop-color="hsl(35,88%,82%)" stop-opacity="0.02"/>
    </radialGradient>
    <clipPath id="cv-guru-philip-fisher-lensclip">
      <circle cx="210" cy="170" r="50"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-philip-fisher)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="40" x2="300" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="148" x2="400" y2="148" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ground / soil line -->
  <line x1="40" y1="148" x2="360" y2="148" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- ===== small saplings cluster, lower-left, for scale contrast ===== -->
  <g stroke="hsl(35,22%,46%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M70 148 L70 128 M70 136 L62 128 M70 134 L78 126"/>
    <path d="M92 148 L92 132 M92 140 L86 134 M92 138 L98 132"/>
    <path d="M52 148 L52 138 M52 143 L47 138 M52 142 L57 137"/>
  </g>
  <circle cx="70" cy="124" r="6" fill="hsl(35,68%,55%)" fill-opacity="0.20"/>
  <circle cx="92" cy="129" r="5" fill="hsl(35,68%,55%)" fill-opacity="0.18"/>
  <circle cx="52" cy="135" r="4" fill="hsl(35,68%,55%)" fill-opacity="0.16"/>

  <!-- ===== footprint trail curving from lower-left toward the tree ===== -->
  <g fill="hsl(35,88%,82%)" fill-opacity="0.55">
    <ellipse cx="55" cy="198" rx="4.5" ry="3" transform="rotate(28 55 198)"/>
    <ellipse cx="80" cy="190" rx="4.5" ry="3" transform="rotate(28 80 190)"/>
    <ellipse cx="106" cy="185" rx="4.5" ry="3" transform="rotate(20 106 185)"/>
    <ellipse cx="134" cy="183" rx="4.5" ry="3" transform="rotate(12 134 183)"/>
    <ellipse cx="163" cy="184" rx="4.5" ry="3" transform="rotate(6 163 184)"/>
    <ellipse cx="192" cy="188" rx="4.5" ry="3" transform="rotate(0 192 188)"/>
  </g>

  <!-- ===== the great tree (right-of-center focal point) ===== -->
  <!-- canopy -->
  <g>
    <path d="M255 86
             C218 86 200 64 224 44
             C232 26 268 22 282 38
             C312 30 332 56 314 76
             C328 86 320 110 296 108
             C300 124 270 130 258 116
             C238 124 224 108 234 94 Z"
          fill="url(#cv-guru-philip-fisher-canopy)"
          stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M250 70 C260 60 280 58 292 66 M262 90 C272 80 290 80 302 88 M248 96 C258 92 270 92 280 98"
          fill="none" stroke="hsl(35,88%,82%)" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- trunk -->
  <path d="M268 108 C266 124 269 138 271 148 L283 148 C285 138 288 124 286 108 Z"
        fill="hsl(35,68%,55%)" fill-opacity="0.40"
        stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  <path d="M276 110 L276 148" stroke="hsl(35,88%,82%)" stroke-width="1" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- ===== magnified deep root system (below soil) ===== -->
  <g fill="none" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.85">
    <path d="M277 148 L277 178"/>
    <path d="M277 162 C262 168 250 180 244 198"/>
    <path d="M277 162 C292 168 304 180 312 200"/>
    <path d="M277 178 C268 186 262 198 260 210"/>
    <path d="M277 178 C288 186 296 198 300 210"/>
    <path d="M244 198 C238 204 234 210 232 216"/>
    <path d="M312 200 C318 206 322 212 324 218"/>
  </g>
  <!-- finer root hairs -->
  <g fill="none" stroke="hsl(35,75%,66%)" stroke-width="1" stroke-linecap="round" stroke-opacity="0.55">
    <path d="M260 184 L252 192 M260 184 L268 194"/>
    <path d="M296 186 L290 196 M296 186 L304 195"/>
    <path d="M277 178 L277 200 L270 208 M277 200 L284 208"/>
    <path d="M244 198 L238 200 M312 200 L318 202"/>
  </g>

  <!-- ===== magnifying glass over trunk-and-root base (second focal anchor) ===== -->
  <!-- lens glow over the roots -->
  <circle cx="210" cy="170" r="50" fill="url(#cv-guru-philip-fisher-lens)"/>
  <!-- emphasized magnified roots inside lens -->
  <g clip-path="url(#cv-guru-philip-fisher-lensclip)" fill="none" stroke="hsl(35,88%,82%)" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9">
    <path d="M213 130 L213 165" stroke-width="2.5"/>
    <path d="M213 150 C198 158 188 172 184 190" stroke-width="2.5"/>
    <path d="M213 150 C228 158 236 170 240 188" stroke-width="2.5"/>
    <path d="M213 165 C205 176 200 188 198 200" stroke-width="2"/>
    <path d="M213 165 C221 176 226 188 228 200" stroke-width="2"/>
    <path d="M196 178 L188 186 M196 178 L204 188" stroke-width="1.2"/>
    <path d="M230 180 L224 190 M230 180 L238 189" stroke-width="1.2"/>
  </g>
  <!-- lens rim -->
  <circle cx="210" cy="170" r="50" fill="none" stroke="hsl(35,75%,66%)" stroke-width="3"/>
  <circle cx="210" cy="170" r="50" fill="none" stroke="hsl(35,88%,82%)" stroke-width="1" stroke-opacity="0.6"/>
  <!-- glass highlight arc -->
  <path d="M180 150 A50 50 0 0 1 222 132" fill="none" stroke="hsl(35,88%,82%)" stroke-width="2" stroke-opacity="0.55" stroke-linecap="round"/>
  <!-- angled handle -->
  <line x1="245" y1="205" x2="282" y2="242" stroke="hsl(35,75%,66%)" stroke-width="7" stroke-linecap="round"/>
  <line x1="245" y1="205" x2="282" y2="242" stroke="hsl(35,68%,55%)" stroke-width="3" stroke-linecap="round" stroke-opacity="0.7"/>
</svg>
