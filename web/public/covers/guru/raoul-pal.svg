<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-raoul-pal-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(200,45%,13%)"/>
      <stop offset="1" stop-color="hsl(200,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-raoul-pal-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(200,68%,55%)" stop-opacity="0.32"/>
      <stop offset="1" stop-color="hsl(200,68%,55%)" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="cv-guru-raoul-pal-water">
      <path d="M0,128 Q25,121 50,128 T100,128 T150,128 T200,128 T250,128 T300,128 T350,128 T400,128 L400,250 L0,250 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#cv-guru-raoul-pal-bg)"/>

  <!-- Shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="40" y1="20" x2="40" y2="230" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="360" y1="20" x2="360" y2="230" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Sea fill (below water, darker) -->
  <path d="M0,128 Q25,121 50,128 T100,128 T150,128 T200,128 T250,128 T300,128 T350,128 T400,128 L400,250 L0,250 Z" fill="url(#cv-guru-raoul-pal-sea)"/>

  <!-- Faint vertical wave-direction arrows (tide climbing) -->
  <g stroke="hsl(200,75%,66%)" stroke-width="1" stroke-opacity="0.22" stroke-linecap="round" fill="none">
    <line x1="80" y1="195" x2="80" y2="160"/>
    <path d="M75,167 L80,159 L85,167"/>
    <line x1="215" y1="200" x2="215" y2="168"/>
    <path d="M210,175 L215,167 L220,175"/>
    <line x1="320" y1="198" x2="320" y2="163"/>
    <path d="M315,170 L320,162 L325,170"/>
  </g>

  <!-- Crescent moon (top-right) with pull-arcs -->
  <g>
    <path d="M348,38 a16,16 0 1 0 9,29 a13,13 0 1 1 -9,-29 Z" fill="hsl(200,88%,82%)" fill-opacity="0.85"/>
    <g stroke="hsl(200,75%,66%)" stroke-width="1" stroke-opacity="0.45" fill="none" stroke-linecap="round">
      <path d="M334,60 Q300,96 268,116"/>
      <path d="M344,68 Q316,104 286,122"/>
      <path d="M324,54 Q286,86 252,108"/>
    </g>
  </g>

  <!-- Sea-surface wavy line (rising toward hurdle) -->
  <path d="M0,128 Q25,121 50,128 T100,128 T150,128 T200,128 T250,128 T300,128 T350,128 T400,128"
        fill="none" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Crescent ripples on surface -->
  <g stroke="hsl(200,88%,82%)" stroke-width="1" stroke-opacity="0.5" fill="none" stroke-linecap="round" clip-path="url(#cv-guru-raoul-pal-water)">
    <path d="M120,138 q6,-4 12,0"/>
    <path d="M180,146 q6,-4 12,0"/>
    <path d="M300,140 q6,-4 12,0"/>
    <path d="M260,152 q6,-4 12,0"/>
  </g>

  <!-- Tide-gauge post (focal anchor, slightly left of center) -->
  <g>
    <line x1="150" y1="48" x2="150" y2="205" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>
    <!-- evenly spaced notches -->
    <g stroke="hsl(200,22%,46%)" stroke-width="1.5" stroke-linecap="round">
      <line x1="150" y1="62" x2="161" y2="62"/>
      <line x1="150" y1="78" x2="158" y2="78"/>
      <line x1="150" y1="94" x2="161" y2="94"/>
      <line x1="150" y1="110" x2="158" y2="110"/>
      <line x1="150" y1="128" x2="158" y2="128"/>
      <line x1="150" y1="146" x2="158" y2="146"/>
      <line x1="150" y1="164" x2="158" y2="164"/>
      <line x1="150" y1="182" x2="158" y2="182"/>
    </g>
    <!-- bold hurdle notch near top (~11% waterline, upper third) -->
    <g>
      <line x1="139" y1="88" x2="172" y2="88" stroke="hsl(200,88%,82%)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="172" cy="88" r="3" fill="hsl(200,88%,82%)"/>
    </g>
  </g>

  <!-- Three buoys at staggered heights -->
  <!-- 1: winner, bobbing above waterline -->
  <g stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <line x1="232" y1="112" x2="232" y2="96"/>
    <circle cx="232" cy="118" r="13" fill="hsl(200,68%,55%)" fill-opacity="0.5"/>
    <path d="M222,123 a13,13 0 0 0 20,0" fill="hsl(200,68%,55%)" fill-opacity="0.85"/>
    <circle cx="232" cy="96" r="2.5" fill="hsl(200,88%,82%)" stroke="none"/>
  </g>

  <!-- 2: break-even, exactly at waterline -->
  <g stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <line x1="300" y1="124" x2="300" y2="110"/>
    <circle cx="300" cy="128" r="12" fill="hsl(200,68%,55%)" fill-opacity="0.5"/>
    <path d="M291,132 a12,12 0 0 0 18,0" fill="hsl(200,68%,55%)" fill-opacity="0.85" clip-path="url(#cv-guru-raoul-pal-water)"/>
    <circle cx="300" cy="110" r="2.5" fill="hsl(200,88%,82%)" stroke="none"/>
  </g>

  <!-- 3: sinker, half-submerged below waterline -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <circle cx="350" cy="146" r="12" fill="hsl(200,22%,46%)" fill-opacity="0.40"/>
    <path d="M338,140 a12,12 0 0 0 24,0" fill="none" stroke="hsl(200,22%,46%)" stroke-width="2" stroke-opacity="0.7"/>
    <line x1="350" y1="134" x2="350" y2="124" stroke="hsl(200,22%,46%)" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="350" cy="124" r="2" fill="hsl(200,22%,46%)" fill-opacity="0.7" stroke="none"/>
  </g>

  <!-- Post base in water -->
  <line x1="142" y1="205" x2="158" y2="205" stroke="hsl(200,22%,46%)" stroke-width="2" stroke-linecap="round"/>
</svg>
