<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-terry-smith-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-terry-smith-pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(35,68%,55%)" stop-opacity="0.55"/>
      <stop offset="1" stop-color="hsl(35,68%,55%)" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="cv-guru-terry-smith-crown" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="hsl(35,68%,55%)" stop-opacity="0.4"/>
      <stop offset="1" stop-color="hsl(35,68%,55%)" stop-opacity="0.12"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-terry-smith-bg)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ===== TREE CROWN (compounding fruit) ===== -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="200" cy="118" r="40" fill="url(#cv-guru-terry-smith-crown)"/>
    <!-- round fruits -->
    <circle cx="184" cy="108" r="7" fill="hsl(35,68%,55%)" fill-opacity="0.9" stroke="hsl(35,88%,82%)" stroke-width="1.5"/>
    <circle cx="214" cy="104" r="7" fill="hsl(35,68%,55%)" fill-opacity="0.9" stroke="hsl(35,88%,82%)" stroke-width="1.5"/>
    <circle cx="206" cy="132" r="7" fill="hsl(35,68%,55%)" fill-opacity="0.9" stroke="hsl(35,88%,82%)" stroke-width="1.5"/>
    <!-- small leaf accents -->
    <path d="M178 90 q-10 -6 -4 -16 q10 4 4 16Z" fill="hsl(35,68%,55%)" fill-opacity="0.4"/>
    <path d="M224 92 q10 -6 4 -16 q-10 4 -4 16Z" fill="hsl(35,68%,55%)" fill-opacity="0.4"/>
  </g>

  <!-- trunk -->
  <g stroke="hsl(35,75%,66%)" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M200 152 L200 178"/>
  </g>
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M200 158 l-12 -8 M200 165 l13 -7"/>
  </g>

  <!-- ===== POT ===== -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M170 178 L230 178 L223 200 L177 200 Z" fill="url(#cv-guru-terry-smith-pot)"/>
    <!-- pot rim -->
    <rect x="166" y="172" width="68" height="8" rx="3" fill="hsl(35,68%,55%)" fill-opacity="0.35"/>
    <!-- three notches (three-sentence rulebook) -->
    <line x1="184" y1="174" x2="184" y2="178" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <line x1="200" y1="174" x2="200" y2="178" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <line x1="216" y1="174" x2="216" y2="178" stroke="hsl(35,88%,82%)" stroke-width="2"/>
  </g>

  <!-- ===== ROOTS (steady compounding) ===== -->
  <g stroke="hsl(35,22%,46%)" stroke-width="2" stroke-linecap="round" fill="none" stroke-opacity="0.85">
    <path d="M185 200 q-14 6 -16 18 q-2 10 -16 12"/>
    <path d="M200 200 q0 12 -4 20 q-4 8 -16 10"/>
    <path d="M215 200 q14 6 18 16 q4 12 18 14"/>
    <path d="M208 200 q8 10 24 12"/>
  </g>

  <!-- ===== PRICE TAG (don't overpay) ===== -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M234 176 q22 4 34 18" stroke-opacity="0.7"/>
    <path d="M268 188 l22 14 l10 18 l-16 10 l-18 -8 Z" fill="hsl(35,68%,55%)" fill-opacity="0.25"/>
    <circle cx="276" cy="198" r="3.5" fill="hsl(35,88%,82%)" stroke="none"/>
  </g>

  <!-- ===== FOLDED / CLASPED HANDS (do nothing) ===== -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="hsl(35,68%,55%)" fill-opacity="0.22">
    <!-- lower clasped base -->
    <path d="M150 78 q50 -22 100 0 q6 14 -10 18 q-40 10 -80 0 q-16 -4 -10 -18 Z"/>
    <!-- left hand fingers overlapping -->
    <g fill="hsl(35,68%,55%)" fill-opacity="0.32">
      <path d="M168 74 q10 -16 24 -16 q6 0 8 8 q-4 12 -16 14 q-12 2 -16 -6 Z"/>
      <path d="M186 72 q8 -18 22 -16 q6 2 6 10 q-6 12 -18 12 q-10 0 -10 -6 Z"/>
      <path d="M204 72 q8 -18 22 -14 q6 2 4 11 q-7 11 -19 10 q-9 -1 -7 -7 Z"/>
    </g>
    <!-- thumb resting on top -->
    <path d="M196 70 q12 -6 26 -2 q4 6 -2 11 q-12 4 -22 -2 q-4 -4 -2 -7 Z" fill="hsl(35,88%,82%)" fill-opacity="0.18"/>
  </g>

  <!-- stillness accents around hands (negative-space restraint) -->
  <g stroke="hsl(35,88%,82%)" stroke-width="1" stroke-linecap="round" stroke-opacity="0.45" fill="none">
    <path d="M132 64 l-8 -3 M270 64 l8 -3 M200 44 l0 -8"/>
  </g>
</svg>
