<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-ray-dalio" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(200,45%,13%)"/>
      <stop offset="1" stop-color="hsl(200,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-ray-dalio-hub" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="hsl(200,88%,82%)"/>
      <stop offset="1" stop-color="hsl(200,68%,55%)"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-ray-dalio)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="0" x2="280" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ===== SEASON WHEEL (centered) ===== -->
  <g transform="translate(200,120)">

    <!-- quadrant fills -->
    <path d="M0 0 L0 -84 A84 84 0 0 1 84 0 Z" fill="hsl(200,68%,55%)" fill-opacity="0.20"/>
    <path d="M0 0 L84 0 A84 84 0 0 1 0 84 Z" fill="hsl(200,68%,55%)" fill-opacity="0.12"/>
    <path d="M0 0 L0 84 A84 84 0 0 1 -84 0 Z" fill="hsl(200,68%,55%)" fill-opacity="0.20"/>
    <path d="M0 0 L-84 0 A84 84 0 0 1 0 -84 Z" fill="hsl(200,68%,55%)" fill-opacity="0.12"/>

    <!-- outer rim -->
    <circle cx="0" cy="0" r="84" fill="none" stroke="hsl(200,75%,66%)" stroke-width="2"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="hsl(200,22%,46%)" stroke-width="1" stroke-opacity="0.7"/>

    <!-- crosshair dividers -->
    <line x1="0" y1="-84" x2="0" y2="84" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="-84" y1="0" x2="84" y2="0" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- weather glyphs in each quadrant -->
    <!-- top-right: sun -->
    <g transform="translate(46,-46)" stroke="hsl(200,88%,82%)" stroke-width="1.5" fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="7" fill="hsl(200,88%,82%)" fill-opacity="0.25"/>
      <line x1="0" y1="-12" x2="0" y2="-9"/>
      <line x1="0" y1="9" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="-9" y2="0"/>
      <line x1="9" y1="0" x2="12" y2="0"/>
      <line x1="-8.5" y1="-8.5" x2="-6.4" y2="-6.4"/>
      <line x1="6.4" y1="6.4" x2="8.5" y2="8.5"/>
      <line x1="6.4" y1="-6.4" x2="8.5" y2="-8.5"/>
      <line x1="-8.5" y1="8.5" x2="-6.4" y2="6.4"/>
    </g>

    <!-- bottom-right: rain cloud -->
    <g transform="translate(46,46)" stroke="hsl(200,75%,66%)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-10 -1 a6 6 0 0 1 6 -6 a7 7 0 0 1 13 1 a5 5 0 0 1 -1 9 h-16 a4.5 4.5 0 0 1 -2 -4 Z" fill="hsl(200,68%,55%)" fill-opacity="0.20"/>
      <line x1="-6" y1="6" x2="-8" y2="11"/>
      <line x1="0" y1="6" x2="-2" y2="11"/>
      <line x1="6" y1="6" x2="4" y2="11"/>
    </g>

    <!-- bottom-left: snowflake -->
    <g transform="translate(-46,46)" stroke="hsl(200,88%,82%)" stroke-width="1.5" stroke-linecap="round">
      <line x1="0" y1="-11" x2="0" y2="11"/>
      <line x1="-9.5" y1="-5.5" x2="9.5" y2="5.5"/>
      <line x1="-9.5" y1="5.5" x2="9.5" y2="-5.5"/>
      <g>
        <line x1="0" y1="-11" x2="-3" y2="-8"/>
        <line x1="0" y1="-11" x2="3" y2="-8"/>
        <line x1="0" y1="11" x2="-3" y2="8"/>
        <line x1="0" y1="11" x2="3" y2="8"/>
      </g>
    </g>

    <!-- top-left: wind/gust lines -->
    <g transform="translate(-46,-46)" stroke="hsl(200,75%,66%)" stroke-width="1.5" fill="none" stroke-linecap="round">
      <path d="M-11 -6 h14 a3.5 3.5 0 1 0 -3.5 -3.5"/>
      <path d="M-11 0 h18 a4 4 0 1 1 -4 4"/>
      <path d="M-11 6 h11 a3 3 0 1 0 -3 3"/>
    </g>

    <!-- four balance-arm spokes with equal weight discs -->
    <g stroke="hsl(200,22%,46%)" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-68"/>
      <line x1="0" y1="0" x2="68" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="68"/>
      <line x1="0" y1="0" x2="-68" y2="0"/>
    </g>
    <g fill="hsl(200,68%,55%)" fill-opacity="0.85" stroke="hsl(200,88%,82%)" stroke-width="1.5">
      <circle cx="0" cy="-68" r="7"/>
      <circle cx="68" cy="0" r="7"/>
      <circle cx="0" cy="68" r="7"/>
      <circle cx="-68" cy="0" r="7"/>
    </g>

    <!-- rim pointer / compass needle -->
    <g transform="rotate(-32)">
      <polygon points="0,-92 4,-78 -4,-78" fill="hsl(200,88%,82%)"/>
      <polygon points="0,92 3,80 -3,80" fill="hsl(200,22%,46%)"/>
    </g>

    <!-- ===== central balanced gyroscope / spinning top ===== -->
    <!-- shadow base -->
    <ellipse cx="0" cy="6" rx="13" ry="4" fill="black" fill-opacity="0.25"/>
    <!-- spin rings -->
    <ellipse cx="0" cy="-8" rx="20" ry="7" fill="none" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-opacity="0.7"/>
    <ellipse cx="0" cy="-8" rx="13" ry="4.5" fill="none" stroke="hsl(200,88%,82%)" stroke-width="1" stroke-opacity="0.6"/>
    <!-- top body -->
    <path d="M-14 -10 a14 6 0 0 0 28 0 L0 12 Z" fill="url(#cv-guru-ray-dalio-hub)" stroke="hsl(200,88%,82%)" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- spindle -->
    <line x1="0" y1="-26" x2="0" y2="-8" stroke="hsl(200,88%,82%)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-27" r="3" fill="hsl(200,88%,82%)"/>
    <!-- center hub point -->
    <circle cx="0" cy="0" r="2.5" fill="hsl(200,88%,82%)"/>
  </g>

  <!-- ===== discarded crystal ball / broken arrow, lower corner ===== -->
  <g transform="translate(64,196)" opacity="0.45">
    <!-- crystal ball -->
    <circle cx="0" cy="-4" r="13" fill="none" stroke="hsl(200,22%,46%)" stroke-width="1.5"/>
    <ellipse cx="0" cy="11" rx="9" ry="3" fill="none" stroke="hsl(200,22%,46%)" stroke-width="1.5"/>
    <path d="M-5 -8 a7 7 0 0 1 5 -3" fill="none" stroke="hsl(200,88%,82%)" stroke-width="1" stroke-opacity="0.8"/>
    <!-- broken forecast arrow -->
    <line x1="-16" y1="-18" x2="-3" y2="-9" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="-2" x2="14" y2="6" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- crossed out -->
    <line x1="-18" y1="13" x2="18" y2="-21" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="-21" x2="18" y2="13" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
