<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-martin-pring-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-martin-pring-hand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,88%,82%)"/>
      <stop offset="1" stop-color="hsl(160,75%,66%)"/>
    </linearGradient>
    <clipPath id="cv-guru-martin-pring-disc">
      <circle cx="200" cy="125" r="84"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-martin-pring-bg)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="20" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="20" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- six business-cycle wedges -->
  <g clip-path="url(#cv-guru-martin-pring-disc)" stroke="hsl(160,38%,7%)" stroke-width="2" stroke-linejoin="round">
    <path d="M200,125 L200,41 L272.7,83 Z" fill="hsl(160,68%,55%)" fill-opacity="0.28"/>
    <path d="M200,125 L272.7,83 L272.7,167 Z" fill="hsl(160,68%,55%)" fill-opacity="0.55"/>
    <path d="M200,125 L272.7,167 L200,209 Z" fill="hsl(160,68%,55%)" fill-opacity="0.38"/>
    <path d="M200,125 L200,209 L127.3,167 Z" fill="hsl(160,68%,55%)" fill-opacity="0.18"/>
    <path d="M200,125 L127.3,167 L127.3,83 Z" fill="hsl(160,68%,55%)" fill-opacity="0.45"/>
    <path d="M200,125 L127.3,83 L200,41 Z" fill="hsl(160,68%,55%)" fill-opacity="0.22"/>
  </g>

  <!-- outer rim -->
  <circle cx="200" cy="125" r="84" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2"/>

  <!-- wedge icons -->
  <!-- coin disc (top-right wedge) -->
  <g stroke="hsl(160,88%,82%)" stroke-width="1.5" fill="none" stroke-linecap="round">
    <circle cx="240" cy="100" r="9" fill="hsl(160,68%,55%)" fill-opacity="0.4"/>
    <circle cx="240" cy="100" r="4.5"/>
  </g>
  <!-- commodity drop (right wedge) -->
  <path d="M243,138 C243,144 248,146 248,140 C248,136 245.5,133 243,131 C240.5,133 238,136 238,140 C238,144 243,144 243,138 Z" fill="hsl(160,68%,55%)" fill-opacity="0.5" stroke="hsl(160,88%,82%)" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- bar-block (bottom-left wedge) -->
  <g stroke="hsl(160,88%,82%)" stroke-width="1.3" stroke-linecap="round">
    <line x1="156" y1="158" x2="156" y2="150"/>
    <line x1="161" y1="158" x2="161" y2="144"/>
    <line x1="166" y1="158" x2="166" y2="148"/>
  </g>

  <!-- three nested momentum rings in hub -->
  <circle cx="200" cy="125" r="34" fill="hsl(160,38%,7%)" fill-opacity="0.55" stroke="hsl(160,22%,46%)" stroke-width="1"/>
  <circle cx="200" cy="125" r="26" fill="none" stroke="hsl(160,75%,66%)" stroke-width="2.2" stroke-opacity="0.85" stroke-dasharray="40 122"/>
  <circle cx="200" cy="125" r="18" fill="none" stroke="hsl(160,68%,55%)" stroke-width="1.8" stroke-dasharray="28 85"/>
  <circle cx="200" cy="125" r="10" fill="none" stroke="hsl(160,88%,82%)" stroke-width="1.4" stroke-dasharray="16 47"/>

  <!-- compass / needle-hand pivoting from center into the bright wedge -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <path d="M200,125 L235,90 L246,101 Z" fill="url(#cv-guru-martin-pring-hand)" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>
    <path d="M200,125 L182,143 L191,152 Z" fill="hsl(160,22%,46%)" fill-opacity="0.6" stroke="hsl(160,75%,66%)" stroke-width="1.2"/>
  </g>
  <circle cx="200" cy="125" r="4.5" fill="hsl(160,88%,82%)"/>
  <circle cx="200" cy="125" r="2" fill="hsl(160,38%,7%)"/>

  <!-- clockwise rotation arc-arrow on outer edge -->
  <g fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round">
    <path d="M243,52 A96,96 0 0 1 296,121"/>
    <path d="M289,113 L296,121 L304,114"/>
  </g>
</svg>
