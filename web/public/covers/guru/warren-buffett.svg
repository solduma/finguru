<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-warren-buffett" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-warren-buffett)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="110" y1="40" x2="110" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="290" y1="40" x2="290" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="120" x2="360" y2="120" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- WIDE MOAT RING wrapping the castle base -->
    <ellipse cx="170" cy="180" rx="120" ry="40" fill="hsl(35,68%,55%)" fill-opacity="0.15"/>
    <ellipse cx="170" cy="180" rx="120" ry="40" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-opacity="0.7"/>
    <!-- margin-of-safety buffer band just inside the moat -->
    <ellipse cx="170" cy="180" rx="98" ry="31" stroke="hsl(35,88%,82%)" stroke-width="1" stroke-opacity="0.45" stroke-dasharray="5 6"/>
    <!-- inner water lines -->
    <path d="M95 184 q14 -6 28 0 q14 6 28 0" stroke="hsl(35,75%,66%)" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M205 186 q14 -6 28 0 q14 6 28 0" stroke="hsl(35,75%,66%)" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M150 196 q12 -5 24 0 q12 5 24 0" stroke="hsl(35,75%,66%)" stroke-width="1" stroke-opacity="0.4"/>

    <!-- CASTLE KEEP, central, slightly left -->
    <!-- main keep body -->
    <rect x="120" y="120" width="100" height="58" fill="hsl(35,68%,55%)" fill-opacity="0.35" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <!-- crenellations on keep -->
    <path d="M120 120 v-9 h12 v9 M144 120 v-9 h12 v9 M168 120 v-9 h12 v9 M192 120 v-9 h12 v9" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <rect x="208" y="111" width="12" height="9" fill="none" stroke="hsl(35,75%,66%)" stroke-width="2"/>

    <!-- gate -->
    <path d="M158 178 v-24 a12 12 0 0 1 24 0 v24" fill="hsl(35,38%,7%)" fill-opacity="0.5" stroke="hsl(35,88%,82%)" stroke-width="1.5"/>
    <!-- keep windows -->
    <rect x="134" y="134" width="9" height="14" rx="4" fill="hsl(35,88%,82%)" fill-opacity="0.3" stroke="hsl(35,88%,82%)" stroke-width="1"/>
    <rect x="197" y="134" width="9" height="14" rx="4" fill="hsl(35,88%,82%)" fill-opacity="0.3" stroke="hsl(35,88%,82%)" stroke-width="1"/>

    <!-- STRONG TOWER -->
    <rect x="222" y="86" width="34" height="92" fill="hsl(35,68%,55%)" fill-opacity="0.45" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <!-- triangular roof -->
    <path d="M218 86 l21 -26 l21 26 Z" fill="hsl(35,68%,55%)" fill-opacity="0.55" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <!-- tower window -->
    <rect x="233" y="104" width="12" height="20" rx="6" fill="hsl(35,88%,82%)" fill-opacity="0.35" stroke="hsl(35,88%,82%)" stroke-width="1"/>

    <!-- FLAG on tower with shield mark (quality) -->
    <line x1="239" y1="60" x2="239" y2="36" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <path d="M239 38 l30 6 l-30 10 Z" fill="hsl(35,68%,55%)" fill-opacity="0.8" stroke="hsl(35,88%,82%)" stroke-width="1.5"/>
    <!-- heart/shield mark on flag -->
    <path d="M251 44 a2.4 2.4 0 0 1 4 1 a2.4 2.4 0 0 1 4 -1 a3 3 0 0 1 -4 4 a3 3 0 0 1 -4 -4 Z" fill="hsl(35,38%,7%)" fill-opacity="0.55" stroke="hsl(35,88%,82%)" stroke-width="0.8"/>

    <!-- CORNERSTONE block at foundation, lower left -->
    <rect x="78" y="166" width="46" height="26" rx="2" fill="hsl(35,68%,55%)" fill-opacity="0.5" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <line x1="101" y1="166" x2="101" y2="192" stroke="hsl(35,88%,82%)" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="78" y1="179" x2="124" y2="179" stroke="hsl(35,88%,82%)" stroke-width="1" stroke-opacity="0.5"/>

    <!-- CALM HAND resting on the cornerstone -->
    <path d="M55 188 q8 -16 24 -18 q10 -1 18 2" stroke="hsl(35,75%,66%)" stroke-width="2.5"/>
    <path d="M70 174 q3 -8 9 -8 M79 170 q3 -9 9 -8 M88 171 q3 -8 9 -6 M97 174 q3 -6 8 -4"
          stroke="hsl(35,75%,66%)" stroke-width="2.5"/>
    <path d="M50 196 q4 -10 12 -12 q4 -1 8 0" stroke="hsl(35,75%,66%)" stroke-width="2.5" stroke-opacity="0.6"/>

    <!-- TORN PAPER TICKER TAG drifting away, upper-right, peripheral & rejected -->
    <g opacity="0.6">
      <path d="M318 70 l34 -8 l5 22 l-9 4 l-9 -4 l-9 5 l-8 -4 Z"
            fill="hsl(35,22%,46%)" fill-opacity="0.5" stroke="hsl(35,22%,46%)" stroke-width="1.5"/>
      <line x1="324" y1="72" x2="348" y2="67" stroke="hsl(35,22%,46%)" stroke-width="1.5"/>
      <line x1="325" y1="80" x2="345" y2="76" stroke="hsl(35,22%,46%)" stroke-width="1.5"/>
      <!-- motion drift marks -->
      <path d="M308 64 q6 2 10 0 M305 74 q6 2 11 0" stroke="hsl(35,22%,46%)" stroke-width="1" stroke-opacity="0.6"/>
    </g>

  </g>
</svg>
