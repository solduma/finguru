<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-aswath-damodaran" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-aswath-damodaran)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- open book base, slight three-quarter flat-lay tilt -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- book under-shadow -->
    <path d="M58 174 L200 192 L342 174 L342 178 L200 196 L58 178 Z" fill="hsl(35,38%,5%)" fill-opacity="0.6"/>

    <!-- left page -->
    <path d="M60 78 L200 96 L200 188 L60 170 Z" fill="hsl(35,68%,55%)" fill-opacity="0.16" stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <!-- right page -->
    <path d="M340 78 L200 96 L200 188 L340 170 Z" fill="hsl(35,68%,55%)" fill-opacity="0.12" stroke="hsl(35,75%,66%)" stroke-width="2"/>

    <!-- spine / gutter -->
    <line x1="200" y1="96" x2="200" y2="188" stroke="hsl(35,22%,46%)" stroke-width="2"/>

    <!-- LEFT PAGE: three wavy handwritten narrative lines -->
    <path d="M76 108 q14 -6 28 0 t28 0 t28 0" fill="none" stroke="hsl(35,88%,82%)" stroke-width="2" stroke-opacity="0.9"/>
    <path d="M76 126 q14 -6 28 0 t28 0 t26 0" fill="none" stroke="hsl(35,88%,82%)" stroke-width="2" stroke-opacity="0.75"/>
    <path d="M76 144 q14 -6 28 0 t28 0 t22 0" fill="none" stroke="hsl(35,88%,82%)" stroke-width="2" stroke-opacity="0.6"/>

    <!-- RIGHT PAGE: spreadsheet grid -->
    <g stroke="hsl(35,75%,66%)" stroke-width="1" stroke-opacity="0.85">
      <!-- grid outer -->
      <rect x="226" y="104" width="96" height="56" fill="none"/>
      <!-- vertical dividers -->
      <line x1="258" y1="104" x2="258" y2="160"/>
      <line x1="290" y1="104" x2="290" y2="160"/>
      <!-- horizontal dividers -->
      <line x1="226" y1="122.7" x2="322" y2="122.7"/>
      <line x1="226" y1="141.3" x2="322" y2="141.3"/>
    </g>
    <!-- filled cells -->
    <rect x="226" y="104" width="32" height="18.7" fill="hsl(35,68%,55%)" fill-opacity="0.55"/>
    <rect x="290" y="122.7" width="32" height="18.6" fill="hsl(35,68%,55%)" fill-opacity="0.4"/>
    <rect x="258" y="141.3" width="32" height="18.7" fill="hsl(35,68%,55%)" fill-opacity="0.45"/>

    <!-- ARCHED BRIDGE over the gutter, dead-center focal point -->
    <g>
      <path d="M168 92 Q200 52 232 92" fill="none" stroke="hsl(35,75%,66%)" stroke-width="2"/>
      <path d="M178 92 Q200 64 222 92" fill="none" stroke="hsl(35,75%,66%)" stroke-width="1.5" stroke-opacity="0.6"/>
      <!-- bridge deck -->
      <line x1="166" y1="92" x2="234" y2="92" stroke="hsl(35,88%,82%)" stroke-width="2"/>
      <!-- bridge pylons -->
      <line x1="180" y1="92" x2="180" y2="86" stroke="hsl(35,75%,66%)" stroke-width="1.5"/>
      <line x1="220" y1="92" x2="220" y2="86" stroke="hsl(35,75%,66%)" stroke-width="1.5"/>
    </g>

    <!-- arrow crossing the bridge: story side -> number side -->
    <g stroke="hsl(35,88%,82%)" stroke-width="2" fill="none" stroke-opacity="0.95">
      <path d="M174 84 L222 84"/>
      <path d="M214 78 L222 84 L214 90"/>
    </g>

    <!-- open padlock tag, bottom-left corner accent -->
    <g transform="translate(70,182)">
      <rect x="0" y="6" width="22" height="16" rx="3" fill="hsl(35,68%,55%)" fill-opacity="0.25" stroke="hsl(35,75%,66%)" stroke-width="2"/>
      <!-- open shackle -->
      <path d="M5 6 V1 a6 6 0 0 1 12 0" fill="none" stroke="hsl(35,75%,66%)" stroke-width="2"/>
      <circle cx="11" cy="14" r="2.4" fill="hsl(35,88%,82%)"/>
    </g>
  </g>
</svg>
