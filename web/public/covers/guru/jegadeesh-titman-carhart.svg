<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-jegadeesh-titman-carhart-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(270,45%,13%)"/>
      <stop offset="1" stop-color="hsl(270,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-jegadeesh-titman-carhart-sphere" cx="0.35" cy="0.32" r="0.75">
      <stop offset="0" stop-color="hsl(270,88%,82%)"/>
      <stop offset="0.55" stop-color="hsl(270,68%,55%)"/>
      <stop offset="1" stop-color="hsl(270,68%,38%)"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-jegadeesh-titman-carhart-bg)"/>

  <!-- unifying frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="212" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="212" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- inclined ramp from upper-left to lower-right -->
  <line x1="58" y1="78" x2="346" y2="200" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <!-- ramp anchor to baseline -->
  <line x1="346" y1="200" x2="346" y2="212" stroke="hsl(270,22%,46%)" stroke-width="2" stroke-linecap="round"/>

  <!-- dashed ghost-trail receding up-left -->
  <g stroke="hsl(270,75%,66%)" stroke-width="1.5" stroke-dasharray="3 5" fill="none" stroke-linecap="round">
    <path d="M110 100 Q 160 118 210 152"/>
  </g>
  <circle cx="110" cy="100" r="11" fill="hsl(270,68%,55%)" fill-opacity="0.12"/>
  <circle cx="146" cy="115" r="14" fill="hsl(270,68%,55%)" fill-opacity="0.20"/>
  <circle cx="185" cy="134" r="18" fill="hsl(270,68%,55%)" fill-opacity="0.32"/>

  <!-- solid sphere (focal point) on the ramp, lower-center -->
  <circle cx="222" cy="148" r="27" fill="url(#cv-guru-jegadeesh-titman-carhart-sphere)" stroke="hsl(270,88%,82%)" stroke-width="2"/>
  <!-- specular highlight -->
  <circle cx="213" cy="139" r="6" fill="hsl(270,88%,82%)" fill-opacity="0.85"/>

  <!-- forward-pointing arrow at leading edge (down-slope) -->
  <g stroke="hsl(270,88%,82%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="252" y1="165" x2="286" y2="180"/>
    <polyline points="276,170 288,181 274,185"/>
  </g>

  <!-- flag marker post further down-slope (lower-right) -->
  <line x1="330" y1="194" x2="330" y2="162" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <path d="M330 162 L 356 170 L 330 178 Z" fill="hsl(270,68%,55%)" fill-opacity="0.85" stroke="hsl(270,88%,82%)" stroke-width="1" stroke-linejoin="round"/>
  <circle cx="330" cy="194" r="2.5" fill="hsl(270,75%,66%)"/>
</svg>
