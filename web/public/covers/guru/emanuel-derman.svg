<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-emanuel-derman" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(270,45%,13%)"/>
      <stop offset="1" stop-color="hsl(270,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-emanuel-derman)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="125" x2="360" y2="125" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="110" y1="40" x2="110" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- ===== LEFT: real apple (organic, warm) ===== -->
    <!-- mismatched faint shadow on left -->
    <ellipse cx="100" cy="178" rx="42" ry="7" fill="hsl(270,68%,55%)" fill-opacity="0.10"/>

    <!-- apple body -->
    <path d="M100 80
             C82 76 68 88 67 108
             C66 130 78 158 100 162
             C122 158 134 130 133 108
             C132 88 118 76 100 80 Z"
          fill="hsl(270,68%,55%)" fill-opacity="0.22"
          stroke="hsl(270,75%,66%)" stroke-width="2"/>
    <!-- subtle cleft / dimple -->
    <path d="M100 80 C98 90 102 90 100 100" fill="none"
          stroke="hsl(270,75%,66%)" stroke-width="1" stroke-opacity="0.6"/>
    <!-- stem -->
    <path d="M100 80 C101 70 104 64 110 60" fill="none"
          stroke="hsl(270,75%,66%)" stroke-width="2"/>
    <!-- leaf -->
    <path d="M110 60 C120 56 128 60 126 70 C118 72 112 68 110 60 Z"
          fill="hsl(270,68%,55%)" fill-opacity="0.30"
          stroke="hsl(270,75%,66%)" stroke-width="1.5"/>
    <!-- highlight -->
    <path d="M84 96 C80 104 81 116 86 124" fill="none"
          stroke="hsl(270,88%,82%)" stroke-width="1.5" stroke-opacity="0.7"/>

    <!-- ===== CENTER: broken equals sign (the hinge) ===== -->
    <g stroke="hsl(270,88%,82%)" stroke-width="2.5">
      <line x1="186" y1="112" x2="194" y2="112"/>
      <line x1="206" y1="112" x2="214" y2="112" stroke-dasharray="2 4"/>
      <line x1="186" y1="124" x2="194" y2="124" stroke-dasharray="2 4"/>
      <line x1="206" y1="124" x2="214" y2="124"/>
    </g>

    <!-- ===== RIGHT: wireframe apple (model, skeletal) ===== -->
    <!-- mismatched shadow (offset & wrong shape) -->
    <ellipse cx="296" cy="180" rx="34" ry="6" fill="hsl(270,68%,55%)" fill-opacity="0.07"/>

    <!-- faint floating grid behind wireframe -->
    <g stroke="hsl(270,22%,46%)" stroke-width="0.75" stroke-opacity="0.5">
      <line x1="262" y1="78" x2="338" y2="78"/>
      <line x1="262" y1="100" x2="338" y2="100"/>
      <line x1="262" y1="122" x2="338" y2="122"/>
      <line x1="262" y1="144" x2="338" y2="144"/>
      <line x1="266" y1="74" x2="266" y2="150"/>
      <line x1="288" y1="74" x2="288" y2="150"/>
      <line x1="310" y1="74" x2="310" y2="150"/>
      <line x1="332" y1="74" x2="332" y2="150"/>
    </g>

    <!-- faceted wireframe mesh of the apple -->
    <g stroke="hsl(270,75%,66%)" stroke-width="1.5" fill="none">
      <!-- outer faceted contour -->
      <polygon points="300,80 282,86 270,108 278,140 300,160 322,140 330,108 318,86"
               fill="hsl(270,68%,55%)" fill-opacity="0.10"/>
      <!-- internal mesh segments -->
      <line x1="300" y1="80" x2="300" y2="160"/>
      <line x1="282" y1="86" x2="318" y2="86"/>
      <line x1="270" y1="108" x2="330" y2="108"/>
      <line x1="278" y1="140" x2="322" y2="140"/>
      <line x1="282" y1="86" x2="300" y2="108"/>
      <line x1="318" y1="86" x2="300" y2="108"/>
      <line x1="270" y1="108" x2="300" y2="130"/>
      <line x1="330" y1="108" x2="300" y2="130"/>
      <line x1="278" y1="140" x2="300" y2="130"/>
      <line x1="322" y1="140" x2="300" y2="130"/>
      <line x1="282" y1="86" x2="270" y2="108"/>
      <line x1="318" y1="86" x2="330" y2="108"/>
      <!-- straight stem -->
      <line x1="300" y1="80" x2="306" y2="62"/>
      <!-- faceted leaf -->
      <polygon points="306,62 318,58 324,68 312,72" />
    </g>

    <!-- node dots -->
    <g fill="hsl(270,88%,82%)">
      <circle cx="300" cy="80" r="2.2"/>
      <circle cx="282" cy="86" r="2.2"/>
      <circle cx="318" cy="86" r="2.2"/>
      <circle cx="270" cy="108" r="2.2"/>
      <circle cx="330" cy="108" r="2.2"/>
      <circle cx="278" cy="140" r="2.2"/>
      <circle cx="322" cy="140" r="2.2"/>
      <circle cx="300" cy="160" r="2.2"/>
      <circle cx="300" cy="108" r="2"/>
      <circle cx="300" cy="130" r="2"/>
      <circle cx="306" cy="62" r="2"/>
    </g>

    <!-- stray greek-letter-like marks (abstract, non-text glyphs) -->
    <g stroke="hsl(270,22%,46%)" stroke-width="1.5" fill="none" stroke-opacity="0.85">
      <!-- sigma-ish -->
      <path d="M250 60 L240 60 L246 66 L240 72 L250 72"/>
      <!-- delta triangle -->
      <path d="M348 152 L356 152 L352 144 Z"/>
      <!-- partial / lambda-ish -->
      <path d="M252 156 L258 144 M256 150 L262 156"/>
    </g>

  </g>
</svg>
