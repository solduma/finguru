<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-jim-rogers" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(200,45%,13%)"/>
      <stop offset="1" stop-color="hsl(200,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-jim-rogers-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="hsl(200,88%,82%)" stop-opacity="0.55"/>
      <stop offset="1" stop-color="hsl(200,88%,82%)" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-jim-rogers)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="100" y1="40" x2="100" y2="212" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="40" x2="300" y2="212" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="90" x2="400" y2="90" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- low dawn sun on the horizon -->
  <circle cx="320" cy="150" r="16" fill="hsl(200,68%,55%)" fill-opacity="0.20"/>
  <circle cx="320" cy="150" r="9" fill="hsl(200,88%,82%)" fill-opacity="0.55"/>

  <!-- globe horizon arc -->
  <path d="M -10 200 Q 200 120 410 200" fill="none" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <!-- latitude / longitude suggestion -->
  <path d="M 30 178 Q 200 158 370 178" fill="none" stroke="hsl(200,22%,46%)" stroke-width="1" stroke-opacity="0.7" stroke-linecap="round"/>
  <path d="M 120 130 Q 130 165 120 200" fill="none" stroke="hsl(200,22%,46%)" stroke-width="1" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M 260 132 Q 252 166 260 200" fill="none" stroke="hsl(200,22%,46%)" stroke-width="1" stroke-opacity="0.55" stroke-linecap="round"/>

  <!-- dotted tire tracks receding upper-left -->
  <path d="M 95 175 Q 70 150 55 120 Q 46 100 50 78" fill="none" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round" stroke-dasharray="1 8"/>
  <path d="M 105 178 Q 84 152 72 122 Q 64 102 70 80" fill="none" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round" stroke-dasharray="1 8"/>

  <!-- headlamp cone fanning right -->
  <path d="M 150 152 L 300 120 L 300 178 Z" fill="url(#cv-guru-jim-rogers-beam)"/>

  <!-- commodity crate cluster, far right, lit -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- crate -->
    <rect x="285" y="158" width="26" height="22" fill="hsl(200,68%,55%)" fill-opacity="0.30" stroke="hsl(200,75%,66%)" stroke-width="1.5"/>
    <line x1="285" y1="164" x2="311" y2="164" stroke="hsl(200,75%,66%)" stroke-width="1"/>
    <line x1="298" y1="158" x2="298" y2="180" stroke="hsl(200,75%,66%)" stroke-width="1"/>
    <!-- barrel -->
    <rect x="312" y="160" width="16" height="20" rx="4" fill="hsl(200,68%,55%)" fill-opacity="0.25" stroke="hsl(200,75%,66%)" stroke-width="1.5"/>
    <line x1="312" y1="167" x2="328" y2="167" stroke="hsl(200,75%,66%)" stroke-width="1"/>
    <line x1="312" y1="173" x2="328" y2="173" stroke="hsl(200,75%,66%)" stroke-width="1"/>
    <!-- grain sack -->
    <path d="M 277 180 Q 273 164 281 162 Q 290 164 286 180 Z" fill="hsl(200,68%,55%)" fill-opacity="0.22" stroke="hsl(200,75%,66%)" stroke-width="1.5"/>
  </g>

  <!-- motorcycle, lower-left foreground facing right -->
  <g fill="none" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- wheels -->
    <circle cx="78" cy="178" r="20"/>
    <circle cx="148" cy="178" r="20"/>
    <circle cx="78" cy="178" r="4" fill="hsl(200,68%,55%)" fill-opacity="0.4" stroke="none"/>
    <circle cx="148" cy="178" r="4" fill="hsl(200,68%,55%)" fill-opacity="0.4" stroke="none"/>
    <!-- frame -->
    <path d="M 78 178 L 110 150 L 148 178"/>
    <path d="M 110 150 L 130 150"/>
    <!-- fuel tank / seat -->
    <path d="M 100 150 Q 118 140 138 146 L 130 150 Z" fill="hsl(200,68%,55%)" fill-opacity="0.55" stroke="hsl(200,75%,66%)"/>
    <!-- handlebars + fork to front wheel -->
    <path d="M 130 150 L 152 138"/>
    <path d="M 152 138 L 162 134"/>
    <path d="M 152 138 L 148 178"/>
    <!-- headlamp -->
    <circle cx="156" cy="150" r="6" fill="hsl(200,88%,82%)" fill-opacity="0.9" stroke="hsl(200,75%,66%)"/>
  </g>
</svg>
