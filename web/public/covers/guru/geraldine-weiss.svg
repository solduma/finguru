<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-geraldine-weiss-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-geraldine-weiss-coin" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="hsl(35,88%,82%)"/>
      <stop offset="0.55" stop-color="hsl(35,68%,55%)"/>
      <stop offset="1" stop-color="hsl(35,68%,42%)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-geraldine-weiss-bg)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="140" y1="40" x2="140" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="260" y1="40" x2="260" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- blue-chip building: pediment + columns -->
    <g stroke="hsl(35,75%,66%)" stroke-width="2">
      <!-- pediment -->
      <path d="M168 70 L200 50 L232 70 Z" fill="hsl(35,68%,55%)" fill-opacity="0.18"/>
      <!-- architrave -->
      <rect x="168" y="70" width="64" height="8" fill="hsl(35,68%,55%)" fill-opacity="0.15"/>
    </g>

    <!-- columns -->
    <g stroke="hsl(35,75%,66%)" stroke-width="2">
      <line x1="176" y1="80" x2="176" y2="106"/>
      <line x1="190" y1="80" x2="190" y2="106"/>
      <line x1="204" y1="80" x2="204" y2="106"/>
      <line x1="218" y1="80" x2="218" y2="106"/>
      <line x1="224" y1="80" x2="224" y2="106"/>
    </g>
    <!-- base / stylobate -->
    <rect x="166" y="106" width="68" height="7" fill="hsl(35,68%,55%)" fill-opacity="0.15" stroke="hsl(35,75%,66%)" stroke-width="2"/>

    <!-- thin column detail -->
    <g stroke="hsl(35,22%,46%)" stroke-width="1">
      <line x1="182" y1="82" x2="182" y2="104"/>
      <line x1="197" y1="82" x2="197" y2="104"/>
      <line x1="211" y1="82" x2="211" y2="104"/>
    </g>

    <!-- vertical channel side rails -->
    <g stroke="hsl(35,22%,46%)" stroke-width="2" stroke-dasharray="2 7" stroke-opacity="0.8">
      <line x1="178" y1="120" x2="178" y2="196"/>
      <line x1="222" y1="120" x2="222" y2="196"/>
    </g>

    <!-- upper threshold (expensive / dear) -->
    <line x1="120" y1="120" x2="280" y2="120" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-opacity="0.55"/>
    <circle cx="120" cy="120" r="2.5" fill="hsl(35,75%,66%)" stroke="none"/>
    <circle cx="280" cy="120" r="2.5" fill="hsl(35,75%,66%)" stroke="none"/>

    <!-- lower threshold (cheap / buy zone) -->
    <line x1="120" y1="178" x2="280" y2="178" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <circle cx="120" cy="178" r="2.5" fill="hsl(35,88%,82%)" stroke="none"/>
    <circle cx="280" cy="178" r="2.5" fill="hsl(35,88%,82%)" stroke="none"/>

    <!-- band fill between rails -->
    <rect x="178" y="120" width="44" height="58" fill="hsl(35,68%,55%)" fill-opacity="0.08" stroke="none"/>

    <!-- motion trail of falling coin -->
    <g stroke="none">
      <ellipse cx="200" cy="138" rx="11" ry="4" fill="hsl(35,88%,82%)" fill-opacity="0.10"/>
      <ellipse cx="200" cy="148" rx="12" ry="4.5" fill="hsl(35,88%,82%)" fill-opacity="0.16"/>
      <ellipse cx="200" cy="158" rx="13" ry="5" fill="hsl(35,88%,82%)" fill-opacity="0.24"/>
    </g>

    <!-- the gold coin (focal point, near cheap rail) -->
    <circle cx="200" cy="170" r="16" fill="url(#cv-guru-geraldine-weiss-coin)" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <circle cx="200" cy="170" r="11" fill="none" stroke="hsl(35,68%,42%)" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- dividend mark: stylized falling drop, NOT a letter -->
    <path d="M200 162 C196 167 195 171 195 174 a5 5 0 0 0 10 0 c0 -3 -1 -7 -5 -12 Z" fill="hsl(35,38%,7%)" fill-opacity="0.55" stroke="none"/>

    <!-- catching open hand at bottom -->
    <g stroke="hsl(35,75%,66%)" stroke-width="2">
      <path d="M174 198 q26 14 52 0" fill="hsl(35,68%,55%)" fill-opacity="0.18"/>
      <line x1="174" y1="198" x2="170" y2="190"/>
      <line x1="184" y1="201" x2="182" y2="191"/>
      <line x1="200" y1="202" x2="200" y2="192"/>
      <line x1="216" y1="201" x2="218" y2="191"/>
      <line x1="226" y1="198" x2="230" y2="190"/>
    </g>

  </g>
</svg>
