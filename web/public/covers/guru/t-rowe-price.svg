<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-t-rowe-price-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-t-rowe-price-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(35,68%,55%)" stop-opacity="0.04"/>
      <stop offset="1" stop-color="hsl(35,68%,55%)" stop-opacity="0.18"/>
    </linearGradient>
    <clipPath id="cv-guru-t-rowe-price-flask">
      <path d="M178 78 L178 110 Q140 158 138 196 Q138 200 142 200 L258 200 Q262 200 262 196 Q260 158 222 110 L222 78 Z"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-t-rowe-price-bg)"/>

  <!-- shared frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- glass fill inside flask -->
  <path d="M178 78 L178 110 Q140 158 138 196 Q138 200 142 200 L258 200 Q262 200 262 196 Q260 158 222 110 L222 78 Z" fill="url(#cv-guru-t-rowe-price-glass)"/>

  <!-- soil + seed and roots (foreground anchor) -->
  <g clip-path="url(#cv-guru-t-rowe-price-flask)">
    <rect x="130" y="182" width="140" height="20" fill="hsl(35,68%,55%)" fill-opacity="0.22"/>
    <!-- root system -->
    <g stroke="hsl(35,22%,46%)" stroke-width="1" fill="none" stroke-linecap="round">
      <path d="M200 186 L194 198"/>
      <path d="M200 186 L206 197"/>
      <path d="M200 186 L188 194"/>
      <path d="M200 186 L212 193"/>
    </g>
    <!-- seed -->
    <ellipse cx="200" cy="186" rx="5" ry="7" fill="hsl(35,88%,82%)" fill-opacity="0.85"/>

    <!-- tree trunk rising along central axis -->
    <path d="M200 186 L200 92" stroke="hsl(35,75%,66%)" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- lower ring of branches (widest) -->
    <g stroke="hsl(35,75%,66%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M200 160 L172 144"/>
      <path d="M200 160 L228 144"/>
      <path d="M200 138 L178 126"/>
      <path d="M200 138 L222 126"/>
      <path d="M200 118 L184 110"/>
      <path d="M200 118 L216 110"/>
    </g>

    <!-- foliage clusters on healthy branches -->
    <g fill="hsl(35,68%,55%)" fill-opacity="0.55">
      <circle cx="170" cy="142" r="9"/>
      <circle cx="230" cy="142" r="9"/>
      <circle cx="176" cy="124" r="7"/>
      <circle cx="224" cy="124" r="7"/>
      <circle cx="182" cy="108" r="6"/>
      <circle cx="218" cy="108" r="6"/>
    </g>
    <g fill="hsl(35,88%,82%)" fill-opacity="0.30">
      <circle cx="167" cy="139" r="3"/>
      <circle cx="227" cy="139" r="3"/>
      <circle cx="179" cy="121" r="2.5"/>
    </g>

    <!-- TOP: broken / withered branch in the narrowing neck -->
    <path d="M200 100 L200 92" stroke="hsl(35,75%,66%)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- broken snapped tip, bare and angled -->
    <path d="M200 92 L205 84 L201 81" stroke="hsl(35,22%,46%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M200 92 L195 86" stroke="hsl(35,22%,46%)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- fallen leaves beneath the broken branch -->
    <g fill="hsl(35,22%,46%)" fill-opacity="0.7">
      <ellipse cx="190" cy="172" rx="3.5" ry="2" transform="rotate(-25 190 172)"/>
      <ellipse cx="212" cy="178" rx="3.5" ry="2" transform="rotate(20 212 178)"/>
      <ellipse cx="200" cy="180" rx="3" ry="1.8" transform="rotate(-10 200 180)"/>
    </g>
  </g>

  <!-- flask outline (drawn over everything) -->
  <path d="M178 78 L178 110 Q140 158 138 196 Q138 200 142 200 L258 200 Q262 200 262 196 Q260 158 222 110 L222 78 Z"
        fill="none" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- flask neck rim -->
  <path d="M173 78 L227 78" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="200" cy="78" rx="27" ry="4" fill="none" stroke="hsl(35,88%,82%)" stroke-width="1" stroke-opacity="0.6"/>

  <!-- glass highlight streak -->
  <path d="M155 168 Q150 145 165 124" fill="none" stroke="hsl(35,88%,82%)" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- measurement scale up the right side of glass -->
  <g stroke="hsl(35,88%,82%)" stroke-opacity="0.5" stroke-width="1" stroke-linecap="round">
    <line x1="244" y1="186" x2="252" y2="186"/>
    <line x1="247" y1="172" x2="252" y2="172"/>
    <line x1="247" y1="158" x2="252" y2="158"/>
    <line x1="244" y1="144" x2="252" y2="144"/>
    <line x1="247" y1="130" x2="252" y2="130"/>
    <line x1="247" y1="116" x2="252" y2="116"/>
    <line x1="244" y1="102" x2="252" y2="102"/>
  </g>
</svg>
