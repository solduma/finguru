<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-joel-greenblatt-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-joel-greenblatt-gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(35,88%,82%)"/>
      <stop offset="1" stop-color="hsl(35,68%,55%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-joel-greenblatt-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="hsl(35,88%,82%)" stop-opacity="0.45"/>
      <stop offset="1" stop-color="hsl(35,88%,82%)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-joel-greenblatt-bg)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="80" y1="40" x2="80" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- machine body / hopper -->
    <path d="M118 92 H282 V150 L228 150 L200 184 L172 150 L118 150 Z"
          fill="hsl(35,68%,55%)" fill-opacity="0.15"
          stroke="hsl(35,75%,66%)" stroke-width="2"/>

    <!-- inner hopper top edge -->
    <line x1="118" y1="110" x2="282" y2="110" stroke="hsl(35,22%,46%)" stroke-width="1"/>

    <!-- output chute -->
    <path d="M188 150 L188 178 L212 178 L212 150"
          stroke="hsl(35,75%,66%)" stroke-width="2"/>

    <!-- LEFT dial (percent input) -->
    <circle cx="148" cy="74" r="30" fill="hsl(35,38%,7%)" fill-opacity="0.6"
            stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <circle cx="148" cy="74" r="22" stroke="hsl(35,22%,46%)" stroke-width="1"/>
    <!-- percent mark: two dots + slash -->
    <line x1="140" y1="84" x2="158" y2="62" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <circle cx="140" cy="64" r="3" fill="hsl(35,68%,55%)" fill-opacity="0.9" stroke="none"/>
    <circle cx="158" cy="84" r="3" fill="hsl(35,68%,55%)" fill-opacity="0.9" stroke="none"/>
    <!-- needle -->
    <line x1="148" y1="74" x2="166" y2="60" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <circle cx="148" cy="74" r="3" fill="hsl(35,88%,82%)" stroke="none"/>
    <!-- tick marks -->
    <line x1="148" y1="48" x2="148" y2="52" stroke="hsl(35,75%,66%)" stroke-width="1"/>
    <line x1="122" y1="74" x2="126" y2="74" stroke="hsl(35,75%,66%)" stroke-width="1"/>
    <line x1="174" y1="74" x2="170" y2="74" stroke="hsl(35,75%,66%)" stroke-width="1"/>

    <!-- RIGHT dial (stacked coins input) -->
    <circle cx="252" cy="74" r="30" fill="hsl(35,38%,7%)" fill-opacity="0.6"
            stroke="hsl(35,75%,66%)" stroke-width="2"/>
    <circle cx="252" cy="74" r="22" stroke="hsl(35,22%,46%)" stroke-width="1"/>
    <!-- stacked coins mark -->
    <ellipse cx="252" cy="80" rx="11" ry="3.5" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <ellipse cx="252" cy="73" rx="11" ry="3.5" stroke="hsl(35,68%,55%)" stroke-width="2"/>
    <ellipse cx="252" cy="66" rx="11" ry="3.5" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <!-- needle -->
    <line x1="252" y1="74" x2="236" y2="62" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <circle cx="252" cy="74" r="3" fill="hsl(35,88%,82%)" stroke="none"/>
    <!-- tick marks -->
    <line x1="252" y1="48" x2="252" y2="52" stroke="hsl(35,75%,66%)" stroke-width="1"/>
    <line x1="226" y1="74" x2="230" y2="74" stroke="hsl(35,75%,66%)" stroke-width="1"/>
    <line x1="278" y1="74" x2="274" y2="74" stroke="hsl(35,75%,66%)" stroke-width="1"/>

    <!-- interlocking gears between the dials -->
    <g stroke="hsl(35,75%,66%)" stroke-width="2">
      <circle cx="188" cy="100" r="9" fill="hsl(35,68%,55%)" fill-opacity="0.25"/>
      <line x1="188" y1="88" x2="188" y2="112"/>
      <line x1="176" y1="100" x2="200" y2="100"/>
      <line x1="180" y1="92" x2="196" y2="108"/>
      <line x1="196" y1="92" x2="180" y2="108"/>
      <circle cx="212" cy="100" r="9" fill="hsl(35,68%,55%)" fill-opacity="0.25"/>
      <line x1="212" y1="88" x2="212" y2="112"/>
      <line x1="200" y1="100" x2="224" y2="100"/>
      <line x1="204" y1="92" x2="220" y2="108"/>
      <line x1="220" y1="92" x2="204" y2="108"/>
    </g>
    <circle cx="188" cy="100" r="2.5" fill="hsl(35,88%,82%)" stroke="none"/>
    <circle cx="212" cy="100" r="2.5" fill="hsl(35,88%,82%)" stroke="none"/>

    <!-- glow behind gemstone -->
    <circle cx="200" cy="198" r="26" fill="url(#cv-guru-joel-greenblatt-glow)" stroke="none"/>

    <!-- faceted gemstone emerging from chute -->
    <path d="M200 178 L218 192 L208 210 L192 210 L182 192 Z"
          fill="url(#cv-guru-joel-greenblatt-gem)" fill-opacity="0.9"
          stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <line x1="182" y1="192" x2="218" y2="192" stroke="hsl(35,38%,7%)" stroke-opacity="0.5" stroke-width="1"/>
    <line x1="200" y1="178" x2="200" y2="210" stroke="hsl(35,38%,7%)" stroke-opacity="0.5" stroke-width="1"/>
    <line x1="182" y1="192" x2="200" y2="210" stroke="hsl(35,38%,7%)" stroke-opacity="0.5" stroke-width="1"/>
    <line x1="218" y1="192" x2="200" y2="210" stroke="hsl(35,38%,7%)" stroke-opacity="0.5" stroke-width="1"/>

    <!-- ranked stack of tiles, lower right, top highlighted -->
    <rect x="296" y="152" width="48" height="13" rx="2"
          fill="hsl(35,68%,55%)" fill-opacity="0.85" stroke="hsl(35,88%,82%)" stroke-width="2"/>
    <rect x="296" y="169" width="48" height="13" rx="2"
          fill="hsl(35,68%,55%)" fill-opacity="0.2" stroke="hsl(35,75%,66%)" stroke-width="1"/>
    <rect x="296" y="186" width="48" height="13" rx="2"
          fill="hsl(35,68%,55%)" fill-opacity="0.12" stroke="hsl(35,22%,46%)" stroke-width="1"/>
    <line x1="302" y1="158.5" x2="338" y2="158.5" stroke="hsl(35,38%,7%)" stroke-opacity="0.4" stroke-width="1"/>

  </g>
</svg>
