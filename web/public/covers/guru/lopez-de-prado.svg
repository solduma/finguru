<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-lopez-de-prado-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(270,45%,13%)"/>
      <stop offset="1" stop-color="hsl(270,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-lopez-de-prado-nugget" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(270,88%,82%)"/>
      <stop offset="1" stop-color="hsl(270,68%,55%)"/>
    </linearGradient>
    <clipPath id="cv-guru-lopez-de-prado-mesh">
      <polygon points="148,120 252,120 214,164 186,164"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-lopez-de-prado-bg)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="200" y1="40" x2="200" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="80" y1="40" x2="80" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- cascade of candidate strategies falling from above -->
  <g stroke="hsl(270,75%,66%)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="150" cy="46" r="4" fill="hsl(270,68%,55%)" fill-opacity="0.35" stroke="none"/>
    <circle cx="178" cy="58" r="3" fill="hsl(270,68%,55%)" fill-opacity="0.30" stroke="none"/>
    <circle cx="212" cy="44" r="5" fill="hsl(270,68%,55%)" fill-opacity="0.40" stroke="none"/>
    <circle cx="240" cy="60" r="3.5" fill="hsl(270,68%,55%)" fill-opacity="0.28" stroke="none"/>
    <circle cx="196" cy="72" r="3" fill="hsl(270,68%,55%)" fill-opacity="0.30" stroke="none"/>
    <circle cx="160" cy="74" r="4" fill="hsl(270,68%,55%)" fill-opacity="0.30" stroke="none"/>
    <circle cx="228" cy="80" r="4.5" fill="hsl(270,68%,55%)" fill-opacity="0.34" stroke="none"/>
    <circle cx="184" cy="92" r="3" fill="hsl(270,68%,55%)" fill-opacity="0.30" stroke="none"/>
    <circle cx="214" cy="100" r="3.5" fill="hsl(270,68%,55%)" fill-opacity="0.28" stroke="none"/>
    <circle cx="172" cy="108" r="4" fill="hsl(270,68%,55%)" fill-opacity="0.30" stroke="none"/>
    <!-- little stars among them -->
    <path d="M132 64 l1.6 3.6 3.9 .4 -2.9 2.6 .8 3.8 -3.4 -2 -3.4 2 .8 -3.8 -2.9 -2.6 3.9 -.4z" fill="hsl(270,88%,82%)" fill-opacity="0.65" stroke="none"/>
    <path d="M258 50 l1.4 3.1 3.4 .35 -2.5 2.3 .7 3.3 -3 -1.7 -3 1.7 .7 -3.3 -2.5 -2.3 3.4 -.35z" fill="hsl(270,88%,82%)" fill-opacity="0.55" stroke="none"/>
    <path d="M205 86 l1.4 3.1 3.4 .35 -2.5 2.3 .7 3.3 -3 -1.7 -3 1.7 .7 -3.3 -2.5 -2.3 3.4 -.35z" fill="hsl(270,88%,82%)" fill-opacity="0.50" stroke="none"/>
  </g>

  <!-- faint motion streaks of the data stream -->
  <g stroke="hsl(270,22%,46%)" stroke-width="1" stroke-opacity="0.45" stroke-linecap="round">
    <line x1="166" y1="112" x2="166" y2="119"/>
    <line x1="200" y1="108" x2="200" y2="118"/>
    <line x1="234" y1="110" x2="234" y2="118"/>
  </g>

  <!-- funnel / sieve : central focal object -->
  <g stroke="hsl(270,75%,66%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- funnel body -->
    <path d="M132 120 L268 120 L214 164 L186 164 Z" fill="hsl(270,68%,55%)" fill-opacity="0.10"/>
    <!-- rim accents -->
    <line x1="132" y1="120" x2="268" y2="120" stroke-width="2.5"/>
    <!-- spout -->
    <path d="M186 164 L188 178 L212 178 L214 164" fill="hsl(270,68%,55%)" fill-opacity="0.12"/>
  </g>

  <!-- fine cross-hatched mesh at the base, clipped to funnel -->
  <g clip-path="url(#cv-guru-lopez-de-prado-mesh)" stroke="hsl(270,75%,66%)" stroke-width="0.8" stroke-opacity="0.7">
    <line x1="150" y1="118" x2="200" y2="168"/>
    <line x1="160" y1="118" x2="210" y2="168"/>
    <line x1="170" y1="118" x2="220" y2="168"/>
    <line x1="180" y1="118" x2="230" y2="168"/>
    <line x1="190" y1="118" x2="240" y2="168"/>
    <line x1="200" y1="118" x2="250" y2="168"/>
    <line x1="250" y1="118" x2="200" y2="168"/>
    <line x1="240" y1="118" x2="190" y2="168"/>
    <line x1="230" y1="118" x2="180" y2="168"/>
    <line x1="220" y1="118" x2="170" y2="168"/>
    <line x1="210" y1="118" x2="160" y2="168"/>
    <line x1="200" y1="118" x2="150" y2="168"/>
  </g>

  <!-- faint dashed bell-curve + sigma threshold etched on the mesh -->
  <g stroke="hsl(270,88%,82%)" stroke-width="1.2" fill="none" stroke-opacity="0.55" stroke-linecap="round" stroke-dasharray="3 3">
    <path d="M158 150 C176 150 178 128 200 128 C222 128 224 150 242 150"/>
  </g>
  <!-- sigma mark -->
  <g stroke="hsl(270,88%,82%)" stroke-width="1.4" fill="none" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M196 135 L189 135 L194 140 L189 145 L196 145"/>
  </g>

  <!-- rejected glittering pebbles spilling off both sides, faded / struck through -->
  <g stroke-linecap="round">
    <!-- left side -->
    <circle cx="118" cy="170" r="4" fill="hsl(270,68%,55%)" fill-opacity="0.22" stroke="none"/>
    <line x1="112" y1="176" x2="124" y2="164" stroke="hsl(270,22%,46%)" stroke-width="1.4" stroke-opacity="0.8"/>
    <circle cx="100" cy="186" r="3" fill="hsl(270,68%,55%)" fill-opacity="0.18" stroke="none"/>
    <line x1="95" y1="191" x2="105" y2="181" stroke="hsl(270,22%,46%)" stroke-width="1.4" stroke-opacity="0.8"/>
    <path d="M130 188 l1.2 2.6 2.9 .3 -2.1 1.9 .6 2.8 -2.6 -1.5 -2.6 1.5 .6 -2.8 -2.1 -1.9 2.9 -.3z" fill="hsl(270,88%,82%)" fill-opacity="0.25" stroke="none"/>
    <!-- right side -->
    <circle cx="282" cy="170" r="4" fill="hsl(270,68%,55%)" fill-opacity="0.22" stroke="none"/>
    <line x1="276" y1="176" x2="288" y2="164" stroke="hsl(270,22%,46%)" stroke-width="1.4" stroke-opacity="0.8"/>
    <circle cx="300" cy="186" r="3" fill="hsl(270,68%,55%)" fill-opacity="0.18" stroke="none"/>
    <line x1="295" y1="191" x2="305" y2="181" stroke="hsl(270,22%,46%)" stroke-width="1.4" stroke-opacity="0.8"/>
    <path d="M270 188 l1.2 2.6 2.9 .3 -2.1 1.9 .6 2.8 -2.6 -1.5 -2.6 1.5 .6 -2.8 -2.1 -1.9 2.9 -.3z" fill="hsl(270,88%,82%)" fill-opacity="0.25" stroke="none"/>
  </g>

  <!-- the single true nugget / diamond passing cleanly through -->
  <g stroke="hsl(270,88%,82%)" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="200,182 210,194 200,210 190,194" fill="url(#cv-guru-lopez-de-prado-nugget)"/>
    <line x1="190" y1="194" x2="210" y2="194" stroke-opacity="0.7"/>
    <line x1="200" y1="182" x2="200" y2="210" stroke-opacity="0.4" stroke-width="1"/>
  </g>

  <!-- collecting dish at bottom-center -->
  <g stroke="hsl(270,75%,66%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M176 212 Q200 230 224 212" fill="hsl(270,68%,55%)" fill-opacity="0.14"/>
  </g>
</svg>
