<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-ralph-elliott" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-ralph-elliott-sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="hsl(160,88%,82%)" stop-opacity="0.9"/>
      <stop offset="1" stop-color="hsl(160,68%,55%)" stop-opacity="0.05"/>
    </radialGradient>
    <clipPath id="cv-guru-ralph-elliott-crest">
      <path d="M380 70 C330 30 270 40 240 100 C220 140 250 175 290 170 C320 166 332 138 318 118 C306 101 282 102 274 122 C268 138 282 152 296 146 Z"/>
    </clipPath>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-ralph-elliott)"/>

  <!-- shared frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#fff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="120" x2="360" y2="120" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="260" y1="40" x2="260" y2="200" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- low sun -->
  <circle cx="90" cy="170" r="46" fill="url(#cv-guru-ralph-elliott-sun)"/>
  <circle cx="90" cy="170" r="24" fill="none" stroke="hsl(160,88%,82%)" stroke-width="2" stroke-opacity="0.7"/>

  <!-- horizon -->
  <line x1="40" y1="170" x2="200" y2="170" stroke="hsl(160,22%,46%)" stroke-width="2" stroke-opacity="0.7"/>

  <!-- the great wave: concentric crest arcs -->
  <g fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M388 60 C320 18 250 30 218 100 C198 144 232 188 286 180 C336 173 350 132 326 108 C306 88 270 92 262 124 C257 144 274 162 294 154"/>
    <path d="M380 78 C326 46 270 56 246 108 C231 142 256 168 292 162" stroke-opacity="0.8"/>
  </g>

  <!-- nested self-similar mini wave-curls inside the crest -->
  <g clip-path="url(#cv-guru-ralph-elliott-crest)" fill="none" stroke="hsl(160,68%,55%)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M300 150 c-14 -2 -22 -16 -16 -28 c5 -10 20 -11 26 -2" stroke-width="1.5" stroke-opacity="0.9"/>
    <path d="M312 124 c-9 -1 -14 -10 -10 -18 c3 -7 13 -8 17 -2" stroke-width="1.3" stroke-opacity="0.8"/>
    <path d="M284 134 c-9 -1 -14 -10 -10 -18 c3 -7 13 -8 17 -2" stroke-width="1.3" stroke-opacity="0.7"/>
    <path d="M270 156 c-7 -1 -11 -8 -8 -14 c2 -5 10 -6 13 -1" stroke-width="1.1" stroke-opacity="0.6"/>
    <path d="M322 146 c-6 -1 -9 -7 -7 -12 c2 -4 9 -5 11 -1" stroke-width="1.1" stroke-opacity="0.6"/>
  </g>

  <!-- base water swells -->
  <g fill="none" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-opacity="0.55" stroke-linecap="round">
    <path d="M210 196 q22 -14 44 0 t44 0 t44 0"/>
    <path d="M198 188 q18 -10 36 0 t36 0" stroke-opacity="0.35"/>
  </g>

  <!-- five up / three down bead path riding the wave edge -->
  <g fill="none" stroke="hsl(160,88%,82%)" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round">
    <path d="M150 200 L168 184 L182 192 L200 168 L214 178 L232 150 L250 162 L266 138 L250 162 L232 150 L214 178 L200 168 L182 192 L168 184"/>
  </g>
  <g fill="hsl(160,88%,82%)">
    <circle cx="150" cy="200" r="3"/>
    <circle cx="168" cy="184" r="3"/>
    <circle cx="182" cy="192" r="3"/>
    <circle cx="200" cy="168" r="3"/>
    <circle cx="214" cy="178" r="3"/>
    <circle cx="232" cy="150" r="3.5" fill="hsl(160,68%,55%)" stroke="hsl(160,88%,82%)" stroke-width="1"/>
  </g>
  <!-- three down beads -->
  <g fill="hsl(160,68%,55%)" stroke="hsl(160,88%,82%)" stroke-width="1">
    <circle cx="248" cy="160" r="2.6"/>
    <circle cx="262" cy="146" r="2.6"/>
    <circle cx="266" cy="138" r="2.6"/>
  </g>

  <!-- reclining figure / bed silhouette, lower-left biographical accent -->
  <g stroke="hsl(160,22%,46%)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <line x1="44" y1="206" x2="100" y2="206"/>
    <line x1="46" y1="206" x2="46" y2="196"/>
    <line x1="98" y1="206" x2="98" y2="200"/>
    <path d="M52 200 q14 -8 30 -2 l16 0" fill="hsl(160,68%,55%)" fill-opacity="0.18"/>
    <circle cx="58" cy="193" r="4" fill="hsl(160,68%,55%)" fill-opacity="0.18"/>
    <line x1="50" y1="200" x2="66" y2="197"/>
  </g>
</svg>
