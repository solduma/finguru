<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-linda-raschke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(160,45%,13%)"/>
      <stop offset="1" stop-color="hsl(160,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-linda-raschke)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#fff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="110" y1="40" x2="110" y2="200" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="250" y1="40" x2="250" y2="200" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="120" x2="360" y2="120" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- workbench edge -->
  <line x1="34" y1="178" x2="366" y2="178" stroke="hsl(160,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="184" x2="360" y2="184" stroke="hsl(160,22%,46%)" stroke-width="1" stroke-linecap="round"/>

  <!-- ===== FAR LEFT: risk-first sizing dial ===== -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="62" cy="150" r="20" stroke="hsl(160,75%,66%)" stroke-width="2" fill="hsl(160,68%,55%)" fill-opacity="0.15"/>
    <circle cx="62" cy="150" r="20" stroke="none"/>
    <line x1="62" y1="150" x2="74" y2="139" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <circle cx="62" cy="150" r="2.5" fill="hsl(160,88%,82%)" stroke="none"/>
    <line x1="62" y1="126" x2="62" y2="130" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <line x1="80" y1="135" x2="83" y2="132" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <line x1="44" y1="135" x2="41" y2="132" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <!-- sliding counterweight slot -->
    <line x1="48" y1="174" x2="76" y2="174" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <rect x="66" y="170" width="8" height="8" rx="1.5" fill="hsl(160,68%,55%)" fill-opacity="0.55" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  </g>

  <!-- ===== TRAP 1: coiled-spring snare ===== -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- base plate -->
    <rect x="108" y="160" width="44" height="6" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.18" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- coil -->
    <path d="M118 160 q-8 -10 0 -18 q10 -8 18 0 q6 8 -2 14" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <path d="M122 158 q-4 -7 2 -12 q6 -5 11 -1" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <!-- snare loop armed -->
    <ellipse cx="138" cy="138" rx="9" ry="11" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <!-- tag -->
    <line x1="130" y1="166" x2="128" y2="182" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <path d="M122 182 l12 0 l3 5 l-3 5 l-12 0 z" fill="hsl(160,68%,55%)" fill-opacity="0.30" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  </g>

  <!-- ===== TRAP 2: tension-loop ===== -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="172" y="160" width="46" height="6" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.18" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- two posts + tension bow -->
    <line x1="180" y1="160" x2="180" y2="142" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <line x1="210" y1="160" x2="210" y2="142" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <path d="M180 142 q15 -26 30 0" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <line x1="195" y1="129" x2="195" y2="160" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <circle cx="195" cy="129" r="2.5" fill="hsl(160,68%,55%)" fill-opacity="0.7" stroke="none"/>
    <!-- tag -->
    <line x1="195" y1="166" x2="193" y2="182" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <path d="M187 182 l12 0 l3 5 l-3 5 l-12 0 z" fill="hsl(160,68%,55%)" fill-opacity="0.30" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  </g>

  <!-- ===== TRAP 3 (FOCAL): hinged jaw bar mid-snap catching dart ===== -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="248" y="160" width="58" height="6" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.22" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- hinge pivot -->
    <circle cx="258" cy="160" r="3.5" fill="hsl(160,68%,55%)" fill-opacity="0.6" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <!-- lower jaw bar -->
    <path d="M258 160 L298 152" stroke="hsl(160,88%,82%)" stroke-width="2.5"/>
    <!-- upper jaw bar mid-snap -->
    <path d="M258 160 L296 138" stroke="hsl(160,88%,82%)" stroke-width="2.5"/>
    <!-- spring coil at hinge -->
    <path d="M255 162 q-7 -6 -1 -12 q6 -5 11 -1" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
    <!-- caught dart token -->
    <g>
      <path d="M300 145 l16 -8 l-4 7 l8 1 l-9 5 l1 6 z" fill="hsl(160,68%,55%)" fill-opacity="0.9" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>
    </g>
    <!-- snap motion ticks -->
    <line x1="284" y1="120" x2="288" y2="128" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>
    <line x1="296" y1="122" x2="298" y2="130" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>
    <!-- tag -->
    <line x1="276" y1="166" x2="278" y2="182" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <path d="M270 182 l14 0 l3 5 l-3 5 l-14 0 z" fill="hsl(160,68%,55%)" fill-opacity="0.45" stroke="hsl(160,88%,82%)" stroke-width="1.5"/>
  </g>

  <!-- ===== TRAP 4: hinged jaw (compact, armed) ===== -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="322" y="160" width="34" height="6" rx="2" fill="hsl(160,68%,55%)" fill-opacity="0.18" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <circle cx="328" cy="160" r="2.5" fill="hsl(160,68%,55%)" fill-opacity="0.6" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
    <path d="M328 160 L350 160" stroke="hsl(160,75%,66%)" stroke-width="2"/>
    <path d="M328 160 L348 142" stroke="hsl(160,88%,82%)" stroke-width="2"/>
    <path d="M325 162 q-5 -5 0 -9" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <!-- tag -->
    <line x1="339" y1="166" x2="341" y2="182" stroke="hsl(160,22%,46%)" stroke-width="1"/>
    <path d="M333 182 l12 0 l3 5 l-3 5 l-12 0 z" fill="hsl(160,68%,55%)" fill-opacity="0.30" stroke="hsl(160,75%,66%)" stroke-width="1.5"/>
  </g>
</svg>
