<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-william-sharpe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(270,45%,13%)"/>
      <stop offset="1" stop-color="hsl(270,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-william-sharpe-nug" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="hsl(270,88%,82%)"/>
      <stop offset="1" stop-color="hsl(270,68%,55%)"/>
    </radialGradient>
    <clipPath id="cv-guru-william-sharpe-clip">
      <ellipse cx="170" cy="92" rx="78" ry="30"/>
    </clipPath>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-william-sharpe)"/>

  <!-- shared frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="20" x2="120" y2="230" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="20" x2="280" y2="230" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="60" x2="400" y2="60" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- background falling specks (diversifiable risk discarded) -->
  <g fill="hsl(270,22%,46%)" opacity="0.55">
    <circle cx="118" cy="138" r="2.2"/>
    <circle cx="104" cy="156" r="1.6"/>
    <circle cx="92" cy="174" r="2.4"/>
    <circle cx="80" cy="192" r="1.4"/>
    <circle cx="128" cy="166" r="1.8"/>
    <circle cx="110" cy="186" r="2"/>
    <circle cx="70" cy="178" r="1.5"/>
    <circle cx="138" cy="150" r="1.3"/>
    <circle cx="96" cy="140" r="1.5"/>
    <circle cx="62" cy="196" r="2"/>
  </g>
  <g fill="hsl(270,68%,55%)" opacity="0.7">
    <circle cx="126" cy="146" r="2.6"/>
    <circle cx="112" cy="170" r="2.8"/>
    <circle cx="98" cy="190" r="2.4"/>
    <circle cx="84" cy="160" r="2.2"/>
    <circle cx="140" cy="178" r="2.2"/>
    <circle cx="120" cy="200" r="2.6"/>
  </g>

  <!-- ============ SIEVE PAN (focal, upper-center, tilted) ============ -->
  <!-- pan rim -->
  <ellipse cx="170" cy="92" rx="78" ry="30" fill="hsl(270,68%,55%)" fill-opacity="0.15" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- pan side / depth -->
  <path d="M92 92 q0 18 78 22 q78 -4 78 -22" fill="hsl(270,38%,12%)" fill-opacity="0.6" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- inner rim highlight -->
  <ellipse cx="170" cy="92" rx="78" ry="30" fill="none" stroke="hsl(270,88%,82%)" stroke-width="1" stroke-opacity="0.5"/>

  <!-- mesh grid clipped to pan -->
  <g clip-path="url(#cv-guru-william-sharpe-clip)" stroke="hsl(270,75%,66%)" stroke-width="1" stroke-opacity="0.55" stroke-linecap="round">
    <line x1="108" y1="92" x2="108" y2="120"/>
    <line x1="128" y1="92" x2="128" y2="122"/>
    <line x1="148" y1="92" x2="148" y2="124"/>
    <line x1="170" y1="92" x2="170" y2="124"/>
    <line x1="192" y1="92" x2="192" y2="124"/>
    <line x1="212" y1="92" x2="212" y2="122"/>
    <line x1="232" y1="92" x2="232" y2="120"/>
    <line x1="100" y1="86" x2="240" y2="86"/>
    <line x1="96" y1="94" x2="244" y2="94"/>
    <line x1="100" y1="102" x2="240" y2="102"/>
    <line x1="108" y1="110" x2="232" y2="110"/>
    <line x1="120" y1="116" x2="220" y2="116"/>
  </g>

  <!-- specks streaming through mesh out lower-left edge -->
  <g fill="hsl(270,68%,55%)" opacity="0.75">
    <circle cx="132" cy="118" r="2"/>
    <circle cx="124" cy="128" r="1.7"/>
    <circle cx="116" cy="134" r="2.1"/>
  </g>

  <!-- ============ GOLDEN NUGGET (retained, faceted polygon on mesh) ============ -->
  <g stroke="hsl(270,88%,82%)" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="178,58 202,66 208,82 192,92 168,88 160,72" fill="url(#cv-guru-william-sharpe-nug)"/>
    <polyline points="178,58 184,76 168,88" fill="none" stroke-opacity="0.7"/>
    <polyline points="184,76 208,82" fill="none" stroke-opacity="0.7"/>
    <polyline points="184,76 192,92" fill="none" stroke-opacity="0.5"/>
  </g>
  <!-- nugget glint -->
  <circle cx="182" cy="66" r="2" fill="hsl(270,88%,82%)"/>

  <!-- premium linkage beam: nugget down to scale -->
  <line x1="200" y1="92" x2="248" y2="150" stroke="hsl(270,88%,82%)" stroke-width="2" stroke-opacity="0.75" stroke-linecap="round"/>
  <polygon points="248,150 244,140 254,144" fill="hsl(270,88%,82%)" opacity="0.85"/>

  <!-- ============ BALANCE SCALE (lower-third, right) ============ -->
  <!-- central post -->
  <line x1="282" y1="148" x2="282" y2="206" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <!-- base -->
  <path d="M266 206 h32" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="282" cy="208" rx="22" ry="5" fill="hsl(270,68%,55%)" fill-opacity="0.2" stroke="hsl(270,75%,66%)" stroke-width="1.5"/>
  <!-- pivot -->
  <circle cx="282" cy="148" r="3.5" fill="hsl(270,68%,55%)" stroke="hsl(270,75%,66%)" stroke-width="1.5"/>

  <!-- tilted beam: nugget-side (left, lower) heavier, tips toward coin -->
  <line x1="250" y1="158" x2="314" y2="142" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round"/>

  <!-- left pan (holds nugget weight) -->
  <line x1="250" y1="158" x2="250" y2="170" stroke="hsl(270,75%,66%)" stroke-width="1.5"/>
  <path d="M236 170 a14 7 0 0 0 28 0" fill="hsl(270,68%,55%)" fill-opacity="0.18" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <!-- small nugget echo in pan -->
  <polygon points="248,167 256,169 252,174 244,172" fill="hsl(270,68%,55%)" stroke="hsl(270,88%,82%)" stroke-width="1"/>

  <!-- right pan (holds the coin = premium) -->
  <line x1="314" y1="142" x2="314" y2="152" stroke="hsl(270,75%,66%)" stroke-width="1.5"/>
  <path d="M302 152 a12 6 0 0 0 24 0" fill="hsl(270,68%,55%)" fill-opacity="0.18" stroke="hsl(270,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <!-- coin -->
  <circle cx="314" cy="150" r="9" fill="hsl(270,68%,55%)" fill-opacity="0.45" stroke="hsl(270,88%,82%)" stroke-width="2"/>
  <circle cx="314" cy="150" r="5" fill="none" stroke="hsl(270,88%,82%)" stroke-width="1" stroke-opacity="0.6"/>
</svg>
