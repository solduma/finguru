<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-howard-marks" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-howard-marks-gem" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="hsl(35,88%,82%)"/>
      <stop offset="1" stop-color="hsl(35,68%,55%)"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-howard-marks)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- pivot anchor (top center) -->
  <rect x="180" y="44" width="40" height="10" rx="3" fill="hsl(35,22%,46%)"/>
  <circle cx="200" cy="56" r="6" fill="hsl(35,68%,55%)" fill-opacity="0.9" stroke="hsl(35,75%,66%)" stroke-width="2"/>

  <!-- motion-blur dashed arc across the swing range -->
  <path d="M120 168 A 120 120 0 0 1 280 168"
        fill="none" stroke="hsl(35,75%,66%)" stroke-width="1.5"
        stroke-opacity="0.45" stroke-dasharray="3 7" stroke-linecap="round"/>

  <!-- ghosted greed-extreme pendulum (right) -->
  <g stroke-opacity="0.22" fill-opacity="0.18">
    <line x1="200" y1="56" x2="278" y2="158" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="282" cy="166" r="17" fill="hsl(35,68%,55%)" stroke="hsl(35,75%,66%)" stroke-width="2"/>
  </g>

  <!-- arced gauge / scale beneath the swing -->
  <path d="M104 196 A 150 150 0 0 1 296 196"
        fill="none" stroke="hsl(35,22%,46%)" stroke-width="2" stroke-linecap="round"/>
  <!-- gauge ticks -->
  <line x1="104" y1="196" x2="98" y2="204" stroke="hsl(35,22%,46%)" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="170" x2="200" y2="160" stroke="hsl(35,22%,46%)" stroke-width="1" stroke-linecap="round"/>
  <line x1="296" y1="196" x2="302" y2="204" stroke="hsl(35,22%,46%)" stroke-width="2" stroke-linecap="round"/>

  <!-- fear extreme marker: downturned mouth-arc (left / cheap) -->
  <path d="M82 200 Q 96 190 110 200" fill="none" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <!-- greed extreme marker: upturned arc (right / expensive) -->
  <path d="M290 198 Q 304 208 318 198" fill="none" stroke="hsl(35,22%,46%)" stroke-width="2" stroke-linecap="round"/>

  <!-- ACTIVE pendulum at fear extreme (down-left) - focal point -->
  <line x1="200" y1="56" x2="124" y2="156" stroke="hsl(35,75%,66%)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="118" cy="166" r="22" fill="hsl(35,68%,55%)" fill-opacity="0.92" stroke="hsl(35,75%,66%)" stroke-width="2.5"/>
  <circle cx="111" cy="159" r="5" fill="hsl(35,88%,82%)" fill-opacity="0.55"/>

  <!-- faceted gem at the low extreme, near the bob -->
  <g transform="translate(150,186)">
    <path d="M0 -11 L11 -3 L7 11 L-7 11 L-11 -3 Z" fill="url(#cv-guru-howard-marks-gem)" stroke="hsl(35,88%,82%)" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M-11 -3 L0 1 L11 -3 M0 1 L0 11 M0 -11 L0 1" fill="none" stroke="hsl(35,45%,13%)" stroke-opacity="0.5" stroke-width="1"/>
    <path d="M-7 11 L0 1 L7 11" fill="none" stroke="hsl(35,88%,82%)" stroke-opacity="0.6" stroke-width="1"/>
  </g>

  <!-- contrarian hand reaching in from lower-left toward the gem -->
  <g fill="none" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- forearm/cuff -->
    <path d="M44 232 L74 214" />
    <path d="M50 240 L80 222" />
    <!-- palm -->
    <path d="M74 214 Q 94 200 116 198 L136 192" />
    <path d="M80 222 Q 100 214 120 210" />
    <!-- reaching fingers toward gem -->
    <path d="M136 192 Q 146 188 150 178" />
    <path d="M128 198 Q 138 196 144 188" />
    <path d="M120 210 Q 132 206 140 198" />
  </g>

  <!-- second-level thinking: nested circles (question inside a question) near pivot, top-right -->
  <g transform="translate(252,72)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-opacity="0.85"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="hsl(35,88%,82%)" stroke-width="1.5" stroke-opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="hsl(35,68%,55%)"/>
    <!-- little thought tail toward pivot -->
    <circle cx="-22" cy="14" r="3" fill="none" stroke="hsl(35,75%,66%)" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="-30" cy="22" r="2" fill="none" stroke="hsl(35,75%,66%)" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>
</svg>
