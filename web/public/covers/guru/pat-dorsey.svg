<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-pat-dorsey" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-pat-dorsey)"/>

  <!-- unifying frame texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="100" y1="40" x2="100" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="40" x2="300" y2="200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ===== MOAT: concentric water rings ===== -->
  <g fill="none" stroke="hsl(35,75%,66%)" stroke-linecap="round">
    <circle cx="200" cy="120" r="92" stroke-opacity="0.30" stroke-width="2"/>
    <circle cx="200" cy="120" r="80" stroke-opacity="0.45" stroke-width="2"/>
    <circle cx="200" cy="120" r="68" stroke-opacity="0.30" stroke-width="2"/>
  </g>
  <circle cx="200" cy="120" r="80" fill="hsl(35,68%,55%)" fill-opacity="0.10"/>

  <!-- ===== CENTRAL KEEP ===== -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- base block -->
    <rect x="172" y="108" width="56" height="40" fill="hsl(35,68%,55%)" fill-opacity="0.55"/>
    <!-- gateway -->
    <path d="M193 148 v-16 a7 7 0 0 1 14 0 v16" fill="hsl(35,38%,7%)" fill-opacity="0.6"/>
    <!-- upper tower -->
    <rect x="185" y="82" width="30" height="26" fill="hsl(35,68%,55%)" fill-opacity="0.75"/>
    <!-- crenellations -->
    <path d="M185 82 v-7 h6 v7 M197 82 v-7 h6 v7 M209 82 v-7 h6 v7" fill="hsl(35,88%,82%)" fill-opacity="0.85" stroke-width="1.5"/>
  </g>

  <!-- ===== FOUR CHECKMARK FLAG-POSTS on outer ring ===== -->
  <!-- top-left -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="135" y1="62" x2="135" y2="44"/>
    <path d="M135 44 h16 l-5 6 5 6 h-16 z" fill="hsl(35,68%,55%)" fill-opacity="0.85"/>
    <path d="M139 50 l2.5 2.5 4-5" stroke="hsl(35,88%,82%)" stroke-width="1.5" fill="none"/>
  </g>
  <!-- top-right -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="265" y1="62" x2="265" y2="44"/>
    <path d="M265 44 h16 l-5 6 5 6 h-16 z" fill="hsl(35,68%,55%)" fill-opacity="0.85"/>
    <path d="M269 50 l2.5 2.5 4-5" stroke="hsl(35,88%,82%)" stroke-width="1.5" fill="none"/>
  </g>
  <!-- bottom-left -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="135" y1="178" x2="135" y2="160"/>
    <path d="M135 160 h16 l-5 6 5 6 h-16 z" fill="hsl(35,68%,55%)" fill-opacity="0.85"/>
    <path d="M139 166 l2.5 2.5 4-5" stroke="hsl(35,88%,82%)" stroke-width="1.5" fill="none"/>
  </g>
  <!-- bottom-right -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="265" y1="178" x2="265" y2="160"/>
    <path d="M265 160 h16 l-5 6 5 6 h-16 z" fill="hsl(35,68%,55%)" fill-opacity="0.85"/>
    <path d="M269 166 l2.5 2.5 4-5" stroke="hsl(35,88%,82%)" stroke-width="1.5" fill="none"/>
  </g>

  <!-- ===== DRAWBRIDGE with dangling price tag ===== -->
  <g stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- bridge plank descending toward lower foreground -->
    <path d="M195 148 L182 196 M205 148 L218 196" fill="none"/>
    <line x1="182" y1="196" x2="218" y2="196" stroke-width="2"/>
    <!-- chains -->
    <path d="M195 148 L180 174 M205 148 L220 174" fill="none" stroke-opacity="0.55" stroke-width="1.5"/>
    <!-- price tag tied to chain -->
    <path d="M220 174 l16 6 4 12 -12 4 -8 -14 z" fill="hsl(35,68%,55%)" fill-opacity="0.85" stroke="hsl(35,75%,66%)"/>
    <circle cx="226" cy="180" r="2.2" fill="hsl(35,88%,82%)" stroke="none"/>
  </g>

  <!-- ===== MEASURING RULER ARC (lower-right gap) ===== -->
  <g stroke="hsl(35,88%,82%)" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-opacity="0.85">
    <path d="M252 168 A66 66 0 0 1 296 138"/>
    <!-- bracket ends -->
    <line x1="252" y1="168" x2="246" y2="174"/>
    <line x1="296" y1="138" x2="302" y2="132"/>
    <!-- ticks along the arc -->
    <line x1="261" y1="161" x2="258" y2="166"/>
    <line x1="272" y1="153" x2="270" y2="159"/>
    <line x1="284" y1="146" x2="283" y2="152"/>
  </g>
</svg>
