<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-charlie-munger-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(35,45%,13%)"/>
      <stop offset="1" stop-color="hsl(35,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-charlie-munger-gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(35,88%,82%)"/>
      <stop offset="1" stop-color="hsl(35,68%,55%)"/>
    </linearGradient>
    <radialGradient id="cv-guru-charlie-munger-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="hsl(35,88%,82%)" stop-opacity="0.55"/>
      <stop offset="1" stop-color="hsl(35,88%,82%)" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cv-guru-charlie-munger-clip">
      <rect x="0" y="0" width="400" height="250"/>
    </clipPath>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-charlie-munger-bg)"/>

  <!-- shared unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="white" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="0" x2="280" y2="250" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="70" x2="400" y2="70" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

  <g clip-path="url(#cv-guru-charlie-munger-clip)">
    <!-- tilted latticework field of diamond cells -->
    <g stroke="hsl(35,75%,66%)" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round" fill="none" transform="rotate(-9 210 110)">
      <!-- diagonal set A -->
      <line x1="60" y1="20" x2="200" y2="160"/>
      <line x1="100" y1="20" x2="240" y2="160"/>
      <line x1="140" y1="20" x2="280" y2="160"/>
      <line x1="180" y1="20" x2="320" y2="160"/>
      <line x1="220" y1="20" x2="360" y2="160"/>
      <line x1="260" y1="20" x2="380" y2="140"/>
      <line x1="300" y1="20" x2="400" y2="120"/>
      <!-- diagonal set B -->
      <line x1="340" y1="20" x2="200" y2="160"/>
      <line x1="300" y1="20" x2="160" y2="160"/>
      <line x1="260" y1="20" x2="120" y2="160"/>
      <line x1="220" y1="20" x2="80" y2="160"/>
      <line x1="180" y1="20" x2="60" y2="140"/>
      <line x1="380" y1="40" x2="240" y2="160"/>
      <line x1="400" y1="80" x2="300" y2="160"/>
    </g>

    <!-- thin guide lines converging toward the gem -->
    <g stroke="hsl(35,88%,82%)" stroke-opacity="0.5" stroke-width="1" stroke-linecap="round">
      <line x1="150" y1="60" x2="236" y2="118"/>
      <line x1="320" y1="70" x2="252" y2="120"/>
      <line x1="180" y1="160" x2="240" y2="135"/>
    </g>

    <!-- glow behind focal gem -->
    <circle cx="245" cy="124" r="58" fill="url(#cv-guru-charlie-munger-glow)"/>

    <!-- focal faceted gem nested in central cell -->
    <g stroke="hsl(35,88%,82%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- gem outline: table + crown + pavilion -->
      <polygon points="245,96 273,112 263,138 245,154 227,138 217,112"
               fill="url(#cv-guru-charlie-munger-gem)" fill-opacity="0.95"/>
      <!-- table facet -->
      <polygon points="245,96 273,112 245,120 217,112"
               fill="hsl(35,88%,82%)" fill-opacity="0.55" stroke-width="1"/>
      <!-- internal facet lines -->
      <g stroke-width="1" stroke-opacity="0.85" fill="none">
        <line x1="217" y1="112" x2="245" y2="120"/>
        <line x1="273" y1="112" x2="245" y2="120"/>
        <line x1="245" y1="120" x2="245" y2="154"/>
        <line x1="245" y1="120" x2="227" y2="138"/>
        <line x1="245" y1="120" x2="263" y2="138"/>
      </g>
    </g>

    <!-- fair-price tag hanging beside gem with balance/equals mark -->
    <g transform="rotate(8 300 130)">
      <line x1="280" y1="108" x2="295" y2="122" stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linecap="round"/>
      <path d="M295,120 L330,120 L342,136 L330,152 L295,152 Z"
            fill="hsl(35,68%,55%)" fill-opacity="0.18"
            stroke="hsl(35,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="302" cy="128" r="2.5" fill="hsl(35,88%,82%)"/>
      <!-- equals / balance mark (geometric, not a numeral) -->
      <line x1="312" y1="131" x2="332" y2="131" stroke="hsl(35,88%,82%)" stroke-width="2" stroke-linecap="round"/>
      <line x1="312" y1="140" x2="332" y2="140" stroke="hsl(35,88%,82%)" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- diminished pile of dull pebbles, lower-left, being left behind -->
    <g fill="hsl(35,22%,46%)" fill-opacity="0.85" stroke="hsl(35,22%,46%)" stroke-width="1">
      <ellipse cx="86" cy="200" rx="16" ry="10"/>
      <ellipse cx="108" cy="204" rx="13" ry="8"/>
      <ellipse cx="98" cy="190" rx="11" ry="7"/>
      <ellipse cx="72" cy="206" rx="10" ry="6"/>
    </g>
    <!-- a pebble falling away -->
    <ellipse cx="128" cy="178" rx="8" ry="5" fill="hsl(35,22%,46%)" fill-opacity="0.5"/>
  </g>
</svg>
