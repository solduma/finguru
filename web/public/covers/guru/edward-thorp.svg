<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-edward-thorp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(270,45%,13%)"/>
      <stop offset="1" stop-color="hsl(270,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-edward-thorp-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(270,22%,90%)"/>
      <stop offset="1" stop-color="hsl(270,30%,72%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-edward-thorp-cone" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="hsl(270,88%,82%)" stop-opacity="0.45"/>
      <stop offset="1" stop-color="hsl(270,88%,82%)" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cv-guru-edward-thorp-cardclip">
      <rect x="-44" y="-66" width="88" height="132" rx="11"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="400" height="250" fill="url(#cv-guru-edward-thorp-bg)"/>

  <!-- unifying texture -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="40" x2="300" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="170" x2="400" y2="170" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- felt baseline: dealer's arc under the card -->
  <path d="M30 198 Q200 178 370 198" fill="none" stroke="hsl(270,22%,46%)" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M55 206 Q200 190 345 206" fill="none" stroke="hsl(270,22%,46%)" stroke-width="1" stroke-opacity="0.3"/>

  <!-- spotlight / edge cone from upper-left corner -->
  <path d="M52 30 L210 215 L92 215 Z" fill="url(#cv-guru-edward-thorp-cone)"/>

  <!-- ===== dealt card (tilted) ===== -->
  <g transform="translate(150,118) rotate(-11)">
    <!-- card body -->
    <rect x="-44" y="-66" width="88" height="132" rx="11" fill="url(#cv-guru-edward-thorp-card)" stroke="hsl(270,75%,66%)" stroke-width="2"/>
    <rect x="-44" y="-66" width="88" height="132" rx="11" fill="none" stroke="#000000" stroke-opacity="0.10" stroke-width="1"/>

    <!-- corner index marks (geometric, no letters): a small wedge + dot motif -->
    <g clip-path="url(#cv-guru-edward-thorp-cardclip)">
      <path d="M-34 -55 l9 0 -4.5 9 z" fill="hsl(270,68%,55%)"/>
      <path d="M34 55 l-9 0 4.5 -9 z" fill="hsl(270,68%,55%)"/>
    </g>

    <!-- balance scale as the central pip -->
    <g stroke="hsl(270,75%,66%)" stroke-width="2" fill="none">
      <!-- post -->
      <line x1="0" y1="-30" x2="0" y2="26"/>
      <!-- base -->
      <path d="M-12 30 L12 30"/>
      <line x1="0" y1="26" x2="-8" y2="30"/>
      <line x1="0" y1="26" x2="8" y2="30"/>
      <!-- fulcrum knob -->
      <circle cx="0" cy="-30" r="3.5" fill="hsl(270,88%,82%)" stroke="none"/>
      <!-- beam (level, in equilibrium) -->
      <line x1="-26" y1="-24" x2="26" y2="-24"/>
      <!-- hanger lines -->
      <line x1="-26" y1="-24" x2="-26" y2="-12"/>
      <line x1="26" y1="-24" x2="26" y2="-12"/>
    </g>
    <!-- left pan -->
    <path d="M-37 -12 A11 6 0 0 0 -15 -12 Z" fill="hsl(270,68%,55%)" fill-opacity="0.55" stroke="hsl(270,75%,66%)" stroke-width="1.5"/>
    <!-- right pan -->
    <path d="M15 -12 A11 6 0 0 0 37 -12 Z" fill="hsl(270,68%,55%)" fill-opacity="0.55" stroke="hsl(270,75%,66%)" stroke-width="1.5"/>
  </g>

  <!-- ===== Kelly chip stack (lower right, stepped proportional heights) ===== -->
  <g>
    <!-- stack A (tallest) -->
    <g>
      <ellipse cx="300" cy="186" rx="22" ry="8" fill="hsl(270,68%,55%)" fill-opacity="0.85" stroke="hsl(270,75%,66%)" stroke-width="2"/>
      <rect x="278" y="170" width="44" height="16" fill="hsl(270,68%,55%)" fill-opacity="0.55"/>
      <ellipse cx="300" cy="178" rx="22" ry="8" fill="hsl(270,68%,55%)" fill-opacity="0.85" stroke="hsl(270,75%,66%)" stroke-width="2"/>
      <rect x="278" y="162" width="44" height="16" fill="hsl(270,68%,55%)" fill-opacity="0.55"/>
      <ellipse cx="300" cy="170" rx="22" ry="8" fill="hsl(270,68%,55%)" fill-opacity="0.9" stroke="hsl(270,75%,66%)" stroke-width="2"/>
      <rect x="278" y="154" width="44" height="16" fill="hsl(270,68%,55%)" fill-opacity="0.55"/>
      <ellipse cx="300" cy="162" rx="22" ry="8" fill="hsl(270,30%,30%)" stroke="hsl(270,88%,82%)" stroke-width="2"/>
      <ellipse cx="300" cy="162" rx="11" ry="4" fill="none" stroke="hsl(270,88%,82%)" stroke-width="1"/>
    </g>
    <!-- stack B (medium) -->
    <g>
      <ellipse cx="258" cy="190" rx="19" ry="7" fill="hsl(270,68%,55%)" fill-opacity="0.85" stroke="hsl(270,75%,66%)" stroke-width="2"/>
      <rect x="239" y="176" width="38" height="14" fill="hsl(270,68%,55%)" fill-opacity="0.5"/>
      <ellipse cx="258" cy="183" rx="19" ry="7" fill="hsl(270,30%,30%)" stroke="hsl(270,75%,66%)" stroke-width="2"/>
      <ellipse cx="258" cy="183" rx="9" ry="3" fill="none" stroke="hsl(270,75%,66%)" stroke-width="1"/>
    </g>
    <!-- stack C (shortest, single) -->
    <g>
      <ellipse cx="338" cy="192" rx="16" ry="6" fill="hsl(270,30%,30%)" stroke="hsl(270,75%,66%)" stroke-width="2"/>
      <ellipse cx="338" cy="192" rx="8" ry="3" fill="none" stroke="hsl(270,75%,66%)" stroke-width="1"/>
    </g>
  </g>

  <!-- highlighted edge wedge picking out the card corner -->
  <path d="M108 70 L150 60 L142 84 Z" fill="hsl(270,88%,82%)" fill-opacity="0.18"/>
</svg>
