<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-hyman-minsky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(200,45%,13%)"/>
      <stop offset="1" stop-color="hsl(200,38%,7%)"/>
    </linearGradient>
    <linearGradient id="cv-guru-hyman-minsky-ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(200,68%,55%)" stop-opacity="0.32"/>
      <stop offset="1" stop-color="hsl(200,68%,55%)" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="cv-guru-hyman-minsky-refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(200,68%,55%)" stop-opacity="0.18"/>
      <stop offset="1" stop-color="hsl(200,38%,7%)" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-hyman-minsky)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="80" y1="40" x2="80" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="320" y1="40" x2="320" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="40" y1="140" x2="360" y2="140" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- calm low sun/moon in the tranquil upper field -->
  <circle cx="296" cy="86" r="20" fill="hsl(200,88%,82%)" fill-opacity="0.18"/>
  <circle cx="296" cy="86" r="20" fill="none" stroke="hsl(200,88%,82%)" stroke-opacity="0.55" stroke-width="2"/>

  <!-- flat calm horizon -->
  <line x1="40" y1="139" x2="360" y2="139" stroke="hsl(200,22%,46%)" stroke-width="2" stroke-linecap="round"/>

  <!-- smooth unbroken ice surface (the mirror) -->
  <rect x="40" y="140" width="320" height="32" fill="url(#cv-guru-hyman-minsky-ice)"/>
  <line x1="40" y1="140" x2="360" y2="140" stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round"/>
  <!-- faint mirror reflection line beneath -->
  <line x1="60" y1="148" x2="340" y2="148" stroke="hsl(200,88%,82%)" stroke-opacity="0.30" stroke-width="1"/>

  <!-- reflection zone with hidden stress fractures -->
  <rect x="40" y="172" width="320" height="34" fill="url(#cv-guru-hyman-minsky-refl)"/>
  <g stroke="hsl(200,75%,66%)" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round">
    <line x1="120" y1="180" x2="150" y2="190"/>
    <line x1="150" y1="190" x2="138" y2="200"/>
    <line x1="210" y1="178" x2="190" y2="188"/>
    <line x1="190" y1="188" x2="206" y2="198"/>
    <line x1="250" y1="184" x2="272" y2="194"/>
    <line x1="95" y1="186" x2="112" y2="196"/>
    <line x1="300" y1="182" x2="284" y2="192"/>
  </g>

  <!-- lone confident skater dead-center on the ice -->
  <g stroke="hsl(200,88%,82%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="200" cy="116" r="5" fill="hsl(200,88%,82%)" stroke="none"/>
    <line x1="200" y1="121" x2="200" y2="135"/>
    <line x1="200" y1="126" x2="190" y2="132"/>
    <line x1="200" y1="126" x2="211" y2="131"/>
    <line x1="200" y1="135" x2="194" y2="140"/>
    <line x1="200" y1="135" x2="206" y2="140"/>
  </g>
  <!-- skater's mirror reflection -->
  <g stroke="hsl(200,68%,55%)" stroke-opacity="0.30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="200" y1="142" x2="200" y2="155"/>
    <circle cx="200" cy="160" r="4" fill="hsl(200,68%,55%)" fill-opacity="0.30" stroke="none"/>
  </g>

  <!-- the jagged fracture: thin in the foreground, forking wider toward the figure's feet -->
  <g stroke="hsl(200,75%,66%)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="78,198 96,188 110,178 128,170 146,160 168,150 188,143" stroke-width="2"/>
    <!-- main reaching toward the skater's feet -->
    <polyline points="188,143 197,141" stroke-width="2"/>
    <!-- forking branches widening toward the edge / foreground -->
    <polyline points="110,178 100,176 88,182" stroke-width="1.5" stroke-opacity="0.8"/>
    <polyline points="146,160 156,166 150,174" stroke-width="1.5" stroke-opacity="0.8"/>
    <polyline points="168,150 178,156 174,164" stroke-width="1.5" stroke-opacity="0.8"/>
    <polyline points="78,198 70,202 60,200" stroke-width="1.5" stroke-opacity="0.7"/>
  </g>
</svg>
