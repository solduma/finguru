<svg viewBox="0 0 400 250" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cv-guru-kyle-bass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(200,45%,13%)"/>
      <stop offset="1" stop-color="hsl(200,38%,7%)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#cv-guru-kyle-bass)"/>

  <!-- shared unifying frame -->
  <line x1="0" y1="212" x2="400" y2="212" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- foundation slab with jagged crack, abyss to the right -->
  <path d="M40 198 L150 198 L162 184 L172 200 L184 186 L196 200 L300 200"
        fill="none" stroke="hsl(200,22%,46%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 198 L150 198 L162 184 L172 200 L184 186 L196 200 L300 200 L300 212 L40 212 Z"
        fill="hsl(200,68%,55%)" fill-opacity="0.12"/>
  <!-- crack descending into the slab -->
  <path d="M172 200 L176 212" stroke="hsl(200,75%,66%)" stroke-width="1" stroke-linecap="round"/>

  <!-- fulcrum: triangular pivot, center-low -->
  <path d="M150 168 L168 195 L132 195 Z"
        fill="hsl(200,68%,55%)" fill-opacity="0.25"
        stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- lever beam: diagonal lower-left to upper-right -->
  <g transform="rotate(-15 150 166)">
    <rect x="62" y="161" width="232" height="9" rx="2"
          fill="hsl(200,68%,55%)" fill-opacity="0.30"
          stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- small coin on the short (lower-left) end -->
  <g transform="translate(86,191)">
    <circle r="12" fill="hsl(200,68%,55%)" fill-opacity="0.45"
            stroke="hsl(200,88%,82%)" stroke-width="2"/>
    <path d="M0 -7 L0 7" stroke="hsl(200,88%,82%)" stroke-width="1" stroke-linecap="round"/>
    <path d="M-4 -3 L4 -3 M-4 3 L4 3" stroke="hsl(200,88%,82%)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- massive house perched on long end, tilting off past frame edge -->
  <g transform="rotate(-15 280 120)">
    <!-- house body -->
    <rect x="248" y="78" width="96" height="78"
          fill="hsl(200,68%,55%)" fill-opacity="0.18"
          stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linejoin="round"/>
    <!-- roof -->
    <path d="M240 78 L296 38 L352 78 Z"
          fill="hsl(200,68%,55%)" fill-opacity="0.30"
          stroke="hsl(200,75%,66%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- door -->
    <rect x="282" y="118" width="28" height="38"
          fill="none" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- window -->
    <rect x="258" y="94" width="20" height="20"
          fill="none" stroke="hsl(200,75%,66%)" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="268" y1="94" x2="268" y2="114" stroke="hsl(200,75%,66%)" stroke-width="1"/>
    <line x1="258" y1="104" x2="278" y2="104" stroke="hsl(200,75%,66%)" stroke-width="1"/>
    <!-- highlight edge on roof -->
    <path d="M296 38 L352 78" stroke="hsl(200,88%,82%)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- subtle motion/tip arc hint near house edge -->
  <path d="M356 120 q14 16 6 40" fill="none" stroke="hsl(200,88%,82%)" stroke-opacity="0.5"
        stroke-width="1" stroke-linecap="round" stroke-dasharray="2 5"/>
</svg>
